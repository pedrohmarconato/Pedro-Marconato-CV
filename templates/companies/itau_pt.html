<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedro Marconato - Itaú (PT)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap');

        :root {
            /* Itaú rebrand 2023 — "pedras de rio" */
            --itau-orange: #FF6200;
            --itau-burnt: #C24E00;
            --itau-terracotta: #8F3A00;
            --itau-amber: #FFB300;
            --itau-blue: #1E5BC6;
            --itau-green: #00A868;
            --itau-pink: #FF4D8D;
            --itau-sand: #FFF4EC;
            --itau-ink: #33261C;

            /* Applied Colors */
            --primary-color: var(--itau-orange);
            --secondary-color: var(--itau-burnt);
            --accent-color: var(--itau-amber);
            --text-color: var(--itau-ink);
            --border-color: rgba(194, 78, 0, 0.16);
            --background-gradient: linear-gradient(135deg, var(--itau-orange) 0%, var(--itau-burnt) 100%);

            --font-body: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;

            /* Cantos orgânicos assimétricos das pedras de rio */
            --stone-radius-a: 58% 42% 44% 56% / 52% 58% 42% 48%;
            --stone-radius-b: 42% 58% 56% 44% / 58% 42% 56% 44%;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-body);
            color: var(--text-color);
            line-height: 1.6;
            background: var(--itau-sand);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        h1, .section-title, .job-title, .degree, .project-title {
            font-weight: 800;
            letter-spacing: -0.3px;
        }

        /* ===== Ambient background — leito do rio ===== */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(160deg, #FFF7F0 0%, var(--itau-sand) 45%, #FFEDD9 100%);
            background-size: 200% 200%;
            animation: riverFlow 26s ease-in-out infinite;
            z-index: -2;
            overflow: hidden;
        }

        @keyframes riverFlow {
            0%, 100% { background-position: 0% 30%; }
            50% { background-position: 100% 70%; }
        }

        .bg-stone {
            position: absolute;
            border-radius: var(--stone-radius-a);
            filter: blur(46px);
            opacity: 0.14;
            animation: stoneDrift 30s ease-in-out infinite alternate,
                       stoneMorph 22s ease-in-out infinite alternate;
        }

        .bg-stone:nth-child(1) {
            width: 340px;
            height: 300px;
            background: var(--itau-orange);
            top: -120px;
            left: -100px;
        }

        .bg-stone:nth-child(2) {
            width: 280px;
            height: 240px;
            background: var(--itau-amber);
            bottom: -110px;
            right: -70px;
            animation-delay: -8s;
        }

        .bg-stone:nth-child(3) {
            width: 210px;
            height: 190px;
            background: var(--itau-burnt);
            top: 46%;
            right: 4%;
            opacity: 0.08;
            animation-delay: -15s;
        }

        .cv-container {
            max-width: 1000px;
            margin: 30px auto;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 30px;
            box-shadow:
                0 20px 60px rgba(194, 78, 0, 0.18),
                0 8px 16px rgba(51, 38, 28, 0.08);
            border: 1px solid rgba(255, 98, 0, 0.14);
            overflow: hidden;
            position: relative;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .cv-container:hover {
            box-shadow:
                0 30px 80px rgba(255, 98, 0, 0.22),
                0 12px 24px rgba(51, 38, 28, 0.1);
        }

        /* ===== HERO — laranja radiante com pedras de rio ===== */
        .header {
            background:
                radial-gradient(circle at 16% 18%, rgba(255, 158, 74, 0.55) 0%, transparent 46%),
                radial-gradient(circle at 88% 84%, rgba(194, 78, 0, 0.6) 0%, transparent 52%),
                var(--itau-orange);
            padding: 70px 30px 90px 30px;
            position: relative;
            overflow: hidden;
            min-height: 56vh;
            display: flex;
            align-items: center;
        }

        /* Brilho quente pulsando devagar sobre o hero */
        .header::before {
            content: '';
            position: absolute;
            top: -30%;
            left: 10%;
            width: 80%;
            height: 120%;
            background: radial-gradient(ellipse at center, rgba(255, 179, 0, 0.22) 0%, transparent 60%);
            animation: warmGlow 9s ease-in-out infinite;
            z-index: 1;
            pointer-events: none;
        }

        @keyframes warmGlow {
            0%, 100% { opacity: 0.55; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.12); }
        }

        /* Varredura de sol — fluidez de água na superfície */
        .header::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 55%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.09), transparent);
            animation: sunSweep 11s ease-in-out infinite;
            z-index: 2;
            pointer-events: none;
        }

        @keyframes sunSweep {
            0% { left: -70%; }
            55%, 100% { left: 115%; }
        }

        /* Pedras de rio flutuando devagar */
        .river-stones {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            overflow: hidden;
            pointer-events: none;
        }

        .stone {
            position: absolute;
            background: rgba(255, 255, 255, 0.11);
            border-radius: var(--stone-radius-a);
            animation: stoneDrift 20s ease-in-out infinite alternate,
                       stoneMorph 16s ease-in-out infinite alternate;
        }

        .stone-1 {
            width: 300px;
            height: 250px;
            top: -90px;
            left: -70px;
            animation-duration: 24s, 18s;
        }

        .stone-2 {
            width: 190px;
            height: 165px;
            top: 12%;
            right: -55px;
            background: rgba(255, 179, 0, 0.26);
            animation-delay: -6s, -4s;
            animation-name: stoneDriftAlt, stoneMorphAlt;
        }

        .stone-3 {
            width: 130px;
            height: 112px;
            bottom: 14%;
            left: 6%;
            background: rgba(143, 58, 0, 0.2);
            animation-delay: -11s, -9s;
        }

        .stone-4 {
            width: 90px;
            height: 78px;
            top: 26%;
            left: 38%;
            background: rgba(255, 255, 255, 0.14);
            animation-delay: -3s, -7s;
            animation-name: stoneDriftAlt, stoneMorph;
        }

        .stone-5 {
            width: 220px;
            height: 190px;
            bottom: -80px;
            right: 16%;
            background: rgba(255, 255, 255, 0.08);
            animation-delay: -14s, -12s;
        }

        .stone-6 {
            width: 64px;
            height: 56px;
            bottom: 30%;
            right: 34%;
            background: rgba(255, 179, 0, 0.2);
            animation-delay: -8s, -2s;
            animation-name: stoneDrift, stoneMorphAlt;
        }

        @keyframes stoneDrift {
            0% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(26px, -20px) rotate(4deg); }
            100% { transform: translate(-18px, 16px) rotate(-3deg); }
        }

        @keyframes stoneDriftAlt {
            0% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(-22px, 18px) rotate(-5deg); }
            100% { transform: translate(20px, -14px) rotate(3deg); }
        }

        @keyframes stoneMorph {
            0% { border-radius: 58% 42% 44% 56% / 52% 58% 42% 48%; }
            50% { border-radius: 44% 56% 58% 42% / 46% 44% 56% 54%; }
            100% { border-radius: 52% 48% 40% 60% / 58% 46% 54% 42%; }
        }

        @keyframes stoneMorphAlt {
            0% { border-radius: 42% 58% 56% 44% / 58% 42% 56% 44%; }
            50% { border-radius: 56% 44% 42% 58% / 44% 58% 42% 56%; }
            100% { border-radius: 48% 52% 60% 40% / 52% 56% 44% 48%; }
        }

        /* Logo — pedra oficial respirando sobre o laranja */
        .brand-logo {
            position: absolute;
            top: 34px;
            right: 44px;
            z-index: 15;
            background: rgba(255, 255, 255, 0.94);
            padding: 12px;
            border-radius: 32% 68% 64% 36% / 48% 40% 60% 52%;
            box-shadow:
                0 10px 30px rgba(143, 58, 0, 0.3),
                0 2px 8px rgba(51, 38, 28, 0.14);
            animation: logoSettle 1.4s cubic-bezier(0.34, 1.3, 0.64, 1) both,
                       stoneMorphAlt 18s ease-in-out 2s infinite alternate;
            transition: transform 0.3s ease;
        }

        .brand-logo:hover {
            transform: scale(1.05);
        }

        .brand-logo img {
            width: 84px;
            height: 84px;
            display: block;
        }

        @keyframes logoSettle {
            0% { transform: translateY(-46px) rotate(-6deg); opacity: 0; }
            100% { transform: translateY(0) rotate(0deg); opacity: 1; }
        }

        .header-content {
            position: relative;
            z-index: 10;
            width: 100%;
            padding: 0 50px;
        }

        .header-text {
            max-width: 760px;
        }

        /* Tagline pill — caixa baixa, calor brasileiro */
        .company-tagline {
            font-size: 14px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.95);
            letter-spacing: 3px;
            text-transform: lowercase;
            margin-bottom: 26px;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 10px 22px;
            border: 1px solid rgba(255, 255, 255, 0.32);
            border-radius: 999px;
            background: rgba(143, 58, 0, 0.22);
            animation: taglineSurface 1s ease-out 0.2s both;
        }

        .tagline-stone {
            width: 12px;
            height: 11px;
            background: var(--itau-amber);
            border-radius: var(--stone-radius-b);
            animation: stonePulse 2.4s ease-in-out infinite;
            flex-shrink: 0;
        }

        @keyframes stonePulse {
            0%, 100% { transform: scale(1) rotate(0deg); opacity: 0.85; }
            50% { transform: scale(1.25) rotate(8deg); opacity: 1; }
        }

        @keyframes taglineSurface {
            0% { opacity: 0; transform: translateY(16px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .header h1 {
            font-size: clamp(2.6rem, 5.5vw, 3.9rem);
            font-weight: 800;
            color: white;
            margin-bottom: 20px;
            letter-spacing: -1.5px;
            line-height: 1.08;
            text-transform: uppercase;
            text-shadow: 0 3px 16px rgba(143, 58, 0, 0.35);
            animation: titleSurface 1.2s ease-out both;
            position: relative;
        }

        .header h1::after {
            content: '';
            position: absolute;
            bottom: -12px;
            left: 0;
            width: 90px;
            height: 5px;
            background: linear-gradient(90deg, var(--itau-amber), rgba(255, 255, 255, 0.85), transparent);
            border-radius: 999px;
            animation: underlineFlow 1.1s ease-out 0.7s both;
        }

        @keyframes titleSurface {
            0% { opacity: 0; transform: translateY(38px) scale(0.97); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes underlineFlow {
            0% { width: 0; opacity: 0; }
            100% { width: 90px; opacity: 1; }
        }

        .role {
            font-size: clamp(1.05rem, 2.6vw, 1.45rem);
            font-weight: 400;
            color: rgba(255, 255, 255, 0.94);
            margin-bottom: 38px;
            margin-top: 22px;
            letter-spacing: 0.4px;
            animation: roleSurface 1.2s ease-out 0.35s both;
        }

        @keyframes roleSurface {
            0% { opacity: 0; transform: translateY(24px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .contact-info {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            align-items: center;
            animation: contactSurface 1.2s ease-out 0.6s both;
        }

        @keyframes contactSurface {
            0% { opacity: 0; transform: translateY(28px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .contact-button {
            display: inline-flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.14);
            border-radius: 999px;
            padding: 12px 22px;
            text-decoration: none;
            color: white;
            font-family: var(--font-body);
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.3px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255, 255, 255, 0.28);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .contact-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 179, 0, 0.32), transparent);
            transition: left 0.6s ease;
        }

        .contact-button:hover {
            background: rgba(255, 255, 255, 0.94);
            color: var(--itau-terracotta);
            border-color: rgba(255, 255, 255, 0.95);
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(143, 58, 0, 0.28);
        }

        .contact-button:hover::before {
            left: 100%;
        }

        .contact-button i {
            margin-right: 9px;
            font-size: 16px;
            color: var(--itau-amber);
        }

        .contact-button:hover i {
            color: var(--itau-orange);
        }

        .contact-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .contact-cta {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.72);
            font-weight: 400;
            animation: ctaPulse 3s ease-in-out infinite;
        }

        @keyframes ctaPulse {
            0%, 100% { opacity: 0.72; transform: scale(1); }
            50% { opacity: 0.95; transform: scale(1.02); }
        }

        .location {
            display: flex;
            align-items: center;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.92);
        }

        .location i {
            margin-right: 6px;
            color: var(--itau-amber);
        }

        /* ===== SEÇÕES — revelação em cascata ===== */
        .section {
            padding: 55px 80px;
            position: relative;
            opacity: 0;
            transform: translateY(45px);
            animation: sectionSurface 0.8s ease-out forwards;
        }

        .section:nth-of-type(1) { animation-delay: 0.2s; }
        .section:nth-of-type(2) { animation-delay: 0.4s; }
        .section:nth-of-type(3) { animation-delay: 0.6s; }
        .section:nth-of-type(4) { animation-delay: 0.8s; }
        .section:nth-of-type(5) { animation-delay: 1.0s; }

        @keyframes sectionSurface {
            0% { opacity: 0; transform: translateY(45px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .section:not(:last-child)::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 80px;
            right: 80px;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--border-color), transparent);
        }

        .section-title {
            background: var(--background-gradient);
            color: white;
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 32px;
            padding: 14px 32px;
            border-radius: 999px;
            letter-spacing: 1.6px;
            text-transform: lowercase;
            box-shadow: 0 8px 24px rgba(255, 98, 0, 0.28);
            display: inline-block;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .section-title::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.22), transparent);
            animation: titleShimmer 4.5s ease-in-out infinite;
        }

        @keyframes titleShimmer {
            0% { left: -100%; }
            50%, 100% { left: 100%; }
        }

        .section-title:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(255, 98, 0, 0.4);
        }

        .profile-text {
            font-size: 16px;
            line-height: 1.85;
            color: var(--text-color);
            text-align: justify;
        }

        /* ===== SKILLS — seixos polidos ===== */
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 26px;
        }

        @media (max-width: 1000px) {
            .skills-grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 600px) {
            .skills-grid { grid-template-columns: 1fr; }
        }

        .skills-column {
            background: linear-gradient(160deg, rgba(255, 244, 236, 0.95), rgba(255, 244, 236, 0.4));
            padding: 28px;
            border-radius: 24px;
            border: 1px solid rgba(255, 98, 0, 0.14);
            border-top: 4px solid var(--itau-orange);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 32px rgba(51, 38, 28, 0.06);
            opacity: 0;
            transform: translateY(35px);
            animation: panelSurface 0.8s ease forwards;
            position: relative;
        }

        .skills-column:nth-child(1) { animation-delay: 0.3s; border-top-color: var(--itau-orange); }
        .skills-column:nth-child(2) { animation-delay: 0.5s; border-top-color: var(--itau-amber); }
        .skills-column:nth-child(3) { animation-delay: 0.7s; border-top-color: var(--itau-green); }

        @keyframes panelSurface {
            to { opacity: 1; transform: translateY(0); }
        }

        .skills-column:hover {
            transform: translateY(-5px);
            box-shadow: 0 16px 44px rgba(255, 98, 0, 0.16);
            border-color: rgba(255, 98, 0, 0.3);
        }

        .tool-item {
            margin-bottom: 18px;
        }

        .tool-name {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 500;
            font-size: 14px;
            margin-bottom: 8px;
            color: var(--text-color);
            gap: 8px;
        }

        .tool-percentage {
            font-size: 11px;
            font-weight: 700;
            color: var(--itau-terracotta);
            background: linear-gradient(135deg, rgba(255, 98, 0, 0.12), rgba(255, 179, 0, 0.2));
            border: 1px solid rgba(255, 98, 0, 0.2);
            padding: 3px 11px;
            border-radius: 999px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .dots-container {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-wrap: nowrap;
        }

        .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background-color: rgba(194, 78, 0, 0.14);
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .dot.filled {
            background: linear-gradient(135deg, var(--itau-orange) 0%, var(--itau-amber) 100%);
            box-shadow: 0 1px 4px rgba(255, 98, 0, 0.45);
            animation: dotGlow 2.2s ease-in-out infinite alternate;
        }

        @keyframes dotGlow {
            0% { transform: scale(1); box-shadow: 0 1px 3px rgba(255, 98, 0, 0.35); }
            100% { transform: scale(1.14); box-shadow: 0 2px 8px rgba(255, 179, 0, 0.6); }
        }

        .tool-item:hover .dot.filled {
            background: linear-gradient(135deg, var(--itau-amber) 0%, var(--itau-orange) 100%);
            transform: scale(1.22);
        }

        /* ===== Tooltips ===== */
        .tooltip { position: relative; display: inline-block; cursor: help; }

        .tooltip .tooltip-icon {
            color: var(--itau-amber);
            font-size: 14px;
            margin-left: 5px;
            transition: transform 0.2s, color 0.2s;
        }

        .tooltip:hover .tooltip-icon,
        .tooltip:focus .tooltip-icon,
        .tooltip:active .tooltip-icon {
            color: var(--itau-orange);
            transform: scale(1.2);
        }

        .tooltip .tooltip-text {
            visibility: hidden;
            width: 380px;
            background: linear-gradient(145deg, var(--itau-terracotta), var(--itau-burnt));
            color: white;
            text-align: left;
            border-radius: 20px;
            padding: 0;
            position: absolute;
            z-index: 100;
            bottom: 125%;
            left: 50%;
            margin-left: -190px;
            opacity: 0;
            transition: opacity 0.4s, transform 0.3s;
            transform: translateY(10px);
            font-size: 13px;
            line-height: 1.5;
            box-shadow: 0 10px 40px rgba(143, 58, 0, 0.4);
            overflow: hidden;
            max-height: 85vh;
            overflow-y: auto;
        }

        .tooltip .tooltip-text::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -8px;
            border-width: 8px;
            border-style: solid;
            border-color: var(--itau-burnt) transparent transparent transparent;
        }

        .tooltip:hover .tooltip-text,
        .tooltip:focus .tooltip-text,
        .tooltip:active .tooltip-text,
        .tooltip.tooltip-active .tooltip-text {
            visibility: visible;
            opacity: 1;
            transform: translateY(0);
            min-height: 330px;
        }

        .tooltip-active .tooltip-text {
            position: absolute;
            z-index: 9999;
            overflow-y: auto;
        }

        .tooltip-header {
            background-color: rgba(255, 255, 255, 0.08);
            padding: 12px 18px;
            font-weight: 600;
            font-size: 1.05em;
            border-bottom: 1px solid rgba(255, 255, 255, 0.18);
            color: white;
        }

        .tooltip-content { padding: 18px; }
        .tooltip-section { margin-bottom: 15px; }
        .tooltip-section:last-of-type { margin-bottom: 0; }

        .tooltip-section-title {
            display: flex;
            align-items: center;
            font-weight: 500;
            font-size: 1em;
            color: #ffffff;
            margin-bottom: 10px;
        }

        .tooltip-section-title .fas {
            margin-right: 12px;
            font-size: 1.1em;
            width: 20px;
            text-align: center;
            color: var(--itau-amber);
        }

        .tooltip-list { list-style-position: outside; padding-left: 20px; margin-top: 5px; }
        .tooltip-list li { margin-bottom: 10px; line-height: 1.5; }
        .tooltip-list li::marker { color: rgba(255, 255, 255, 0.7); }

        @media (max-width: 768px) {
            .tooltip .tooltip-text {
                width: 90vw;
                max-width: 320px;
                left: 50%;
                transform: translateX(-50%);
                margin-left: 0;
                font-size: 12px;
                max-height: 75vh;
            }

            .tooltip-active .tooltip-text {
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%) !important;
                width: 90vw;
                max-width: 380px;
                z-index: 10000;
            }
        }

        /* ===== EXPERIÊNCIA — o curso do rio ===== */
        #experience-container {
            position: relative;
            padding-left: 46px;
        }

        /* Correnteza — linha fluida que acompanha a trajetória */
        #experience-container::before {
            content: "";
            position: absolute;
            left: 14px;
            top: 10px;
            bottom: 10px;
            width: 5px;
            border-radius: 999px;
            background: linear-gradient(to bottom, var(--itau-amber), var(--itau-orange), var(--itau-burnt));
            opacity: 0.4;
        }

        .experience-item {
            margin-bottom: 32px;
            position: relative;
            padding: 32px;
            border-radius: 26px;
            background: linear-gradient(150deg, rgba(255, 255, 255, 0.96), rgba(255, 244, 236, 0.75));
            box-shadow: 0 8px 32px rgba(51, 38, 28, 0.06);
            border: 1px solid rgba(255, 98, 0, 0.14);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
            transform: translateY(50px);
        }

        .experience-item.animate-in {
            animation: cardSurface 0.8s cubic-bezier(0.22, 0.9, 0.36, 1) forwards;
        }

        @keyframes cardSurface {
            0% { opacity: 0; transform: translateY(50px); }
            80% { transform: translateY(-4px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .experience-item:hover {
            transform: translateY(-4px);
            border-color: rgba(255, 98, 0, 0.35);
            box-shadow: 0 14px 44px rgba(255, 98, 0, 0.16);
        }

        .experience-item:hover,
        .experience-item:focus-within {
            overflow: visible !important;
        }

        /* Seixo âmbar marcando cada etapa na correnteza */
        .experience-item::before {
            content: "";
            position: absolute;
            left: -39px;
            top: 38px;
            width: 15px;
            height: 13px;
            border-radius: var(--stone-radius-b);
            background: var(--itau-amber);
            border: 3px solid white;
            box-shadow: 0 0 0 3px rgba(255, 179, 0, 0.35), 0 0 12px rgba(255, 179, 0, 0.5);
            z-index: 1;
        }

        .job-title {
            font-weight: 800;
            font-size: 21px;
            color: var(--itau-terracotta);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* Número do cargo — pedra de rio laranja */
        .job-number {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 42px;
            height: 38px;
            background: linear-gradient(135deg, var(--itau-orange), var(--itau-amber));
            color: white;
            border-radius: var(--stone-radius-a);
            font-size: 16px;
            font-weight: 800;
            box-shadow: 0 4px 14px rgba(255, 98, 0, 0.4);
            flex-shrink: 0;
            animation: pebbleBob 5s ease-in-out infinite;
        }

        @keyframes pebbleBob {
            0%, 100% { transform: translateY(0) rotate(0deg); border-radius: 58% 42% 44% 56% / 52% 58% 42% 48%; }
            50% { transform: translateY(-4px) rotate(3deg); border-radius: 44% 56% 58% 42% / 46% 44% 56% 54%; }
        }

        .company {
            font-weight: 600;
            font-size: 16px;
            color: var(--itau-orange);
            margin-bottom: 5px;
        }

        .period {
            font-size: 12.5px;
            font-weight: 600;
            color: var(--itau-terracotta);
            margin-bottom: 16px;
            display: inline-block;
            background: rgba(255, 98, 0, 0.08);
            padding: 5px 16px;
            border-radius: 999px;
            border: 1px solid rgba(255, 98, 0, 0.18);
        }

        .job-description {
            font-size: 15px;
            line-height: 1.65;
            color: var(--text-color);
            margin-bottom: 20px;
        }

        .achievements-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        @media (max-width: 900px) {
            .achievements-container { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 600px) {
            .achievements-container { grid-template-columns: 1fr; }
        }

        .achievement-item {
            background: linear-gradient(135deg, rgba(255, 98, 0, 0.05), rgba(255, 179, 0, 0.06));
            border-radius: 20px;
            padding: 18px;
            border: 1px solid rgba(255, 98, 0, 0.13);
            display: flex;
            align-items: flex-start;
            gap: 12px;
            transition: all 0.3s ease;
        }

        .achievement-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 22px rgba(255, 98, 0, 0.16);
            border-color: rgba(255, 98, 0, 0.4);
        }

        .achievement-icon {
            font-size: 22px;
            color: var(--itau-orange);
            flex-shrink: 0;
        }

        .achievement-content { flex: 1; }

        .achievement-title {
            font-weight: 600;
            font-size: 15px;
            color: var(--itau-terracotta);
            margin-bottom: 6px;
        }

        .achievement-description {
            font-size: 14px;
            line-height: 1.5;
            color: var(--text-color);
        }

        /* ===== FORMAÇÃO ===== */
        #education-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
        }

        @media (max-width: 700px) {
            #education-container { grid-template-columns: 1fr; }
        }

        .education-item {
            background: linear-gradient(160deg, rgba(255, 244, 236, 0.95), rgba(255, 244, 236, 0.4));
            padding: 26px;
            border-radius: 24px;
            border: 1px solid rgba(255, 98, 0, 0.14);
            border-left: 5px solid var(--itau-amber);
            transition: all 0.3s ease;
        }

        .education-item:hover {
            transform: translateY(-3px);
            border-left-color: var(--itau-orange);
            box-shadow: 0 10px 28px rgba(255, 98, 0, 0.14);
        }

        .degree {
            font-weight: 800;
            font-size: 18px;
            color: var(--itau-terracotta);
            margin-bottom: 8px;
        }

        .university {
            font-size: 15px;
            color: var(--text-color);
            margin-bottom: 8px;
        }

        .thesis {
            font-size: 14px;
            font-style: italic;
            color: #8a7263;
        }

        .cta-button {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 14px;
            padding: 9px 20px;
            background: var(--background-gradient);
            color: white;
            border-radius: 999px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            box-shadow: 0 4px 14px rgba(255, 98, 0, 0.3);
            transition: all 0.3s ease;
        }

        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 22px rgba(255, 98, 0, 0.42);
        }

        /* ===== PROJETOS ===== */
        #projects-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 22px;
        }

        @media (max-width: 900px) {
            #projects-container { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 600px) {
            #projects-container { grid-template-columns: 1fr; }
        }

        .project-item {
            background: linear-gradient(150deg, rgba(255, 255, 255, 0.96), rgba(255, 244, 236, 0.75));
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(51, 38, 28, 0.06);
            border: 1px solid rgba(255, 98, 0, 0.14);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            opacity: 0;
            transform: translateY(40px);
        }

        .project-item.animate-in {
            animation: cardSurface 0.7s ease forwards;
        }

        /* Confete brasileiro — filete no topo ao passar o mouse */
        .project-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--itau-orange), var(--itau-amber), var(--itau-pink), var(--itau-blue));
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.35s ease;
        }

        .project-item:hover::before {
            transform: scaleX(1);
        }

        .project-item:hover {
            transform: translateY(-6px);
            border-color: rgba(255, 98, 0, 0.35);
            box-shadow: 0 14px 40px rgba(255, 98, 0, 0.18);
        }

        .project-title {
            font-weight: 800;
            font-size: 18px;
            color: var(--itau-terracotta);
            margin-bottom: 12px;
        }

        .project-description {
            font-size: 14px;
            line-height: 1.6;
            color: var(--text-color);
            margin-bottom: 15px;
        }

        /* Tech tags — confete pontual da paleta brasileira */
        .tech-tag {
            display: inline-block;
            background: rgba(255, 98, 0, 0.08);
            color: var(--itau-terracotta);
            padding: 5px 14px;
            border-radius: 999px;
            font-size: 11.5px;
            font-weight: 600;
            margin-right: 8px;
            margin-bottom: 8px;
            border: 1px solid rgba(255, 98, 0, 0.2);
            transition: all 0.25s ease;
        }

        .tech-tag:nth-child(4n+2) {
            background: rgba(30, 91, 198, 0.07);
            color: var(--itau-blue);
            border-color: rgba(30, 91, 198, 0.22);
        }

        .tech-tag:nth-child(4n+3) {
            background: rgba(0, 168, 104, 0.08);
            color: var(--itau-green);
            border-color: rgba(0, 168, 104, 0.24);
        }

        .tech-tag:nth-child(4n) {
            background: rgba(255, 77, 141, 0.07);
            color: var(--itau-pink);
            border-color: rgba(255, 77, 141, 0.24);
        }

        .tech-tag:hover {
            background: var(--itau-orange);
            color: white;
            border-color: var(--itau-orange);
            transform: translateY(-2px);
            box-shadow: 0 3px 12px rgba(255, 98, 0, 0.38);
        }

        /* ===== Controles fixos ===== */
        .print-button {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--background-gradient);
            color: white;
            border: none;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(255, 98, 0, 0.45);
            transition: all 0.3s ease;
            z-index: 100;
        }

        .print-button:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 30px rgba(255, 98, 0, 0.6);
        }

        .print-button i { font-size: 24px; }

        .language-toggle {
            position: fixed;
            top: 30px;
            right: 30px;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 5px;
            display: flex;
            align-items: center;
            box-shadow: 0 4px 20px rgba(51, 38, 28, 0.12);
            transition: all 0.3s ease;
            z-index: 100;
            border: 2px solid rgba(255, 98, 0, 0.25);
        }

        .language-toggle:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(255, 98, 0, 0.3);
            border-color: rgba(255, 98, 0, 0.45);
        }

        .language-option {
            padding: 8px 20px;
            border-radius: 25px;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            color: var(--text-color);
            position: relative;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .language-option i { font-size: 14px; opacity: 0.7; }

        .language-option.active {
            background: var(--background-gradient);
            color: white;
            box-shadow: 0 2px 12px rgba(255, 98, 0, 0.38);
            animation: pulseActive 2s ease-in-out infinite;
        }

        @keyframes pulseActive {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .language-option.active i { opacity: 1; animation: checkRotate 0.5s ease-out; }

        @keyframes checkRotate {
            from { transform: rotate(-180deg); opacity: 0; }
            to { transform: rotate(0deg); opacity: 1; }
        }

        .language-option:not(.active):hover {
            background: rgba(255, 98, 0, 0.07);
            color: var(--itau-orange);
        }

        .language-divider {
            width: 1px;
            height: 20px;
            background: rgba(255, 98, 0, 0.25);
            margin: 0 5px;
        }

        /* ===== Responsivo ===== */
        @media (max-width: 768px) {
            .cv-container { margin: 0; border-radius: 0; max-width: 100%; }
            .header { padding: 50px 20px 70px 20px; min-height: auto; }
            .header-content { padding: 0 10px; }
            .header h1 { font-size: clamp(1.6rem, 7vw, 2.2rem); }
            .brand-logo { top: 18px; right: 20px; padding: 8px; }
            .brand-logo img { width: 56px; height: 56px; }
            .company-tagline { font-size: 11px; letter-spacing: 2px; padding: 8px 14px; }
            .role { font-size: 14px; }
            .contact-info { flex-direction: column; gap: 8px; align-items: stretch; }
            .contact-item { width: 100%; }
            .contact-button { padding: 8px 12px; font-size: 12px; min-height: 38px; width: 100%; justify-content: center; }
            .contact-cta { font-size: 11px; }
            .section { padding: 26px 16px; }
            .section-title { font-size: 13px; margin-bottom: 18px; padding: 9px 18px; }
            #education-container { grid-template-columns: 1fr; }
            .skills-grid { grid-template-columns: 1fr; }
            #experience-container { padding-left: 0; }
            #experience-container::before { display: none; }
            .experience-item::before { display: none; }
            .experience-item { padding: 20px; }
            #projects-container { grid-template-columns: 1fr; }
            .project-item { padding: 18px; }
            .achievements-container { grid-template-columns: 1fr; }
            .section:not(:last-child)::after { left: 16px; right: 16px; }
            .modal-content { width: 95%; margin: 5% auto; padding: 20px; }
            .modal input, .modal textarea { font-size: 16px; padding: 12px; }
            .modal button { min-height: 44px; font-size: 14px; }
            .print-button, .language-toggle {
                position: fixed;
                bottom: 20px;
                top: auto;
                min-height: 40px;
                z-index: 100;
            }
            .print-button { right: 20px; }
            .language-toggle { right: auto; left: 20px; }
        }

        @media (max-width: 480px) {
            .header h1 { font-size: 1.45rem; }
            .section { padding: 18px 12px; }
            .section-title { font-size: 12px; }
        }

        /* Acessibilidade — movimento reduzido */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
            .section, .skills-column, .experience-item, .project-item {
                opacity: 1 !important;
                transform: none !important;
            }
        }

        /* ===== Impressão ===== */
        @media print {
            body { background: white; }
            .animated-bg, .bg-stone, .river-stones, .stone,
            .print-button, .language-toggle { display: none !important; }
            .cv-container { box-shadow: none; border: none; margin: 0; }
            .section, .skills-column, .experience-item, .project-item {
                opacity: 1 !important;
                transform: none !important;
                animation: none !important;
            }
            .section-title {
                background: var(--itau-orange) !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
            .header {
                background: var(--itau-orange) !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
                page-break-inside: avoid;
                padding: 30px !important;
                min-height: auto;
            }
            .header::after, .header::before { display: none !important; }
        }
    </style>

    <script>
        function openEmailForm() { document.getElementById('emailModal').style.display = 'flex'; }
        function closeEmailModal() { document.getElementById('emailModal').style.display = 'none'; }
        function openPhoneForm() { document.getElementById('phoneModal').style.display = 'flex'; }
        function closePhoneModal() { document.getElementById('phoneModal').style.display = 'none'; }

        window.onclick = function(event) {
            if (event.target == document.getElementById('emailModal')) closeEmailModal();
            if (event.target == document.getElementById('phoneModal')) closePhoneModal();
        }

        document.addEventListener('DOMContentLoaded', function() {
            var lang = 'pt';
            initializeBasicContent(lang);
            renderSkills('skills-strategic', 'strategic', lang);
            renderSkills('skills-tools', 'tools', lang);
            renderSkills('skills-emerging', 'emerging', lang);
            renderExperienceTimeline(lang);
            renderEducation(lang);
            renderProjects(lang);
            initializeModalTexts(lang);

            var inputs = document.querySelectorAll('input, textarea');
            inputs.forEach(function(input) {
                input.addEventListener('focus', function() { this.style.borderColor = 'var(--itau-orange)'; });
                input.addEventListener('blur', function() { this.style.borderColor = '#f3e3d7'; });
            });

            var tooltips = document.querySelectorAll('.tooltip');
            tooltips.forEach(function(tooltip) {
                tooltip.addEventListener('click', function(e) {
                    e.stopPropagation();
                    tooltips.forEach(function(t) { if (t !== tooltip) t.classList.remove('tooltip-active'); });
                    tooltip.classList.toggle('tooltip-active');
                });
            });

            document.addEventListener('click', function() {
                tooltips.forEach(function(tooltip) { tooltip.classList.remove('tooltip-active'); });
            });

            // Scroll-reveal — os cards emergem como pedras na correnteza
            var observer = new IntersectionObserver(function(entries) {
                entries.forEach(function(entry) {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('animate-in');
                        observer.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });

            setTimeout(function() {
                document.querySelectorAll('.experience-item, .project-item').forEach(function(item) {
                    observer.observe(item);
                });
            }, 100);
        });
    </script>
