<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedro Marconato - CV | MeuTudo</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            /* MeuTudo Brand Colors */
            --meutudo-primary: #d80073;
            --meutudo-white: #FFFFFF;
            --meutudo-light-gray: #F5F5F5;
            --meutudo-medium-gray: #808080;
            --meutudo-dark-gray: #333333;
            
            /* Applied Colors */
            --primary-color: #d80073;
            --secondary-color: #ff1493;
            --accent-color: #d80073;
            --text-color: #333333;
            --light-accent: #F5F5F5;
            --border-color: rgba(216, 0, 115, 0.2);
            --background-gradient: linear-gradient(135deg, #d80073 0%, #ff1493 100%);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: var(--text-color);
            line-height: 1.6;
            background: #f8faf7;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        
        /* MeuTudo Illustration Background */
        .illustration-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        
        .illustration-1 {
            position: absolute;
            top: -10%;
            right: -5%;
            width: 400px;
            height: 400px;
            background: url('../../assets/images/meutudo/meutudoilustracao.svg') no-repeat center;
            background-size: contain;
            opacity: 0.08;
            transform: rotate(15deg);
            animation: floatAnimation 15s ease-in-out infinite;
        }
        
        .illustration-2 {
            position: absolute;
            bottom: -10%;
            left: -5%;
            width: 350px;
            height: 350px;
            background: url('../../assets/images/meutudo/meutudoilustracao2.webp') no-repeat center;
            background-size: contain;
            opacity: 0.06;
            transform: rotate(-10deg);
            animation: floatAnimation 20s ease-in-out infinite reverse;
        }
        
        @keyframes floatAnimation {
            0%, 100% {
                transform: translateY(0) rotate(15deg);
            }
            50% {
                transform: translateY(-20px) rotate(10deg);
            }
        }
        
        /* Gradient Orbs */
        .gradient-orb {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, var(--meutudo-primary), transparent);
            filter: blur(40px);
            opacity: 0.3;
            animation: orbFloat 20s ease-in-out infinite;
        }
        
        .orb-1 {
            width: 300px;
            height: 300px;
            top: 10%;
            left: -5%;
            animation-delay: 0s;
        }
        
        .orb-2 {
            width: 250px;
            height: 250px;
            bottom: 20%;
            right: -5%;
            animation-delay: 10s;
        }
        
        @keyframes orbFloat {
            0%, 100% {
                transform: translate(0, 0) scale(1);
            }
            33% {
                transform: translate(30px, -30px) scale(1.1);
            }
            66% {
                transform: translate(-20px, 20px) scale(0.9);
            }
        }

        /* Floating fintech coins (decorative) */
        .coin {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            border: 2px solid rgba(216, 0, 115, 0.35);
            box-shadow: inset 0 0 0 3px rgba(216, 0, 115, 0.08);
            color: rgba(216, 0, 115, 0.55);
            font-weight: 800;
            opacity: 0.18;
            animation: coinFloat 14s ease-in-out infinite;
        }

        .coin::before {
            content: 'R$';
            display: block;
            animation: coinSpin 9s ease-in-out infinite;
        }

        .coin-1 { width: 64px; height: 64px; font-size: 20px; top: 18%; left: 6%; }
        .coin-2 { width: 44px; height: 44px; font-size: 14px; top: 55%; right: 4%; animation-delay: 3s; }
        .coin-3 { width: 52px; height: 52px; font-size: 16px; bottom: 10%; left: 12%; animation-delay: 6s; }

        @keyframes coinFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-28px); }
        }

        @keyframes coinSpin {
            0%, 55% { transform: rotateY(0); }
            70% { transform: rotateY(180deg); }
            85%, 100% { transform: rotateY(360deg); }
        }

        /* Pulsing rings (decorative) */
        .ring {
            position: absolute;
            border-radius: 50%;
            border: 2px solid rgba(216, 0, 115, 0.25);
            animation: ringPulse 6s ease-out infinite;
        }

        .ring-1 { width: 120px; height: 120px; top: 30%; right: 10%; }
        .ring-2 { width: 90px; height: 90px; bottom: 22%; left: 5%; animation-delay: 3s; }

        @keyframes ringPulse {
            0% { transform: scale(0.7); opacity: 0; }
            35% { opacity: 0.35; }
            100% { transform: scale(1.35); opacity: 0; }
        }
        
        /* Container */
        .cv-container {
            max-width: 1000px;
            margin: 30px auto;
            padding: 40px;
            position: relative;
            z-index: 1;
        }
        
        /* Header Section - MeuTudo Redesign */
        .header {
            background: linear-gradient(135deg, #ffffff 0%, rgba(255, 255, 255, 0.98) 40%, rgba(216, 0, 115, 0.03) 100%);
            padding: 70px 60px 50px;
            position: relative;
            overflow: visible;
            border-top: 4px solid var(--meutudo-primary);
            margin-top: 20px;
        }
        
        .header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--meutudo-primary), transparent);
        }
        
        @keyframes pinkGlowPulse {
            0%, 100% {
                box-shadow: 0 6px 25px rgba(216, 0, 115, 0.3);
            }
            50% {
                box-shadow: 0 8px 38px rgba(216, 0, 115, 0.5);
            }
        }
        
        /* Shimmer Effect */
        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, 
                transparent 30%, 
                rgba(255, 255, 255, 0.1) 50%, 
                transparent 70%);
            animation: shimmer 3s infinite;
        }
        
        @keyframes shimmer {
            0% {
                transform: translateX(-100%) translateY(-100%) rotate(45deg);
            }
            100% {
                transform: translateX(100%) translateY(100%) rotate(45deg);
            }
        }
        
        .header-content {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 40px;
        }
        
        .header-left {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 15px;
        }
        
        .header-center {
            display: none;
        }
        
        .header-right {
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            position: relative;
        }
        
        .header-illustration {
            position: absolute;
            width: 350px;
            height: 350px;
            opacity: 0.08;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            animation: floatAnimation 15s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }
        
        .header-svg {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        .header-pattern {
            position: absolute;
            top: 0;
            right: 0;
            width: 300px;
            height: 100%;
            background: url('../../assets/images/meutudo/logo2.png') no-repeat;
            background-position: right center;
            background-size: 200px;
            opacity: 0.03;
            pointer-events: none;
        }
        
        .header-info {
            flex: 1;
        }
        
        .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        .logo {
            height: auto;
            transition: all 0.3s ease;
            cursor: pointer;
            position: absolute;
        }
        
        .logo-main {
            width: 280px;
            height: auto;
            filter: drop-shadow(0 6px 20px rgba(216, 0, 115, 0.3));
            animation: logoFloat 4s ease-in-out infinite;
            position: relative;
        }
        
        
        .logo-main:hover {
            transform: scale(1.05) rotate(-2deg);
            filter: drop-shadow(0 8px 30px rgba(216, 0, 115, 0.5));
        }
        
        
        .contact-row {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 12px;
        }
        
        @keyframes logoFloat {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }
        
        
        .header h1 {
            font-size: 46px;
            font-weight: 800;
            color: var(--meutudo-primary);
            margin-bottom: 15px;
            letter-spacing: -1.5px;
            position: relative;
            display: inline-block;
        }
        
        .header h1::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 0;
            width: 120px;
            height: 4px;
            background: linear-gradient(90deg, #d80073, #ff1493, #d80073);
            background-size: 200% 100%;
            border-radius: 2px;
            animation: underlineGrow 0.9s cubic-bezier(0.22, 0.61, 0.36, 1) 0.3s backwards,
                       gradientPulse 5s ease-in-out infinite;
        }

        @keyframes underlineGrow {
            from { width: 0; opacity: 0; }
            to { width: 120px; opacity: 1; }
        }

        @keyframes gradientPulse {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        .role {
            font-size: 18px;
            font-weight: 600;
            color: var(--meutudo-dark-gray);
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 3px;
            position: relative;
            padding-left: 35px;
        }
        
        .role::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 25px;
            height: 2px;
            background: var(--meutudo-primary);
        }
        
        .contact-info {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 30px;
        }
        
        .contact-button {
            display: inline-flex;
            align-items: center;
            background: white;
            border-radius: 50px;
            padding: 10px 18px;
            text-decoration: none;
            color: var(--meutudo-primary);
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s ease;
            border: 2px solid var(--meutudo-primary);
            cursor: pointer;
            position: relative;
            z-index: 10;
            font-family: inherit;
            outline: none;
            box-shadow: 0 2px 8px rgba(216, 0, 115, 0.15);
        }
        
        button.contact-button {
            border: 2px solid var(--meutudo-primary);
            font-family: inherit;
        }
        
        .contact-button:hover {
            background: var(--background-gradient);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(216, 0, 115, 0.3);
            border-color: var(--meutudo-primary);
        }
        
        .contact-button:focus {
            outline: 2px solid var(--meutudo-primary);
            outline-offset: 2px;
        }
        
        .contact-button:active {
            transform: translateY(0);
            background: var(--meutudo-primary);
            color: white;
        }
        
        .contact-button i {
            margin-right: 8px;
            font-size: 16px;
        }
        
        .location {
            display: flex;
            align-items: center;
            font-size: 14px;
            color: var(--meutudo-dark-gray);
            margin-top: 10px;
            justify-content: center;
            font-weight: 500;
        }
        
        .location i {
            margin-right: 6px;
        }
        
        /* Sections */
        .section {
            margin: 40px 0;
            padding: 40px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
            position: relative;
            overflow: hidden;
        }
        
        .section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(180deg, #d80073, #ff1493, #d80073);
            background-size: 100% 200%;
            animation: gradientBarSlide 8s ease-in-out infinite;
        }

        @keyframes gradientBarSlide {
            0%, 100% { background-position: 50% 0%; }
            50% { background-position: 50% 100%; }
        }
        
        .section-title {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-color);
            margin-bottom: 25px;
            display: flex;
            align-items: center;
        }
        
        .section-title i {
            color: var(--meutudo-primary);
            margin-right: 12px;
            font-size: 24px;
        }
        
        /* Skills Grid */
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .skill-category {
            background: var(--light-accent);
            padding: 25px;
            border-radius: 16px;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }
        
        .skill-category:hover {
            transform: translateY(-3px);
            border-color: var(--meutudo-primary);
            box-shadow: 0 5px 20px rgba(216, 0, 115, 0.15);
        }
        
        .skill-category h3 {
            color: var(--meutudo-primary);
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
        }
        
        /* Skill entries generated by renderSkills() from cv-texts.js */
        .tool-item {
            margin-bottom: 16px;
        }

        .tool-item:last-child {
            margin-bottom: 0;
        }

        .tool-name {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-color);
            margin-bottom: 6px;
        }

        .tool-percentage {
            font-size: 11px;
            font-weight: 600;
            color: var(--meutudo-primary);
            background: rgba(216, 0, 115, 0.1);
            padding: 2px 10px;
            border-radius: 20px;
            white-space: nowrap;
        }

        .dots-container {
            display: flex;
            gap: 4px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #e8e8e8;
        }

        .dot.filled {
            background: var(--background-gradient);
            box-shadow: 0 0 4px rgba(216, 0, 115, 0.35);
            animation: dotPop 0.45s ease backwards;
        }

        @keyframes dotPop {
            0% { transform: scale(0); }
            70% { transform: scale(1.35); }
            100% { transform: scale(1); }
        }
        
        /* Experience Timeline */
        .timeline {
            position: relative;
            padding-left: 40px;
        }
        
        .timeline::before {
            content: '';
            position: absolute;
            left: 15px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--background-gradient);
        }
        
        .timeline-item {
            position: relative;
            margin-bottom: 30px;
            cursor: pointer;
        }
        
        .timeline-item::before {
            content: '';
            position: absolute;
            left: -30px;
            top: 5px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--meutudo-primary);
            border: 3px solid white;
            box-shadow: 0 0 0 3px rgba(216, 0, 115, 0.2);
            animation: timelinePulse 3.5s ease-in-out infinite;
        }

        @keyframes timelinePulse {
            0%, 100% { box-shadow: 0 0 0 3px rgba(216, 0, 115, 0.2); }
            50% { box-shadow: 0 0 0 7px rgba(216, 0, 115, 0.08); }
        }
        
        .timeline-content {
            background: var(--light-accent);
            padding: 20px;
            border-radius: 12px;
            transition: all 0.3s ease;
            position: relative;
        }
        
        .timeline-content:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 20px rgba(216, 0, 115, 0.15);
            border: 1px solid rgba(216, 0, 115, 0.2);
        }
        
        /* Tooltip styles - Willbank pattern */
        .tooltip {
            position: relative;
            display: inline-block;
            cursor: help;
        }
        
        .tooltip .tooltip-icon {
            color: var(--meutudo-primary);
            font-size: 14px;
            margin-left: 8px;
            transition: transform 0.2s, color 0.2s;
        }
        
        .tooltip:hover .tooltip-icon,
        .tooltip:focus .tooltip-icon,
        .tooltip:active .tooltip-icon {
            color: var(--secondary-color);
            transform: scale(1.2);
        }
        
        .tooltip .tooltip-text {
            visibility: hidden;
            width: 380px;
            background: linear-gradient(145deg, var(--text-color), var(--meutudo-dark-gray));
            color: white;
            text-align: left;
            border-radius: 12px;
            padding: 0;
            position: fixed;
            z-index: 10000;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) translateY(10px);
            opacity: 0;
            transition: opacity 0.4s, transform 0.3s, visibility 0.4s;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            border: 2px solid rgba(216, 0, 115, 0.4);
            backdrop-filter: blur(15px);
            overflow: hidden;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .tooltip .tooltip-text::after {
            display: none;
        }
        
        .tooltip:hover .tooltip-text,
        .tooltip:focus .tooltip-text,
        .tooltip:active .tooltip-text,
        .tooltip.tooltip-active .tooltip-text {
            visibility: visible;
            opacity: 1;
            transform: translate(-50%, -50%);
            min-height: 330px;
        }
        
        .tooltip-active .tooltip-text {
            position: fixed !important;
            z-index: 10000 !important;
        }
        
        .tooltip-header {
            background-color: rgba(216, 0, 115, 0.1);
            padding: 12px 18px;
            font-weight: 600;
            font-size: 1.05em;
            border-bottom: 1px solid rgba(216, 0, 115, 0.2);
            color: white;
        }
        
        .tooltip-content {
            padding: 18px;
        }
        
        .tooltip-section {
            margin-bottom: 15px;
        }
        
        .tooltip-section:last-of-type {
            margin-bottom: 0;
        }
        
        .tooltip-section-title {
            display: flex;
            align-items: center;
            font-weight: 500;
            font-size: 1em;
            color: #ffffff;
            margin-bottom: 10px;
        }
        
        .tooltip-section-title .fas {
            margin-right: 12px;
            font-size: 1.1em;
            width: 20px;
            text-align: center;
            opacity: 1;
            color: #f0f0f0;
        }
        
        .tooltip-list {
            list-style-position: outside;
            padding-left: 20px;
            margin-top: 5px;
        }
        
        .tooltip-list li {
            margin-bottom: 10px;
            line-height: 1.5;
        }
        
        .tooltip-list li::marker {
            color: rgba(255, 255, 255, 0.7);
        }
        
        /* Mobile responsiveness for tooltips */
        @media (max-width: 768px) {
            .tooltip .tooltip-text {
                width: 90vw;
                max-width: 320px;
                left: 50%;
                transform: translateX(-50%);
                margin-left: 0;
                font-size: 12px;
                max-height: 75vh;
            }
            
            .tooltip-active .tooltip-text {
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%) !important;
                width: 90vw;
                max-width: 380px;
                z-index: 10000;
            }
        }
        
        .timeline-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }
        
        .timeline-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-color);
        }
        
        .timeline-date {
            font-size: 13px;
            color: var(--meutudo-primary);
            font-weight: 500;
            background: rgba(216, 0, 115, 0.1);
            padding: 4px 10px;
            border-radius: 20px;
        }
        
        .timeline-company {
            font-size: 14px;
            color: var(--meutudo-medium-gray);
            margin-bottom: 10px;
            font-weight: 500;
        }
        
        .timeline-description {
            color: var(--meutudo-medium-gray);
            font-size: 14px;
            line-height: 1.6;
        }
        
        /* Achievements Quadrants */
        .achievements-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 15px;
        }
        
        .achievement-item {
            display: flex;
            align-items: flex-start;
            background: rgba(216, 0, 115, 0.05);
            padding: 12px;
            border-radius: 10px;
            border-left: 3px solid var(--meutudo-primary);
            transition: all 0.3s ease;
        }
        
        .achievement-item:hover {
            background: rgba(216, 0, 115, 0.1);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(216, 0, 115, 0.15);
        }
        
        .achievement-icon {
            background: var(--background-gradient);
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 10px;
            font-size: 14px;
            flex-shrink: 0;
        }
        
        .achievement-content {
            flex: 1;
        }
        
        .achievement-title {
            font-weight: 600;
            font-size: 12px;
            color: var(--meutudo-primary);
            margin-bottom: 4px;
            line-height: 1.3;
        }
        
        .achievement-description {
            font-size: 11px;
            color: var(--text-color);
            line-height: 1.4;
        }
        
        /* Projects Grid */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin-top: 25px;
        }
        
        .project-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
            position: relative;
            border: 2px solid transparent;
        }
        
        .project-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--background-gradient);
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }
        
        .project-card:hover::before {
            transform: scaleX(1);
        }
        
        .project-card:hover {
            transform: translateY(-5px);

            border-color: var(--meutudo-primary);

        .project-title {

            font-weight: 600;
            color: var(--text-color);

        }
        
        .project-description {

            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 15px;

        .project-tech {

            flex-wrap: wrap;

        .tech-tag {
            background: rgba(216, 0, 115, 0.1);

            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.3s ease;

        .tech-tag:hover {
            background: var(--background-gradient);
            color: white;
            transform: scale(1.05);
        }
        
        /* Print Button */
        .print-button {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--background-gradient);
            color: white;
            border: none;
            border-radius: 50%;
            width: 64px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: center;

            cursor: pointer;
            box-shadow: 0 6px 25px rgba(216, 0, 115, 0.3);
            transition: all 0.3s ease;
            z-index: 100;
        }
        
        .print-button {
            animation: pinkGlowPulse 4s ease-in-out infinite;
        }

        .print-button:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 35px rgba(216, 0, 115, 0.4);
        }

            font-size: 26px;

        /* Language Toggle */
        .language-toggle {
            position: fixed;
            top: 30px;

            align-items: center;
            gap: 8px;

        .language-option.active {
            background: var(--background-gradient);
            color: white;
            box-shadow: 0 4px 15px rgba(216, 0, 115, 0.3);
        }
        
        .language-option:not(.active):hover {
            background: rgba(216, 0, 115, 0.1);
            color: var(--meutudo-primary);
        }
        
        .language-divider {
            width: 1px;
            height: 24px;
            background: rgba(216, 0, 115, 0.2);
            margin: 0 6px;
        }
        
        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            z-index: 9999;
            overflow-y: auto;
        }
        
        .modal.active {
            display: flex !important;
            justify-content: center;
            align-items: center;
        }
        
        .modal-content {
            background-color: white;
            padding: 40px;
            border-radius: 16px;
            width: 90%;
            max-width: 500px;
            position: relative;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-height: 90vh;
            overflow-y: auto;
            margin: 20px;
        }
        
        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--meutudo-dark-gray);
            z-index: 10001;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: background 0.3s;
        }
        
        .modal-close:hover {
            background: rgba(0, 0, 0, 0.1);
        }
        
        @media (max-width: 768px) {
            .modal-content {
                width: 95%;
                padding: 30px 20px;
                margin: 10px;
            }
        }
        
        /* Responsive Design */
        @media (max-width: 768px) {
            .cv-container {
                padding: 20px;
            }
            
            .header {
                padding: 40px 30px;
            }
            
            .header h1 {
                font-size: 32px;
            }
            
            .role {
                font-size: 20px;
            }
            
            .section {

            }
            
            .projects-grid {
                grid-template-columns: 1fr;
            }
            
            .timeline {
                padding-left: 30px;
            }
            
            .header-content {
                flex-direction: column;
                text-align: center;
            }
            
            .logo-container {
                margin-top: 20px;
            }
        }
        
        /* Scroll reveal (JS adds .js-reveal to body) */
        .js-reveal .reveal {
            opacity: 0;
        }

        .js-reveal .reveal.animate-in {
            animation: revealUp 0.7s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
        }

        .js-reveal .skill-category.reveal.animate-in {
            animation: revealScale 0.6s ease forwards;
        }

        @keyframes revealUp {
            from { opacity: 0; transform: translateY(26px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes revealScale {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Reduced motion */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }

            .js-reveal .reveal {
                opacity: 1 !important;
            }

            .coin, .ring, .gradient-orb {
                display: none;
            }
        }

        /* Print Styles */
        @media print {
            body {
                background: white;
            }

            .illustration-bg,

                display: none;

                color: var(--text-color) !important;
            }
            
            .section {
                box-shadow: none;
                border: 1px solid #e0e0e0;
            }
        }
    </style>

    <script src="../../assets/js/cv-texts.js"></script>
    <script>
        // Modal functions
        function openEmailForm() {
            const modal = document.getElementById('emailModal');
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeEmailModal() {
            const modal = document.getElementById('emailModal');
            modal.classList.remove('active');
            document.body.style.overflow = '';
        }

        function openPhoneForm() {
            const modal = document.getElementById('phoneModal');
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closePhoneModal() {
            const modal = document.getElementById('phoneModal');
            modal.classList.remove('active');
            document.body.style.overflow = '';
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            if (event.target.classList && event.target.classList.contains('modal')) {
                if (event.target.id === 'emailModal') {
                    closeEmailModal();
                } else if (event.target.id === 'phoneModal') {
                    closePhoneModal();
                }
            }
        }

        // Render tooltip function (meutudo timeline markup; data from cv-texts.js)
        function renderTooltip(tooltip, jobTitle) {
            if (!tooltip) return '';
            const header = tooltip.header || tooltip.title || jobTitle || '';

            return `
                <span class="tooltip">
                    <i class="fas fa-info-circle tooltip-icon"></i>
                    <div class="tooltip-text">
                        <div class="tooltip-header">${header}</div>
                        <div class="tooltip-content">
                            ${tooltip.sections.map(section => `
                                <div class="tooltip-section">
                                    <div class="tooltip-section-title">
                                        <i class="fas ${section.icon}"></i>
                                        ${section.title}
                                    </div>
                                    <ul class="tooltip-list">
                                        ${section.items.map(item => `<li>${item}</li>`).join('')}
                                    </ul>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </span>
            `;
        }

        // Render achievements function
        function renderAchievements(achievements) {
            if (!achievements) return '';

            return achievements.map(achievement => `
                <div class="achievement-item">
                    <div class="achievement-icon">
                        <i class="fas ${achievement.icon}"></i>
                    </div>
                    <div class="achievement-content">
                        <div class="achievement-title">${achievement.title}</div>
                        <div class="achievement-description">${achievement.description}</div>
                    </div>
                </div>
            `).join('');
        }

        // Render experience section
        function renderExperience(lang = 'en') {
            const container = document.getElementById('cv-experience-timeline');
            if (!container) return;

            const experiences = getText('experience', lang);
            let html = '';

            experiences.forEach((exp, index) => {
                html += `
                    <div class="timeline-item reveal">
                        <div class="timeline-content">
                            <div class="timeline-header">
                                <div>
                                    <h3 class="timeline-title">${exp.title}</h3>
                                    ${renderTooltip(exp.tooltip, exp.title)}
                                </div>
                                <span class="timeline-date">${exp.period}</span>
                            </div>
                            <div class="timeline-company">${exp.company}</div>
                            <p class="timeline-description">${exp.description}</p>
                            <div class="achievements-container">
                                ${renderAchievements(exp.achievements)}
                            </div>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        // Render education section
        function renderEducation(lang = 'en') {
            const container = document.getElementById('cv-education-timeline');
            if (!container) return;

            const education = getText('education', lang);
            let html = '';

            education.forEach(edu => {
                html += `
                    <div class="timeline-item reveal">
                        <div class="timeline-content">
                            <h3 class="timeline-title">${edu.degree}</h3>
                            <div class="timeline-company">${edu.university}</div>
                            <p class="timeline-description">${edu.thesis}</p>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        // Render projects section
        function renderProjects(lang = 'en') {
            const container = document.getElementById('cv-projects-grid');
            if (!container) return;

            const projects = getText('projects', lang);
            let html = '';

            projects.forEach(project => {
                html += `
                    <div class="project-card reveal">
                        <div class="project-content">
                            <h3 class="project-title">${project.title}</h3>
                            <p class="project-description">${project.description}</p>
                            <div class="project-tech">
                                ${project.techs.map(tech => `<span class="tech-tag">${tech}</span>`).join('')}
                            </div>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        // Initialize CV content when DOM is loaded
        document.addEventListener('DOMContentLoaded', function() {
            var lang = 'en';

            // Basic content (name, role, contacts, profile, profile/skills titles) — cv-texts.js
            initializeBasicContent(lang);

            // Remaining section titles
            const experienceTitleEl = document.getElementById('section-experience');
            if (experienceTitleEl) experienceTitleEl.textContent = getText('sections.experience', lang);

            const educationTitleEl = document.getElementById('section-education');
            if (educationTitleEl) educationTitleEl.textContent = getText('sections.education', lang);

            const projectsTitleEl = document.getElementById('section-projects');
            if (projectsTitleEl) projectsTitleEl.textContent = getText('sections.projects', lang);

            // Skills with levels (Expert/Advanced + dots) — renderSkills from cv-texts.js
            renderSkills('skills-strategic', 'strategic', lang);
            renderSkills('skills-tools', 'tools', lang);
            renderSkills('skills-emerging', 'emerging', lang);

            // Sections with meutudo markup, content from cv-texts.js
            renderExperience(lang);
            renderEducation(lang);
            renderProjects(lang);

            // Modal texts
            initializeModalTexts(lang);

            // Clickable tooltips (mobile support)
            const tooltips = document.querySelectorAll('.tooltip');
            tooltips.forEach(tooltip => {
                tooltip.addEventListener('click', function(e) {
                    e.stopPropagation();
                    tooltips.forEach(t => { if (t !== this) t.classList.remove('tooltip-active'); });
                    this.classList.toggle('tooltip-active');
                });
            });

            document.addEventListener('click', function() {
                tooltips.forEach(tooltip => tooltip.classList.remove('tooltip-active'));
            });

            // Scroll reveal with IntersectionObserver
            document.body.classList.add('js-reveal');
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('animate-in');
                        observer.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });

            document.querySelectorAll('.reveal').forEach((el, index) => {
                el.style.animationDelay = `${(index % 4) * 90}ms`;
                observer.observe(el);
            });
        });
    </script>
    <script src="../../assets/js/dynamic-favicon.js"></script>
</body>
