<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedro Marconato - Lojas Renner</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        :root {
            /* Lojas Renner Official Colors */
            --renner-primary: #D2001F;
            --renner-secondary: #B30020;
            --renner-accent: #E85A70;

            /* Applied Colors */
            --primary-color: var(--renner-primary);
            --secondary-color: var(--renner-secondary);
            --accent-color: var(--renner-accent);
            --text-color: #2c3e50;
            --border-color: rgba(0, 0, 0, 0.1);
            --background-gradient: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: var(--text-color);
            line-height: 1.6;
            background: #f8f9fa;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        .animated-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 50%, #f8f9fa 100%);
            background-size: 400% 400%;
            animation: gradientShift 20s ease infinite;
            z-index: -2;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Container PADRÃO - 1000px centralizado */
        .cv-container {
            max-width: 1000px;
            margin: 30px auto;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            position: relative;
            border: 1px solid var(--border-color);
        }

        .header {
            background: var(--background-gradient);
            color: white;
            padding: 60px 50px;
            text-align: center;
            position: relative;
        }

        .header h1 { font-size: 2.5em; font-weight: 700; margin-bottom: 10px; letter-spacing: -0.5px; }
        .header h2 { font-size: 1.2em; font-weight: 400; opacity: 0.9; margin-bottom: 20px; }

        .contact-info { font-size: 0.95em; opacity: 0.9; line-height: 1.8; }
        .contact-info a {
            color: white;
            text-decoration: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            transition: border-color 0.3s ease;
        }
        .contact-info a:hover { border-bottom-color: white; }

        .content { padding: 50px; }
        .section { margin-bottom: 40px; }

        .section-title {
            font-size: 1.5em;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--border-color);
        }

        /* Skills (markup gerado por renderSkills) */
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 30px;
        }
        .tool-item { margin-bottom: 14px; }
        .tool-name {
            display: flex;
            justify-content: space-between;
            font-weight: 500;
            margin-bottom: 5px;
        }
        .tool-percentage { color: var(--accent-color); font-size: 0.85em; font-weight: 600; }
        .dots-container { display: flex; gap: 4px; }
        .dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            background: var(--border-color);
        }
        .dot.filled { background: var(--primary-color); }

        /* Experiência (markup gerado por renderExperienceTimeline) */
        .experience-item {
            position: relative;
            padding: 25px 25px 25px 70px;
            margin-bottom: 25px;
            background: rgba(0, 0, 0, 0.02);
            border-radius: 12px;
            border-left: 4px solid var(--primary-color);
        }
        .job-title {
            font-size: 1.15em;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 4px;
        }
        .job-number {
            position: absolute;
            left: 20px; top: 25px;
            width: 34px; height: 34px;
            border-radius: 50%;
            background: var(--background-gradient);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9em;
            font-weight: 700;
        }
        .experience-item .company { font-weight: 600; }
        .experience-item .period { font-size: 0.9em; color: var(--accent-color); margin-bottom: 10px; }
        .job-description { margin-bottom: 15px; }

        .achievements-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 12px;
        }
        .achievement-item {
            display: flex;
            gap: 10px;
            padding: 12px;
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 8px;
        }
        .achievement-icon { color: var(--primary-color); font-size: 1.1em; padding-top: 2px; }
        .achievement-title { font-weight: 600; font-size: 0.92em; }
        .achievement-description { font-size: 0.85em; }

        /* Tooltips das experiências (markup gerado por renderTooltip) */
        .tooltip { position: relative; display: inline-block; margin-left: 6px; }
        .tooltip-icon { color: var(--accent-color); font-size: 0.8em; cursor: help; }
        .tooltip-text {
            visibility: hidden;
            opacity: 0;
            position: absolute;
            z-index: 50;
            top: 24px; left: 50%;
            transform: translateX(-50%);
            width: 340px;
            max-width: 80vw;
            background: white;
            color: var(--text-color);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            padding: 15px;
            font-size: 0.8em;
            font-weight: 400;
            text-align: left;
            transition: opacity 0.2s ease;
        }
        .tooltip:hover .tooltip-text { visibility: visible; opacity: 1; }
        .tooltip-header {
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 8px;
        }
        .tooltip-section { margin-bottom: 8px; }
        .tooltip-section-title { font-weight: 600; margin-bottom: 3px; }
        .tooltip-list { padding-left: 18px; }

        /* Educação (markup gerado por renderEducation) */
        .education-item {
            padding: 20px;
            margin-bottom: 15px;
            background: rgba(0, 0, 0, 0.02);
            border-radius: 12px;
            border-left: 4px solid var(--accent-color);
        }
        .degree { font-weight: 700; color: var(--primary-color); }
        .university { font-weight: 500; }
        .thesis { font-size: 0.9em; margin-top: 4px; }

        /* Projetos (markup gerado por renderProjects) */
        .project-item {
            padding: 20px;
            margin-bottom: 15px;
            background: rgba(0, 0, 0, 0.02);
            border-radius: 12px;
            border-left: 4px solid var(--secondary-color);
        }
        .project-title { font-weight: 700; color: var(--primary-color); margin-bottom: 6px; }
        .tech-tag {
            display: inline-block;
            padding: 3px 10px;
            margin: 3px 4px 0 0;
            background: var(--background-gradient);
            color: white;
            border-radius: 12px;
            font-size: 0.75em;
            font-weight: 500;
        }

        .cta-button {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 14px;
            background: var(--background-gradient);
            color: white;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.85em;
        }

        /* Print button — FAB fixo inferior-direito (padrão das referências) */
        .print-button {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #D2001F 0%, #B30020 100%);
            color: white;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            z-index: 100;
        }
        .print-button:hover { transform: scale(1.1); box-shadow: 0 6px 30px rgba(0, 0, 0, 0.4); }
        .print-button i { font-size: 24px; }

        /* Language toggle — pílula fixa superior-direita (padrão das referências) */
        .language-toggle {
            position: fixed;
            top: 30px;
            right: 30px;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 5px;
            display: flex;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.12);
            transition: all 0.3s ease;
            z-index: 100;
        }
        .language-toggle:hover { transform: translateY(-2px); }
        .language-option {
            color: var(--text-color);
            text-decoration: none;
            padding: 8px 20px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s ease;
        }
        .language-option.active {
            background: linear-gradient(135deg, #D2001F 0%, #B30020 100%);
            color: white;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .cv-container { margin: 10px; border-radius: 15px; }
            .header { padding: 70px 30px 40px; }
            .header h1 { font-size: 2em; }
            .content { padding: 30px; }
            .print-button, .language-toggle {
                position: fixed;
                bottom: 20px;
                top: auto;
            }
            .print-button { right: 20px; }
            .language-toggle { right: auto; left: 20px; }
        }

        /* Print styles */
        @media print {
            body { background: white; }
            .animated-bg, .print-button, .language-toggle { display: none; }
            .cv-container { margin: 0; box-shadow: none; border: none; }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <meta name="theme-color" content="#D2001F">
    <meta name="msapplication-TileColor" content="#D2001F">
</head>
<body>
    <div class="animated-bg"></div>

    <!-- Controles fixos fora do container (backdrop-filter quebraria position:fixed) -->
    <div class="language-toggle">
        <a href="renner.html" class="language-option active"><i class="fas fa-check-circle"></i> EN</a>
        <a href="renner_pt.html" class="language-option "> PT</a>
    </div>

    <button class="print-button" title="Print CV" onclick="var win = window.open('../../cv_styles/cv_renner_style_EN.html', '_blank'); win.onload = function() { win.print(); }">

        <div class="content">

                <h2 class="section-title" id="section-projects">Projects & Innovation</h2>
                <div id="projects-container"></div>
            </section>
        </div>
    </div>

    <!-- SCRIPTS OBRIGATÓRIOS -->
    <script src="../../assets/js/cv-texts.js"></script>
    <script src="../../assets/js/dynamic-favicon.js"></script>

        document.addEventListener('DOMContentLoaded', function() {
            var lang = 'en';
            initializeBasicContent(lang);
            renderSkills('skills-strategic', 'strategic', lang);

        });
    </script>
</body>
</html>
