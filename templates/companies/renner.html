<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedro Marconato - Lojas Renner</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap');

        :root {
            /* Lojas Renner Official Colors */
            --renner-red: #D2001F;
            --renner-crimson: #9E0018;
            --renner-deep: #7D0014;
            --renner-secondary: #B30020;
            --renner-coral: #E85A70;
            --renner-cream: #FFF5F6;

            /* Applied Colors */
            --primary-color: var(--renner-red);
            --secondary-color: var(--renner-secondary);
            --accent-color: var(--renner-coral);
            --text-color: #2c3e50;
            --border-color: rgba(210, 0, 31, 0.18);
            --background-gradient: linear-gradient(135deg, var(--renner-red) 0%, var(--renner-crimson) 55%, var(--renner-deep) 100%);

            --font-display: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --font-body: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --font-mono: 'JetBrains Mono', 'SF Mono', Menlo, monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-body);
            color: var(--text-color);
            line-height: 1.6;
            background: #fbf7f8;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        h1, .section-title, .job-title, .degree, .project-title { font-family: var(--font-display); }

        /* ===== Ambient background ===== */
        .animated-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #fbf7f8;
            z-index: -2;
            overflow: hidden;
        }
        .gradient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(55px);
            opacity: 0.13;
            animation: orbFloat 20s ease-in-out infinite;
        }
        .gradient-orb:nth-child(1) { width: 340px; height: 340px; background: var(--renner-red); top: -120px; left: -100px; }
        .gradient-orb:nth-child(2) { width: 280px; height: 280px; background: var(--renner-coral); bottom: -110px; right: -60px; animation-delay: 5s; }
        .gradient-orb:nth-child(3) { width: 220px; height: 220px; background: var(--renner-crimson); top: 45%; right: 8%; opacity: 0.07; animation-delay: 10s; }

        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(24px, -28px) scale(1.08); }
        }

        .cv-container {
            max-width: 1000px;
            margin: 30px auto;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 28px;
            box-shadow: 0 20px 60px rgba(157, 0, 24, 0.18), 0 8px 16px rgba(0, 0, 0, 0.06);
            border: 1px solid rgba(210, 0, 31, 0.12);
            overflow: hidden;
            position: relative;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .cv-container:hover {
            box-shadow: 0 30px 80px rgba(157, 0, 24, 0.24), 0 12px 24px rgba(0, 0, 0, 0.08);
        }

        /* ===== HERO HEADER ===== */
        .header {
            background: var(--background-gradient);
            padding: 70px 30px 80px 30px;
            position: relative;
            overflow: hidden;
            min-height: 56vh;
            display: flex;
            align-items: center;
        }

        /* Subtle diagonal weave pattern */
        .header-weave {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image:
                repeating-linear-gradient(45deg, rgba(255,255,255,0.03) 0, rgba(255,255,255,0.03) 1px, transparent 1px, transparent 22px);
            z-index: 1;
        }

        /* Fabric shine sweep */
        .header::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 55%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.09), transparent);
            animation: shineSweep 9s ease-in-out infinite;
            z-index: 2;
        }
        @keyframes shineSweep {
            0% { left: -60%; }
            55%, 100% { left: 120%; }
        }

        /* Radial glow behind the name */
        .header-glow {
            position: absolute;
            top: 50%; left: 28%;
            width: 620px; height: 620px;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, rgba(255, 255, 255, 0.18) 0%, rgba(255, 214, 220, 0.06) 45%, transparent 70%);
            z-index: 1;
            pointer-events: none;
            animation: glowBreath 8s ease-in-out infinite;
        }
        @keyframes glowBreath {
            0%, 100% { opacity: 0.7; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
        }

        /* Floating soft particles */
        .spark {
            position: absolute;
            width: 6px; height: 6px;
            background: rgba(255, 255, 255, 0.85);
            border-radius: 50%;
            box-shadow: 0 0 12px rgba(255, 255, 255, 0.6);
            animation: sparkRise 15s linear infinite;
            opacity: 0;
            z-index: 3;
        }
        .spark:nth-child(1) { left: 10%; animation-delay: 0s;   animation-duration: 14s; }
        .spark:nth-child(2) { left: 26%; animation-delay: 3s;   animation-duration: 17s; }
        .spark:nth-child(3) { left: 42%; animation-delay: 6s;   animation-duration: 13s; }
        .spark:nth-child(4) { left: 63%; animation-delay: 1.5s; animation-duration: 16s; }
        .spark:nth-child(5) { left: 80%; animation-delay: 8s;   animation-duration: 14.5s; }
        .spark:nth-child(6) { left: 91%; animation-delay: 4.5s; animation-duration: 18s; }

        @keyframes sparkRise {
            0% { bottom: -10px; opacity: 0; transform: translateX(0) scale(0.6); }
            10% { opacity: 0.9; }
            85% { opacity: 0.7; }
            100% { bottom: 105%; opacity: 0; transform: translateX(24px) scale(1.1); }
        }

        /* Logo — white transparent, upper right (clears the language toggle) */
        .brand-logo {
            position: absolute;
            top: 92px; right: 48px;
            width: 138px;
            z-index: 15;
            animation: logoEntrance 1.2s cubic-bezier(0.34, 1.4, 0.64, 1) both;
        }
        .brand-logo img {
            width: 100%;
            height: auto;
            filter: drop-shadow(0 2px 10px rgba(0, 0, 0, 0.25));
            transition: transform 0.3s ease;
        }
        .brand-logo:hover img { transform: scale(1.05); }

        @keyframes logoEntrance {
            0% { transform: translateY(-26px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        .header-content {
            position: relative;
            z-index: 10;
            width: 100%;
            padding: 0 50px;
        }
        .header-text { max-width: 760px; }

        .company-tagline {
            font-family: var(--font-mono);
            font-size: 13px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.95);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 26px;
            display: inline-flex;
            align-items: center;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 30px;
            animation: taglineReveal 1s ease-out 0.2s both;
        }
        .company-tagline::before { content: '\2726'; margin-right: 10px; opacity: 0.9; }

        @keyframes taglineReveal {
            0% { opacity: 0; transform: translateY(15px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .header h1 {
            font-size: clamp(2.6rem, 5.5vw, 3.9rem);
            font-weight: 900;
            color: white;
            margin-bottom: 20px;
            letter-spacing: -1.5px;
            line-height: 1.08;
            text-transform: uppercase;
            text-shadow: 0 2px 30px rgba(0, 0, 0, 0.25);
            animation: titleReveal 1.2s ease-out both;
            position: relative;
        }
        .header h1::after {
            content: '';
            position: absolute;
            bottom: -12px; left: 0;
            width: 90px; height: 4px;
            background: linear-gradient(90deg, #ffffff, var(--renner-coral), transparent);
            border-radius: 2px;
            box-shadow: 0 0 14px rgba(255, 255, 255, 0.5);
            animation: underlineGrow 1s ease-out 0.7s both;
        }
        @keyframes titleReveal {
            0% { opacity: 0; transform: translateY(30px) scale(0.97); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes underlineGrow {
            0% { width: 0; opacity: 0; }
            100% { width: 90px; opacity: 1; }
        }

        .role {
            font-size: clamp(1.05rem, 2.6vw, 1.45rem);
            font-weight: 400;
            color: rgba(255, 255, 255, 0.92);
            margin-bottom: 38px;
            margin-top: 20px;
            letter-spacing: 0.6px;
            animation: roleReveal 1.2s ease-out 0.35s both;
        }
        @keyframes roleReveal {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .contact-info {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            align-items: center;
            animation: contactReveal 1.2s ease-out 0.6s both;
        }
        @keyframes contactReveal {
            0% { opacity: 0; transform: translateY(25px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .contact-button {
            display: inline-flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            padding: 12px 20px;
            text-decoration: none;
            color: white;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.3px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255, 255, 255, 0.28);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .contact-button::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.25), transparent);
            transition: left 0.6s ease;
        }
        .contact-button:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: white;
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
        }
        .contact-button:hover::before { left: 100%; }
        .contact-button i { margin-right: 9px; font-size: 16px; color: white; }

        .contact-item { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .contact-cta {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.7);
            font-weight: 400;
            animation: gentlePulse 3s ease-in-out infinite;
        }
        @keyframes gentlePulse {
            0%, 100% { opacity: 0.7; transform: scale(1); }
            50% { opacity: 0.95; transform: scale(1.02); }
        }

        .location { display: flex; align-items: center; font-size: 14px; color: rgba(255, 255, 255, 0.92); }
        .location i { margin-right: 6px; color: white; }

        /* ===== SECTIONS ===== */
        .section {
            padding: 55px 80px;
            position: relative;
            opacity: 0;
            transform: translateY(40px);
            animation: sectionReveal 0.8s ease-out forwards;
        }
        .section:nth-of-type(1) { animation-delay: 0.2s; }
        .section:nth-of-type(2) { animation-delay: 0.4s; }
        .section:nth-of-type(3) { animation-delay: 0.6s; }
        .section:nth-of-type(4) { animation-delay: 0.8s; }
        .section:nth-of-type(5) { animation-delay: 1.0s; }
        @keyframes sectionReveal {
            0% { opacity: 0; transform: translateY(40px) scale(0.99); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        .section:not(:last-child)::after {
            content: '';
            position: absolute;
            bottom: 0; left: 80px; right: 80px;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--border-color), transparent);
        }

        .section-title {
            background: var(--background-gradient);
            color: white;
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 32px;
            padding: 14px 30px;
            border-radius: 50px;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            box-shadow: 0 8px 24px rgba(157, 0, 24, 0.28);
            display: inline-block;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .section-title::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            animation: titleShimmer 4.5s ease-in-out infinite;
        }
        @keyframes titleShimmer {
            0% { left: -100%; }
            50%, 100% { left: 100%; }
        }
        .section-title:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(157, 0, 24, 0.36);
        }

        .profile-text { font-size: 16px; line-height: 1.85; color: var(--text-color); text-align: justify; }

        /* ===== SKILLS ===== */
        .skills-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 26px; }
        @media (max-width: 1000px) { .skills-container { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 600px) { .skills-container { grid-template-columns: 1fr; } }

        .skills-column {
            background: linear-gradient(160deg, rgba(210, 0, 31, 0.035), rgba(232, 90, 112, 0.03));
            padding: 28px;
            border-radius: 18px;
            border: 1px solid rgba(210, 0, 31, 0.16);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 32px rgba(157, 0, 24, 0.06);
            opacity: 0;
            transform: translateY(30px) rotateX(-8deg);
            animation: skillReveal 0.8s ease forwards;
            position: relative;
            overflow: hidden;
        }
        .skills-column::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--renner-red), var(--renner-coral));
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.4s ease;
        }
        .skills-column:nth-child(1) { animation-delay: 0.3s; }
        .skills-column:nth-child(2) { animation-delay: 0.5s; }
        .skills-column:nth-child(3) { animation-delay: 0.7s; }
        @keyframes skillReveal { to { opacity: 1; transform: translateY(0) rotateX(0); } }
        .skills-column:hover {
            transform: translateY(-5px) scale(1.02);
            border-color: var(--renner-coral);
            box-shadow: 0 16px 48px rgba(157, 0, 24, 0.12);
        }
        .skills-column:hover::before { transform: scaleX(1); }

        .tool-item { margin-bottom: 18px; }
        .tool-name {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 500;
            font-size: 14px;
            margin-bottom: 8px;
            color: var(--text-color);
        }
        .tool-percentage { font-family: var(--font-mono); font-size: 12px; color: var(--renner-red); font-weight: 600; }
        .dots-container { display: flex; align-items: center; gap: 4px; flex-wrap: nowrap; }
        .dot { width: 6px; height: 6px; border-radius: 50%; background-color: rgba(210, 0, 31, 0.15); transition: all 0.3s ease; flex-shrink: 0; }
        .dot.filled {
            background: linear-gradient(135deg, var(--renner-red) 0%, var(--renner-coral) 100%);
            box-shadow: 0 0 6px rgba(210, 0, 31, 0.4);
        }
        .tool-item:hover .dot.filled { transform: scale(1.2); }

        /* ===== Tooltips ===== */
        .tooltip { position: relative; display: inline-block; cursor: help; }
        .tooltip .tooltip-icon { color: var(--renner-coral); font-size: 14px; margin-left: 5px; transition: transform 0.2s, color 0.2s; }
        .tooltip:hover .tooltip-icon, .tooltip:focus .tooltip-icon, .tooltip:active .tooltip-icon { color: white; transform: scale(1.2); }
        .tooltip .tooltip-text {
            visibility: hidden;
            width: 380px;
            background: linear-gradient(145deg, var(--renner-crimson), var(--renner-deep));
            color: white;
            text-align: left;
            border-radius: 12px;
            padding: 0;
            position: absolute;
            z-index: 100;
            bottom: 125%; left: 50%;
            margin-left: -190px;
            opacity: 0;
            transition: opacity 0.4s, transform 0.3s;
            transform: translateY(10px);
            font-size: 13px;
            line-height: 1.5;
            box-shadow: 0 10px 40px rgba(125, 0, 20, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.2);
            overflow: hidden;
            max-height: 85vh;
            overflow-y: auto;
        }
        .tooltip .tooltip-text::after {
            content: "";
            position: absolute;
            top: 100%; left: 50%;
            margin-left: -8px;
            border-width: 8px;
            border-style: solid;
            border-color: var(--renner-deep) transparent transparent transparent;
        }
        .tooltip:hover .tooltip-text, .tooltip:focus .tooltip-text, .tooltip:active .tooltip-text, .tooltip.tooltip-active .tooltip-text {
            visibility: visible; opacity: 1; transform: translateY(0); min-height: 330px;
        }
        .tooltip-active .tooltip-text { position: absolute; z-index: 9999; overflow-y: auto; }
        .tooltip-header {
            background-color: rgba(255, 255, 255, 0.08);
            padding: 12px 18px;
            font-weight: 600;
            font-size: 1.05em;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
            color: white;
        }
        .tooltip-content { padding: 18px; }
        .tooltip-section { margin-bottom: 15px; }
        .tooltip-section:last-of-type { margin-bottom: 0; }
        .tooltip-section-title { display: flex; align-items: center; font-weight: 500; font-size: 1em; color: #fff; margin-bottom: 10px; }
        .tooltip-section-title .fas { margin-right: 12px; font-size: 1.1em; width: 20px; text-align: center; color: var(--renner-coral); }
        .tooltip-list { list-style-position: outside; padding-left: 20px; margin-top: 5px; }
        .tooltip-list li { margin-bottom: 10px; line-height: 1.5; }
        .tooltip-list li::marker { color: var(--renner-coral); }

        @media (max-width: 768px) {
            .tooltip .tooltip-text { width: 90vw; max-width: 320px; left: 50%; transform: translateX(-50%); margin-left: 0; font-size: 12px; max-height: 75vh; }
            .tooltip-active .tooltip-text { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) !important; width: 90vw; max-width: 380px; z-index: 10000; }
        }

        /* ===== EXPERIENCE ===== */
        .experience-timeline { position: relative; margin-left: 32px; padding-left: 42px; }
        .experience-timeline::before {
            content: "";
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 3px;
            background: linear-gradient(to bottom, var(--renner-red), var(--renner-coral));
            border-radius: 3px;
            box-shadow: 0 0 12px rgba(210, 0, 31, 0.3);
        }
        .experience-item {
            margin-bottom: 32px;
            position: relative;
            padding: 32px;
            border-radius: 20px;
            background: linear-gradient(150deg, rgba(255, 255, 255, 0.95), rgba(255, 245, 246, 0.75));
            box-shadow: 0 8px 32px rgba(157, 0, 24, 0.06);
            border: 1px solid rgba(210, 0, 31, 0.16);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
            transform: translateX(-50px);
        }
        .experience-item.animate-in { animation: experienceSlide 0.8s ease forwards; }
        @keyframes experienceSlide { to { opacity: 1; transform: translateX(0); } }
        .experience-item::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            border-radius: 20px 20px 0 0;
            background: linear-gradient(90deg, var(--renner-red), var(--renner-coral));
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .experience-item:hover {
            transform: translateY(-3px) translateX(6px);
            border-color: var(--renner-coral);
            box-shadow: 0 14px 44px rgba(157, 0, 24, 0.14);
        }
        .experience-item:hover::after { opacity: 1; }
        .experience-item:hover, .experience-item:focus-within { overflow: visible !important; }
        .experience-item::before {
            content: "";
            position: absolute;
            left: -48px; top: 38px;
            width: 13px; height: 13px;
            border-radius: 50%;
            background: var(--renner-red);
            border: 3px solid white;
            box-shadow: 0 0 0 3px rgba(210, 0, 31, 0.3), 0 0 14px rgba(210, 0, 31, 0.5);
            z-index: 1;
        }
        .job-title { font-weight: 700; font-size: 21px; color: var(--renner-crimson); margin-bottom: 8px; display: flex; align-items: center; gap: 12px; }
        .job-number {
            display: flex; align-items: center; justify-content: center;
            width: 38px; height: 38px;
            background: var(--background-gradient);
            color: white;
            font-family: var(--font-mono);
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            box-shadow: 0 4px 12px rgba(157, 0, 24, 0.28);
            flex-shrink: 0;
        }
        .company { font-weight: 600; font-size: 16px; color: var(--renner-red); margin-bottom: 5px; }
        .period {
            font-family: var(--font-mono);
            font-size: 12.5px;
            color: #8a6a70;
            margin-bottom: 16px;
            display: inline-block;
            background: rgba(210, 0, 31, 0.08);
            padding: 5px 14px;
            border-radius: 20px;
            border: 1px solid rgba(210, 0, 31, 0.2);
        }
        .job-description { font-size: 15px; line-height: 1.65; color: var(--text-color); margin-bottom: 20px; }
        .achievements-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        @media (max-width: 900px) { .achievements-container { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 600px) { .achievements-container { grid-template-columns: 1fr; } }
        .achievement-item {
            background: linear-gradient(135deg, rgba(232, 90, 112, 0.07), rgba(210, 0, 31, 0.04));
            border-radius: 12px;
            padding: 18px;
            border: 1px solid rgba(210, 0, 31, 0.16);
            display: flex;
            align-items: flex-start;
            gap: 12px;
            transition: all 0.3s ease;
        }

        /* Reduced motion accessibility */

    <script>
        function openEmailForm() { document.getElementById('emailModal').style.display = 'flex'; }
        function closeEmailModal() { document.getElementById('emailModal').style.display = 'none'; }
        function openPhoneForm() { document.getElementById('phoneModal').style.display = 'flex'; }
        function closePhoneModal() { document.getElementById('phoneModal').style.display = 'none'; }

        window.onclick = function(event) {
            if (event.target == document.getElementById('emailModal')) closeEmailModal();
            if (event.target == document.getElementById('phoneModal')) closePhoneModal();
        }

        document.addEventListener('DOMContentLoaded', function() {
            initializeBasicContent('en');
            initializeModalTexts('en');

            const inputs = document.querySelectorAll('input, textarea');
            inputs.forEach(input => {
                input.addEventListener('focus', function() { this.style.borderColor = 'var(--renner-red)'; });
                input.addEventListener('blur', function() { this.style.borderColor = '#e5e7eb'; });
            });

            const tooltips = document.querySelectorAll('.tooltip');
            tooltips.forEach(tooltip => {
                tooltip.addEventListener('click', function(e) {
                    e.stopPropagation();
                    tooltips.forEach(t => { if (t !== this) t.classList.remove('tooltip-active'); });
                    this.classList.toggle('tooltip-active');
                });
            });
            document.addEventListener('click', function() {
                tooltips.forEach(tooltip => tooltip.classList.remove('tooltip-active'));
            });

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('animate-in');
                        observer.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });

            setTimeout(() => {
                document.querySelectorAll('.experience-item, .project-item').forEach(item => observer.observe(item));
            }, 100);
        });

        function initializeBasicContent(lang = 'en') {
            const nameEl = document.getElementById('cv-name');
            if (nameEl) nameEl.textContent = getText('name', lang);
            const roleEl = document.getElementById('cv-role');
            if (roleEl) roleEl.textContent = getText('role', lang);
            const emailEl = document.getElementById('cv-email');
            if (emailEl) emailEl.textContent = getText('contact.email', lang);
            const phoneEl = document.getElementById('cv-phone');
            if (phoneEl) phoneEl.textContent = getText('contact.phone', lang);
            const locationEl = document.querySelector('#cv-location span');
            if (locationEl) locationEl.textContent = getText('contact.location', lang);
            const linkedinEl = document.getElementById('cv-linkedin');
            if (linkedinEl) linkedinEl.textContent = getText('contact.linkedin', lang);
            const repositoryEl = document.getElementById('cv-repository');
            if (repositoryEl) repositoryEl.textContent = getText('contact.repository', lang);

            const emailCTAEl = document.getElementById('cv-cta-email');
            if (emailCTAEl) emailCTAEl.textContent = getText('contactCTA.email', lang);
            const phoneCTAEl = document.getElementById('cv-cta-phone');
            if (phoneCTAEl) phoneCTAEl.textContent = getText('contactCTA.phone', lang);
            const linkedinCTAEl = document.getElementById('cv-cta-linkedin');
            if (linkedinCTAEl) linkedinCTAEl.textContent = getText('contactCTA.linkedin', lang);
            const repositoryCTAEl = document.getElementById('cv-cta-repository');
            if (repositoryCTAEl) repositoryCTAEl.textContent = getText('contactCTA.repository', lang);

            const profileTitleEl = document.getElementById('section-profile');
            if (profileTitleEl) profileTitleEl.textContent = getText('sections.profile', lang);
            const skillsTitleEl = document.getElementById('section-skills');
            if (skillsTitleEl) skillsTitleEl.textContent = getText('sections.skills', lang);
            const experienceTitleEl = document.getElementById('section-experience');
            if (experienceTitleEl) experienceTitleEl.textContent = getText('sections.experience', lang);
            const educationTitleEl = document.getElementById('section-education');
            if (educationTitleEl) educationTitleEl.textContent = getText('sections.education', lang);
            const projectsTitleEl = document.getElementById('section-projects');
            if (projectsTitleEl) projectsTitleEl.textContent = getText('sections.projects', lang);

            const profileEl = document.getElementById('cv-profile');
            if (profileEl) profileEl.textContent = getText('professionalProfile', lang);

            renderSkills('skills-strategic', 'strategic', lang);
            renderSkills('skills-tools', 'tools', lang);
            renderSkills('skills-emerging', 'emerging', lang);

            renderExperience(lang);
            renderEducation(lang);
            renderProjects(lang);
        }

        function renderExperience(lang = 'en') {
            const container = document.getElementById('cv-experience');
            if (!container) return;
            const experiences = getText('experience', lang);
            let html = '';
            experiences.forEach((exp, index) => {
                html += `
                    <div class="experience-item">
                        <div class="job-title">
                            <div class="job-number">${String(index + 1).padStart(2, '0')}</div>
                            ${exp.title}
                            ${renderTooltip(exp.tooltip)}
                        </div>
                        <div class="company">${exp.company}</div>
                        <div class="period">${exp.period}</div>
                        <div class="job-description">${exp.description}</div>
                        <div class="achievements-container">
                            ${renderAchievements(exp.achievements)}
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        function renderEducation(lang = 'en') {
            const container = document.getElementById('cv-education');
            if (!container) return;
            const education = getText('education', lang);
            let html = '';
            education.forEach(edu => {
                html += `
                    <div class="education-item">
                        <div class="degree">${edu.degree}</div>
                        <div class="university">${edu.university}</div>
                        <div class="thesis">${edu.thesis}</div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        function renderProjects(lang = 'en') {
            const container = document.getElementById('cv-projects');
            if (!container) return;
            const projects = getText('projects', lang);
            let html = '';
            projects.forEach(project => {
                html += `
                    <div class="project-item">
                        <div class="project-title">${project.title}</div>
                        <div class="project-description">${project.description}</div>
                        <div style="margin-top: 15px;">
                            ${renderTechTags(project.techs)}
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }
    </script>
    <!-- Dynamic Favicon System -->
    <script src="../../assets/js/dynamic-favicon.js"></script>
</body>
