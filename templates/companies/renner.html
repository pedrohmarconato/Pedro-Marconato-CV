<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedro Marconato - Lojas Renner</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        :root {
            /* Lojas Renner Official Colors */
            --renner-primary: #D2001F;
            --renner-secondary: #B30020;
            --renner-accent: #E85A70;

            /* Applied Colors */
            --primary-color: var(--renner-primary);
            --secondary-color: var(--renner-secondary);
            --accent-color: var(--renner-accent);
            --text-color: #2c3e50;
            --border-color: rgba(0, 0, 0, 0.1);
            --background-gradient: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: var(--text-color);
            line-height: 1.6;
            background: #f8f9fa;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* ===== Ambient background: gentle gradient + floating orbs ===== */
        .animated-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #faf8f8 0%, #f3e7e9 50%, #faf8f8 100%);
            background-size: 400% 400%;
            animation: gradientShift 22s ease infinite;
            z-index: -2;
            overflow: hidden;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .gradient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.13;
            animation: orbFloat 19s ease-in-out infinite;
        }
        .gradient-orb:nth-child(1) { width: 360px; height: 360px; background: var(--renner-primary); top: -120px; left: -100px; animation-delay: 0s; }
        .gradient-orb:nth-child(2) { width: 300px; height: 300px; background: var(--renner-accent); bottom: -110px; right: -70px; animation-delay: 4s; }
        .gradient-orb:nth-child(3) { width: 200px; height: 200px; background: var(--renner-secondary); top: 42%; right: 8%; opacity: 0.07; animation-delay: 8s; }

        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(22px, -26px) scale(1.08); }
        }

        /* Container PADRÃO - 1000px centralizado */
        .cv-container {
            max-width: 1000px;
            margin: 30px auto;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            position: relative;
            border: 1px solid var(--border-color);
        }

        .header {
            background: var(--background-gradient);
            color: white;
            padding: 60px 50px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .header-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 560px;
            height: 560px;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, rgba(255, 255, 255, 0.16) 0%, rgba(255, 255, 255, 0.03) 45%, transparent 70%);
            pointer-events: none;
            animation: glowBreath 8s ease-in-out infinite;
        }

        @keyframes glowBreath {
            0%, 100% { opacity: 0.7; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
        }

        /* Brand logo — white card, top-right */
        .brand-logo {
            position: absolute;
            top: 26px;
            right: 30px;
            z-index: 5;
            background: #ffffff;
            padding: 8px 16px;
            border-radius: 12px;
            box-shadow: 0 10px 26px rgba(0, 0, 0, 0.25);
            animation: logoEntrance 1s cubic-bezier(0.34, 1.4, 0.64, 1) both;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .brand-logo:hover {
            transform: scale(1.05);
            box-shadow: 0 14px 34px rgba(0, 0, 0, 0.3);
        }
        .brand-logo img { display: block; height: 30px; width: auto; }

        @keyframes logoEntrance {
            0% { transform: translateY(-22px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        .header-content { position: relative; z-index: 2; }

        .header h1 {
            font-size: 2.5em;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
            animation: titleReveal 0.9s ease-out both;
        }
        .header h2 {
            font-size: 1.2em;
            font-weight: 400;
            opacity: 0.9;
            margin-bottom: 20px;
            animation: roleReveal 0.9s ease-out 0.15s both;
        }

        @keyframes titleReveal {
            0% { opacity: 0; transform: translateY(22px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        @keyframes roleReveal {
            0% { opacity: 0; transform: translateY(16px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .contact-info {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            animation: contactReveal 0.9s ease-out 0.3s both;
        }

        @keyframes contactReveal {
            0% { opacity: 0; transform: translateY(14px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .contact-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 30px;
            color: white;
            text-decoration: none;
            font-size: 0.9em;
            transition: all 0.3s ease;
        }
        .contact-pill i { opacity: 0.9; }
        a.contact-pill:hover {
            background: rgba(255, 255, 255, 0.22);
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateY(-2px);
        }

        .content { padding: 50px; }

        .section {
            margin-bottom: 40px;
            opacity: 0;
            transform: translateY(24px);
            animation: sectionReveal 0.7s ease-out forwards;
        }
        .section:nth-of-type(1) { animation-delay: 0.1s; }
        .section:nth-of-type(2) { animation-delay: 0.2s; }
        .section:nth-of-type(3) { animation-delay: 0.3s; }
        .section:nth-of-type(4) { animation-delay: 0.4s; }
        .section:nth-of-type(5) { animation-delay: 0.5s; }

        @keyframes sectionReveal {
            to { opacity: 1; transform: translateY(0); }
        }

        .section-title {
            font-size: 1.5em;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--border-color);
            transition: border-color 0.3s ease;
        }

        /* Skills (markup gerado por renderSkills) */
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 30px;
        }
        .skills-grid > div {
            background: rgba(0, 0, 0, 0.02);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 22px;
            transition: all 0.3s ease;
        }
        .skills-grid > div:hover {
            transform: translateY(-4px);
            border-color: var(--accent-color);
            box-shadow: 0 10px 26px rgba(210, 0, 31, 0.1);
        }
        .tool-item { margin-bottom: 14px; }
        .tool-name {
            display: flex;
            justify-content: space-between;
            font-weight: 500;
            margin-bottom: 5px;
        }
        .tool-percentage { color: var(--accent-color); font-size: 0.85em; font-weight: 600; }
        .dots-container { display: flex; gap: 4px; }
        .dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            background: var(--border-color);
            transition: transform 0.2s ease;
        }
        .dot.filled { background: var(--primary-color); }
        .tool-item:hover .dot.filled { transform: scale(1.15); }

        /* Experiência (markup gerado por renderExperienceTimeline) */
        .experience-item {
            position: relative;
            padding: 25px 25px 25px 70px;
            margin-bottom: 25px;
            background: rgba(0, 0, 0, 0.02);
            border-radius: 12px;
            border-left: 4px solid var(--primary-color);
            transition: all 0.3s ease;
        }
        .experience-item:hover {
            transform: translateX(4px);
            box-shadow: 0 10px 26px rgba(210, 0, 31, 0.1);
        }
        .job-title {
            font-size: 1.15em;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 4px;
        }
        .job-number {
            position: absolute;
            left: 20px; top: 25px;
            width: 34px; height: 34px;
            border-radius: 50%;
            background: var(--background-gradient);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9em;
            font-weight: 700;
        }
        .experience-item .company { font-weight: 600; }
        .experience-item .period { font-size: 0.9em; color: var(--accent-color); margin-bottom: 10px; }
        .job-description { margin-bottom: 15px; }

        .achievements-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 12px;
        }
        .achievement-item {
            display: flex;
            gap: 10px;
            padding: 12px;
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            transition: all 0.25s ease;
        }
        .achievement-item:hover {
            transform: translateY(-3px);
            border-color: var(--accent-color);
            box-shadow: 0 8px 18px rgba(210, 0, 31, 0.12);
        }
        .achievement-icon { color: var(--primary-color); font-size: 1.1em; padding-top: 2px; }
        .achievement-title { font-weight: 600; font-size: 0.92em; }
        .achievement-description { font-size: 0.85em; }

        /* Tooltips das experiências (markup gerado por renderTooltip) */
        .tooltip { position: relative; display: inline-block; margin-left: 6px; }
        .tooltip-icon { color: var(--accent-color); font-size: 0.8em; cursor: help; }
        .tooltip-text {
            visibility: hidden;
            opacity: 0;
            position: absolute;
            z-index: 50;
            top: 24px; left: 50%;
            transform: translateX(-50%);
            width: 340px;
            max-width: 80vw;
            background: white;
            color: var(--text-color);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            padding: 15px;
            font-size: 0.8em;
            font-weight: 400;
            text-align: left;
            transition: opacity 0.2s ease;
        }
        .tooltip:hover .tooltip-text { visibility: visible; opacity: 1; }
        .tooltip-header {
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 8px;
        }
        .tooltip-section { margin-bottom: 8px; }
        .tooltip-section-title { font-weight: 600; margin-bottom: 3px; }
        .tooltip-list { padding-left: 18px; }

        /* Educação (markup gerado por renderEducation) */
        .education-item {
            padding: 20px;
            margin-bottom: 15px;
            background: rgba(0, 0, 0, 0.02);
            border-radius: 12px;
            border-left: 4px solid var(--accent-color);
            transition: all 0.3s ease;
        }
        .education-item:hover {
            transform: translateX(4px);
            box-shadow: 0 10px 26px rgba(210, 0, 31, 0.1);
        }
        .degree { font-weight: 700; color: var(--primary-color); }
        .university { font-weight: 500; }
        .thesis { font-size: 0.9em; margin-top: 4px; }

        /* Projetos (markup gerado por renderProjects) */
        .project-item {
            padding: 20px;
            margin-bottom: 15px;
            background: rgba(0, 0, 0, 0.02);
            border-radius: 12px;
            border-left: 4px solid var(--secondary-color);
            transition: all 0.3s ease;
        }
        .project-item:hover {
            transform: translateX(4px);
            box-shadow: 0 10px 26px rgba(179, 0, 32, 0.12);
        }
        .project-title { font-weight: 700; color: var(--primary-color); margin-bottom: 6px; }
        .project-description a { color: var(--primary-color); font-weight: 600; }
        .tech-tag {
            display: inline-block;
            padding: 3px 10px;
            margin: 3px 4px 0 0;
            background: var(--background-gradient);
            color: white;
            border-radius: 12px;
            font-size: 0.75em;
            font-weight: 500;
            transition: transform 0.2s ease;
        }
        .tech-tag:hover { transform: translateY(-2px); }

        .cta-button {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 14px;
            background: var(--background-gradient);
            color: white;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.85em;
        }

        /* Print button — FAB fixo inferior-direito (padrão das referências) */
        .print-button {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #D2001F 0%, #B30020 100%);
            color: white;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            z-index: 100;
        }
        .print-button:hover { transform: scale(1.1); box-shadow: 0 6px 30px rgba(0, 0, 0, 0.4); }
        .print-button i { font-size: 24px; }

        /* Language toggle — pílula fixa superior-direita (padrão das referências) */
        .language-toggle {
            position: fixed;
            top: 30px;
            right: 30px;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 5px;
            display: flex;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.12);
            transition: all 0.3s ease;
            z-index: 100;
        }
        .language-toggle:hover { transform: translateY(-2px); }
        .language-option {
            color: var(--text-color);
            text-decoration: none;
            padding: 8px 20px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s ease;
        }
        .language-option.active {
            background: linear-gradient(135deg, #D2001F 0%, #B30020 100%);
            color: white;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .cv-container { margin: 10px; border-radius: 15px; }
            .header { padding: 90px 30px 40px; }
            .header h1 { font-size: 2em; }
            .brand-logo { top: 18px; right: 20px; padding: 6px 12px; }
            .brand-logo img { height: 22px; }
            .content { padding: 30px; }
            .print-button, .language-toggle {
                position: fixed;
                bottom: 20px;
                top: auto;
            }
            .print-button { right: 20px; }
            .language-toggle { right: auto; left: 20px; }
        }

        /* Reduced motion accessibility */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
            .section { opacity: 1 !important; transform: none !important; }
        }

        /* Print styles */
        @media print {
            body { background: white; }
            .animated-bg, .gradient-orb, .header-glow, .print-button, .language-toggle { display: none; }
            .cv-container { margin: 0; box-shadow: none; border: none; }
            .section { opacity: 1 !important; transform: none !important; animation: none !important; }
        }
    </style>
