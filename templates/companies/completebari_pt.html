<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedro Marconato - Complete Bari (PT)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap');

        :root {
            /* Complete Bari Brand Colors — teal/green digital banking */
            --bari-teal: #005C66;
            --bari-aqua: #006A78;
            --bari-deep: #1A3C3E;
            --bari-lime: #A9DC8D;
            --bari-mint: #F1F8F5;
            --bari-ink: #22343C;

            /* Applied Colors */
            --primary-color: var(--bari-teal);
            --secondary-color: var(--bari-aqua);
            --accent-color: var(--bari-lime);
            --light-accent: var(--bari-mint);
            --dark-accent: var(--bari-deep);
            --text-color: var(--bari-ink);
            --border-color: rgba(0, 92, 102, 0.2);
            --background-gradient: linear-gradient(135deg, var(--bari-aqua) 0%, var(--bari-teal) 45%, var(--bari-deep) 100%);

            --font-body: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --font-mono: 'JetBrains Mono', 'SF Mono', Menlo, monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-body);
            color: var(--text-color);
            line-height: 1.6;
            background: #f4faf7;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        h1, .section-title, .job-title, .degree, .project-title {
            font-weight: 800;
            letter-spacing: -0.3px;
        }

        /* ===== Ambient background ===== */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #f4faf7 0%, #eaf5ef 50%, #f4faf7 100%);
            background-size: 300% 300%;
            animation: gradientShift 22s ease infinite;
            z-index: -2;
            overflow: hidden;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .gradient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(50px);
            opacity: 0.1;
            animation: orbFloat 26s ease-in-out infinite;
        }

        .gradient-orb:nth-child(1) {
            width: 320px;
            height: 320px;
            background: var(--bari-teal);
            top: -110px;
            left: -90px;
        }

        .gradient-orb:nth-child(2) {
            width: 260px;
            height: 260px;
            background: var(--bari-lime);
            bottom: -100px;
            right: -60px;
            animation-delay: 8s;
        }

        .gradient-orb:nth-child(3) {
            width: 200px;
            height: 200px;
            background: var(--bari-aqua);
            top: 48%;
            right: 6%;
            opacity: 0.07;
            animation-delay: 14s;
        }

        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(24px, -30px) scale(1.06); }
            66% { transform: translate(-18px, 22px) scale(0.96); }
        }

        .cv-container {
            max-width: 1000px;
            margin: 30px auto;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 22px;
            box-shadow:
                0 20px 60px rgba(0, 92, 102, 0.18),
                0 8px 16px rgba(34, 52, 60, 0.08);
            border: 1px solid rgba(0, 92, 102, 0.15);
            overflow: hidden;
            position: relative;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .cv-container:hover {
            box-shadow:
                0 30px 80px rgba(0, 92, 102, 0.24),
                0 12px 24px rgba(34, 52, 60, 0.1);
        }

        /* ===== HERO HEADER — o ciclo completo ===== */
        .header {
            background: var(--background-gradient);
            padding: 70px 30px 120px 30px;
            position: relative;
            overflow: hidden;
            min-height: 58vh;
            display: flex;
            align-items: center;
        }

        /* Fine chart grid — financial dashboard texture */
        .chart-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                repeating-linear-gradient(90deg,
                    transparent,
                    transparent 118px,
                    rgba(255, 255, 255, 0.045) 118px,
                    rgba(255, 255, 255, 0.045) 120px),
                repeating-linear-gradient(0deg,
                    transparent,
                    transparent 78px,
                    rgba(255, 255, 255, 0.035) 78px,
                    rgba(255, 255, 255, 0.035) 80px);
            z-index: 1;
        }

        /* Dotted rings — echo of the Complete Bari dot-circle logo */
        .orbit-ring {
            position: absolute;
            border: 2px dotted rgba(169, 220, 141, 0.35);
            border-radius: 50%;
            z-index: 1;
            pointer-events: none;
        }

        .orbit-ring.ring-a {
            width: 420px;
            height: 420px;
            top: -140px;
            right: -120px;
            animation: ringSpin 60s linear infinite;
        }

        .orbit-ring.ring-b {
            width: 260px;
            height: 260px;
            top: -60px;
            right: -40px;
            border-color: rgba(255, 255, 255, 0.18);
            animation: ringSpin 40s linear infinite reverse;
        }

        .orbit-ring.ring-c {
            width: 180px;
            height: 180px;
            bottom: 60px;
            left: -70px;
            border-color: rgba(169, 220, 141, 0.22);
            animation: ringSpin 50s linear infinite;
        }

        @keyframes ringSpin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Value sparks — green lights rising like growing balances */
        .value-sparks {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 2;
            overflow: hidden;
            pointer-events: none;
        }

        .value-spark {
            position: absolute;
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, rgba(255, 255, 255, 0.95), rgba(169, 220, 141, 0.85));
            box-shadow: 0 0 12px rgba(169, 220, 141, 0.65);
            animation: sparkRise 12s linear infinite;
            opacity: 0;
        }

        .value-spark:nth-child(1) { left: 12%; animation-delay: 0s;   animation-duration: 11s; }
        .value-spark:nth-child(2) { left: 27%; animation-delay: 3s;   animation-duration: 14s; }
        .value-spark:nth-child(3) { left: 43%; animation-delay: 6s;   animation-duration: 10.5s; }
        .value-spark:nth-child(4) { left: 61%; animation-delay: 1.6s; animation-duration: 13s; }
        .value-spark:nth-child(5) { left: 76%; animation-delay: 4.8s; animation-duration: 12s; }
        .value-spark:nth-child(6) { left: 89%; animation-delay: 8s;   animation-duration: 15s; }

        @keyframes sparkRise {
            0% {
                bottom: -14px;
                opacity: 0;
                transform: scale(0.8);
            }
            8% { opacity: 1; }
            50% { transform: scale(1.25); }
            85% { opacity: 0.85; }
            100% {
                bottom: 104%;
                opacity: 0;
                transform: scale(0.9);
            }
        }

        /* Diagonal light sweep */
        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 55%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.08), transparent);
            animation: lightSweep 10s ease-in-out infinite;
            z-index: 2;
        }

        @keyframes lightSweep {
            0% { left: -60%; }
            55%, 100% { left: 110%; }
        }

        /* Growth curve — rising chart silhouette at the hero base */
        .growth-curve {
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 110px;
            z-index: 4;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 110" preserveAspectRatio="none"><path fill="%23ffffff" fill-opacity="0.14" d="M0,110 L0,92 C70,90 110,84 170,84 C230,84 260,70 320,68 C380,66 420,76 480,70 C540,64 570,48 630,50 C690,52 720,60 780,54 C840,48 870,32 930,36 C990,40 1020,46 1080,38 C1140,30 1170,20 1230,22 C1290,24 1330,26 1380,18 L1440,10 L1440,110 Z"/><path fill="none" stroke="%23ffffff" stroke-opacity="0.35" stroke-width="2.5" d="M0,92 C70,90 110,84 170,84 C230,84 260,70 320,68 C380,66 420,76 480,70 C540,64 570,48 630,50 C690,52 720,60 780,54 C840,48 870,32 930,36 C990,40 1020,46 1080,38 C1140,30 1170,20 1230,22 C1290,24 1330,26 1380,18 L1440,10"/><g fill="%23A9DC8D" fill-opacity="0.75"><circle cx="170" cy="84" r="4"/><circle cx="320" cy="68" r="4"/><circle cx="480" cy="70" r="4"/><circle cx="630" cy="50" r="4"/><circle cx="780" cy="54" r="4"/><circle cx="930" cy="36" r="4"/><circle cx="1080" cy="38" r="4"/><circle cx="1230" cy="22" r="4"/><circle cx="1380" cy="18" r="4"/></g></svg>') repeat-x;
            background-size: 1440px 110px;
            pointer-events: none;
            animation: curveLift 1.4s cubic-bezier(0.22, 0.9, 0.36, 1) both;
        }

        @keyframes curveLift {
            0% { transform: translateY(110px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        /* Brand logo — white over the gradient, resting on the curve */
        .brand-logo {
            position: absolute;
            bottom: 108px;
            right: 48px;
            width: 225px;
            z-index: 15;
            animation: logoSettle 1.5s cubic-bezier(0.34, 1.3, 0.64, 1) 0.4s both;
        }

        .brand-logo img {
            width: 100%;
            height: auto;
            filter: brightness(0) invert(1);
            opacity: 0.92;
            transition: all 0.3s ease;
        }

        .brand-logo:hover img {
            transform: scale(1.04);
            opacity: 1;
        }

        @keyframes logoSettle {
            0% { transform: translateY(-30px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        .header-content {
            position: relative;
            z-index: 10;
            width: 100%;
            padding: 0 50px;
        }

        .header-text {
            max-width: 760px;
        }

        /* Ledger-style tagline pill */
        .company-tagline {
            font-family: var(--font-mono);
            font-size: 13.5px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.92);
            letter-spacing: 3.5px;
            text-transform: lowercase;
            margin-bottom: 26px;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 9px 18px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.18);
            animation: taglineReveal 1s ease-out 0.2s both;
        }

        .company-tagline .cycle-icon {
            color: var(--bari-lime);
            font-size: 15px;
            animation: ringSpin 6s linear infinite;
        }

        @keyframes taglineReveal {
            0% { opacity: 0; transform: translateY(15px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .header h1 {
            font-size: clamp(2.6rem, 5.5vw, 3.9rem);
            font-weight: 900;
            color: white;
            margin-bottom: 20px;
            letter-spacing: -1.5px;
            line-height: 1.08;
            text-transform: uppercase;
            text-shadow: 0 3px 16px rgba(0, 0, 0, 0.3);
            animation: titleRise 1.2s ease-out both;
            position: relative;
        }

        .header h1::after {
            content: '';
            position: absolute;
            bottom: -12px;
            left: 0;
            width: 90px;
            height: 4px;
            background: linear-gradient(90deg, var(--bari-lime), rgba(255, 255, 255, 0.7), transparent);
            border-radius: 2px;
            animation: underlineGrow 1s ease-out 0.7s both;
        }

        @keyframes titleRise {
            0% { opacity: 0; transform: translateY(40px) scale(0.97); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes underlineGrow {
            0% { width: 0; opacity: 0; }
            100% { width: 90px; opacity: 1; }
        }

        .role {
            font-size: clamp(1.05rem, 2.6vw, 1.45rem);
            font-weight: 400;
            color: rgba(255, 255, 255, 0.92);
            margin-bottom: 38px;
            margin-top: 20px;
            letter-spacing: 0.6px;
            animation: roleRise 1.2s ease-out 0.35s both;
        }

        @keyframes roleRise {
            0% { opacity: 0; transform: translateY(25px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .contact-info {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            align-items: center;
            animation: contactRise 1.2s ease-out 0.6s both;
        }

        @keyframes contactRise {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .contact-button {
            display: inline-flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.13);
            border-radius: 12px;
            padding: 12px 20px;
            text-decoration: none;
            color: white;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.3px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255, 255, 255, 0.25);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .contact-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(169, 220, 141, 0.3), transparent);
            transition: left 0.6s ease;
        }

        .contact-button:hover {
            background: rgba(169, 220, 141, 0.25);
            border-color: var(--bari-lime);
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
        }

        .contact-button:hover::before {
            left: 100%;
        }

        .contact-button i {
            margin-right: 9px;
            font-size: 16px;
            color: var(--bari-lime);
        }

        .contact-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .contact-cta {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.68);
            font-weight: 400;
            animation: gentlePulse 3s ease-in-out infinite;
        }

        @keyframes gentlePulse {
            0%, 100% { opacity: 0.68; transform: scale(1); }
            50% { opacity: 0.9; transform: scale(1.02); }
        }

        .location {
            display: flex;
            align-items: center;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.9);
        }

        .location i {
            margin-right: 6px;
            color: var(--bari-lime);
        }

        /* ===== SECTIONS — growth reveal cascade ===== */
        .section {
            padding: 55px 80px;
            position: relative;
            opacity: 0;
            transform: translateY(45px);
            animation: sectionRise 0.8s ease-out forwards;
        }

        .section:nth-of-type(1) { animation-delay: 0.2s; }
        .section:nth-of-type(2) { animation-delay: 0.4s; }
        .section:nth-of-type(3) { animation-delay: 0.6s; }
        .section:nth-of-type(4) { animation-delay: 0.8s; }
        .section:nth-of-type(5) { animation-delay: 1.0s; }

        @keyframes sectionRise {
            0% { opacity: 0; transform: translateY(45px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .section:not(:last-child)::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 80px;
            right: 80px;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--border-color), transparent);
        }

        .section-title {
            background: var(--background-gradient);
            color: white;
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 32px;
            padding: 14px 30px;
            border-radius: 10px;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            box-shadow: 0 8px 24px rgba(0, 92, 102, 0.25);
            display: inline-block;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .section-title::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            animation: titleShimmer 4.5s ease-in-out infinite;
        }

        @keyframes titleShimmer {
            0% { left: -100%; }
            50%, 100% { left: 100%; }
        }

        .section-title:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(0, 92, 102, 0.35);
        }

        .profile-text {
            font-size: 16px;
            line-height: 1.85;
            color: var(--text-color);
            text-align: justify;
        }

        /* ===== SKILLS — portfolio panels ===== */
        .skills-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 26px;
        }

        @media (max-width: 1000px) {
            .skills-container { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 600px) {
            .skills-container { grid-template-columns: 1fr; }
        }

        .skills-column {
            background: linear-gradient(160deg, rgba(241, 248, 245, 0.95), rgba(241, 248, 245, 0.4));
            padding: 28px;
            border-radius: 14px;
            border: 1px solid rgba(0, 92, 102, 0.15);
            border-top: 3px solid var(--bari-teal);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 32px rgba(34, 52, 60, 0.06);
            opacity: 0;
            transform: translateY(35px);
            animation: panelRise 0.8s ease forwards;
            position: relative;
        }

        .skills-column:nth-child(1) { animation-delay: 0.3s; border-top-color: var(--bari-teal); }
        .skills-column:nth-child(2) { animation-delay: 0.5s; border-top-color: var(--bari-aqua); }
        .skills-column:nth-child(3) { animation-delay: 0.7s; border-top-color: var(--bari-lime); }

        @keyframes panelRise {
            to { opacity: 1; transform: translateY(0); }
        }

        .skills-column:hover {
            transform: translateY(-5px);
            box-shadow: 0 16px 44px rgba(0, 92, 102, 0.14);
            border-color: rgba(0, 92, 102, 0.3);
        }

        .skill-item {
            display: flex;
            align-items: center;
            margin-bottom: 13px;
            font-size: 15px;
            color: var(--text-color);
            transition: all 0.3s ease;
        }

        .skill-item:hover {
            transform: translateX(8px);
            color: var(--bari-teal);
        }

        .skill-item i {
            color: var(--bari-teal);
            margin-right: 12px;
            font-size: 18px;
            transition: all 0.3s ease;
        }

        .skill-item:hover i {
            color: var(--bari-aqua);
            transform: scale(1.2);
        }

        .tool-item {
            margin-bottom: 18px;
        }

        .tool-name {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 500;
            font-size: 14px;
            margin-bottom: 8px;
            color: var(--text-color);
        }

        .tool-percentage {
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--bari-aqua);
            font-weight: 700;
        }

        .dots-container {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-wrap: nowrap;
        }

        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: rgba(0, 92, 102, 0.15);
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .dot.filled {
            background: linear-gradient(135deg, var(--bari-teal) 0%, var(--bari-aqua) 100%);
            box-shadow: 0 1px 4px rgba(0, 92, 102, 0.4);
            animation: dotPulse 2s ease-in-out infinite alternate;
        }

        @keyframes dotPulse {
            0% { transform: scale(1); box-shadow: 0 1px 3px rgba(0, 92, 102, 0.3); }
            100% { transform: scale(1.12); box-shadow: 0 2px 7px rgba(0, 92, 102, 0.5); }
        }

        .tool-item:hover .dot.filled {
            background: linear-gradient(135deg, var(--bari-lime) 0%, var(--bari-teal) 100%);
            transform: scale(1.2);
        }

        /* ===== Tooltips ===== */
        .tooltip { position: relative; display: inline-block; cursor: help; }

        .tooltip .tooltip-icon {
            color: var(--bari-aqua);
            font-size: 14px;
            margin-left: 5px;
            transition: transform 0.2s, color 0.2s;
        }

        .tooltip:hover .tooltip-icon,
        .tooltip:focus .tooltip-icon,
        .tooltip:active .tooltip-icon {
            color: var(--bari-teal);
            transform: scale(1.2);
        }

        .tooltip .tooltip-text {
            visibility: hidden;
            width: 380px;
            background: linear-gradient(145deg, var(--bari-deep), var(--bari-teal));
            color: white;
            text-align: left;
            border-radius: 12px;
            padding: 0;
            position: absolute;
            z-index: 100;
            bottom: 125%;
            left: 50%;
            margin-left: -190px;
            opacity: 0;
            transition: opacity 0.4s, transform 0.3s;
            transform: translateY(10px);
            font-size: 13px;
            line-height: 1.5;
            box-shadow: 0 10px 40px rgba(0, 92, 102, 0.35);
            overflow: hidden;
            max-height: 85vh;
            overflow-y: auto;
        }

        .tooltip .tooltip-text::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -8px;
            border-width: 8px;
            border-style: solid;
            border-color: var(--bari-teal) transparent transparent transparent;
        }

        .tooltip:hover .tooltip-text,
        .tooltip:focus .tooltip-text,
        .tooltip:active .tooltip-text,
        .tooltip.tooltip-active .tooltip-text {
            visibility: visible;
            opacity: 1;
            transform: translateY(0);
            min-height: 330px;
        }

        .tooltip-active .tooltip-text {
            position: absolute;
            z-index: 9999;
            overflow-y: auto;
        }

                    <input type="email" name="email" required style="width:100%; padding:12px; border:2px solid #e5e7eb; border-radius:8px; font-size: 16px; transition: border-color 0.3s;">
                </div>
                <div style="margin-bottom:20px;">
                    <label id="email-label-subject" style="display:block; margin-bottom:8px; font-weight:500; color: var(--text-color);">Assunto</label>
                    <input type="text" name="subject" required style="width:100%; padding:12px; border:2px solid #e5e7eb; border-radius:8px; font-size: 16px; transition: border-color 0.3s;">
                </div>
                <div style="margin-bottom:25px;">
                    <label id="email-label-message" style="display:block; margin-bottom:8px; font-weight:500; color: var(--text-color);">Mensagem</label>
                    <textarea name="message" required rows="5" style="width:100%; padding:12px; border:2px solid #e5e7eb; border-radius:8px; font-size: 16px; transition: border-color 0.3s; resize: vertical;"></textarea>
                </div>
                <button id="email-button" type="submit" style="background: var(--background-gradient); color:white; border:none; padding:14px 28px; border-radius:8px; cursor:pointer; font-weight:600; font-size: 16px; transition: all 0.3s; box-shadow: 0 4px 15px rgba(0, 92, 102, 0.3);">Enviar</button>
            </form>
        </div>
    </div>

    <!-- Phone Modal -->
    <div id="phoneModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background-color:rgba(0,0,0,0.7); z-index:1000; justify-content:center; align-items:center;">
        <div style="background-color:white; padding:40px; border-radius:16px; width:90%; max-width:500px; position:relative; box-shadow: 0 10px 40px rgba(0,0,0,0.2);">
            <button onclick="closePhoneModal()" style="position:absolute; top:15px; right:15px; background:none; border:none; font-size:24px; cursor:pointer; color: #5b6b70;">×</button>
            <h3 id="phone-modal-title" style="margin-bottom:25px; color: var(--bari-deep); font-size: 24px;">Entre em Contato</h3>
            <form action="https://formspree.io/f/mdkekegw" method="POST">
                <input type="hidden" name="contact_type" value="phone_request">
                <div style="margin-bottom:20px;">
                    <label id="phone-label-name" style="display:block; margin-bottom:8px; font-weight:500; color: var(--text-color);">Seu Nome</label>
                    <input type="text" name="name" required style="width:100%; padding:12px; border:2px solid #e5e7eb; border-radius:8px; font-size: 16px; transition: border-color 0.3s;">
                </div>
                <div style="margin-bottom:20px;">
                    <label id="phone-label-phone" style="display:block; margin-bottom:8px; font-weight:500; color: var(--text-color);">Seu Telefone</label>
                    <input type="tel" name="phone" required style="width:100%; padding:12px; border:2px solid #e5e7eb; border-radius:8px; font-size: 16px; transition: border-color 0.3s;">
                </div>
                <div style="margin-bottom:20px;">
                    <label id="phone-label-besttime" style="display:block; margin-bottom:8px; font-weight:500; color: var(--text-color);">Melhor horário para contato</label>
                    <input type="text" name="best_time" required style="width:100%; padding:12px; border:2px solid #e5e7eb; border-radius:8px; font-size: 16px; transition: border-color 0.3s;">
                </div>
                <div style="margin-bottom:25px;">
                    <label id="phone-label-message" style="display:block; margin-bottom:8px; font-weight:500; color: var(--text-color);">Mensagem (Opcional)</label>
                    <textarea name="message" rows="3" style="width:100%; padding:12px; border:2px solid #e5e7eb; border-radius:8px; font-size: 16px; transition: border-color 0.3s; resize: vertical;"></textarea>
                </div>
                <div style="display:flex; gap:15px;">
                    <button id="phone-button" type="submit" style="background: var(--background-gradient); color:white; border:none; padding:14px 28px; border-radius:8px; cursor:pointer; font-weight:600; font-size: 16px; transition: all 0.3s; box-shadow: 0 4px 15px rgba(0, 92, 102, 0.3);">Solicitar Contato</button>
                    <a href="https://wa.me/55981147758" target="_blank" style="display:inline-flex; align-items:center; background-color:#25D366; color:white; text-decoration:none; border:none; padding:14px 28px; border-radius:8px; cursor:pointer; font-weight:600; font-size: 16px; transition: all 0.3s; box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);">
                        <i class="fab fa-whatsapp" style="margin-right:8px;"></i> <span id="whatsapp-text">WhatsApp</span>
                    </a>
                </div>
            </form>
        </div>
    </div>

    <script>
        function openEmailForm() { document.getElementById('emailModal').style.display = 'flex'; }
        function closeEmailModal() { document.getElementById('emailModal').style.display = 'none'; }
        function openPhoneForm() { document.getElementById('phoneModal').style.display = 'flex'; }
        function closePhoneModal() { document.getElementById('phoneModal').style.display = 'none'; }

        window.onclick = function(event) {
            if (event.target == document.getElementById('emailModal')) closeEmailModal();
            if (event.target == document.getElementById('phoneModal')) closePhoneModal();
        }

        document.addEventListener('DOMContentLoaded', function() {
            initializeBasicContent('pt');
            initializeModalTexts('pt');

            const inputs = document.querySelectorAll('input, textarea');
            inputs.forEach(input => {
                input.addEventListener('focus', function() { this.style.borderColor = 'var(--bari-teal)'; });
                input.addEventListener('blur', function() { this.style.borderColor = '#e5e7eb'; });
            });

            const tooltips = document.querySelectorAll('.tooltip');
            tooltips.forEach(tooltip => {
                tooltip.addEventListener('click', function(e) {
                    e.stopPropagation();
                    tooltips.forEach(t => { if (t !== this) t.classList.remove('tooltip-active'); });
                    this.classList.toggle('tooltip-active');
                });
            });

            document.addEventListener('click', function() {
                tooltips.forEach(tooltip => tooltip.classList.remove('tooltip-active'));
            });

            // Scroll-triggered reveals — cards land like milestones on the growth path
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('animate-in');
                        observer.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });

            setTimeout(() => {
                document.querySelectorAll('.experience-item, .project-item').forEach(item => {
                    observer.observe(item);
                });
            }, 100);
        });

        function initializeBasicContent(lang = 'en') {
            const nameEl = document.getElementById('cv-name');
            if (nameEl) nameEl.textContent = getText('name', lang);

            const roleEl = document.getElementById('cv-role');
            if (roleEl) roleEl.textContent = getText('role', lang);

            const emailEl = document.getElementById('cv-email');
            if (emailEl) emailEl.textContent = getText('contact.email', lang);

            const phoneEl = document.getElementById('cv-phone');
            if (phoneEl) phoneEl.textContent = getText('contact.phone', lang);

            const locationEl = document.querySelector('#cv-location span');
            if (locationEl) locationEl.textContent = getText('contact.location', lang);

            const linkedinEl = document.getElementById('cv-linkedin');
            if (linkedinEl) linkedinEl.textContent = getText('contact.linkedin', lang);

            const repositoryEl = document.getElementById('cv-repository');
            if (repositoryEl) repositoryEl.textContent = getText('contact.repository', lang);

            const emailCTAEl = document.getElementById('cv-cta-email');
            if (emailCTAEl) emailCTAEl.textContent = getText('contactCTA.email', lang);

            const phoneCTAEl = document.getElementById('cv-cta-phone');
            if (phoneCTAEl) phoneCTAEl.textContent = getText('contactCTA.phone', lang);

            const linkedinCTAEl = document.getElementById('cv-cta-linkedin');
            if (linkedinCTAEl) linkedinCTAEl.textContent = getText('contactCTA.linkedin', lang);

            const repositoryCTAEl = document.getElementById('cv-cta-repository');
            if (repositoryCTAEl) repositoryCTAEl.textContent = getText('contactCTA.repository', lang);

            const profileTitleEl = document.getElementById('section-profile');
            if (profileTitleEl) profileTitleEl.textContent = getText('sections.profile', lang);

            const skillsTitleEl = document.getElementById('section-skills');
            if (skillsTitleEl) skillsTitleEl.textContent = getText('sections.skills', lang);

            const experienceTitleEl = document.getElementById('section-experience');
            if (experienceTitleEl) experienceTitleEl.textContent = getText('sections.experience', lang);

            const educationTitleEl = document.getElementById('section-education');
            if (educationTitleEl) educationTitleEl.textContent = getText('sections.education', lang);

            const projectsTitleEl = document.getElementById('section-projects');
            if (projectsTitleEl) projectsTitleEl.textContent = getText('sections.projects', lang);

            const profileEl = document.getElementById('cv-profile');
            if (profileEl) profileEl.textContent = getText('professionalProfile', lang);

            renderSkills('skills-strategic', 'strategic', lang);
            renderSkills('skills-tools', 'tools', lang);
            renderSkills('skills-emerging', 'emerging', lang);

            renderExperience(lang);
            renderEducation(lang);
            renderProjects(lang);
        }

        function renderExperience(lang = 'en') {
            const container = document.getElementById('cv-experience');
            if (!container) return;

            const experiences = getText('experience', lang);
            const total = experiences.length;
            let html = '';

            experiences.forEach((exp, index) => {
                const milestone = total - index;
                html += `
                    <div class="experience-item">
                        <div class="job-title">
                            <div class="job-number">${String(milestone).padStart(2, '0')}</div>
                            ${exp.title}
                            ${renderTooltip(exp.tooltip)}
                        </div>
                        <div class="company">${exp.company}</div>
                        <div class="period">${exp.period}</div>
                        <div class="job-description">${exp.description}</div>
                        <div class="achievements-container">
                            ${renderAchievements(exp.achievements)}
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        function renderEducation(lang = 'en') {
            const container = document.getElementById('cv-education');
            if (!container) return;

            const education = getText('education', lang);
            let html = '';

            education.forEach(edu => {
                html += `
                    <div class="education-item">
                        <div class="degree">${edu.degree}</div>
                        <div class="university">${edu.university}</div>
                        <div class="thesis">${edu.thesis}</div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        function renderProjects(lang = 'en') {
            const container = document.getElementById('cv-projects');
            if (!container) return;

            const projects = getText('projects', lang);
            let html = '';

            projects.forEach(project => {
                html += `
                    <div class="project-item">
                        <div class="project-title">${project.title}</div>
                        <div class="project-description">${project.description}</div>
                        <div style="margin-top: 15px;">
                            ${renderTechTags(project.techs)}
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }
    </script>
    <!-- Dynamic Favicon System -->
    <script src="../../assets/js/dynamic-favicon.js"></script>
</body>
</html>
