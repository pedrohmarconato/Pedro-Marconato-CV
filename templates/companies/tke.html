<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedro Marconato - TK Elevator</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap');

        :root {
            /* TK Elevator Official Colors (extracted from tkelevator.com production CSS) */
            --tke-purple: #7000BD;
            --tke-purple-deep: #59008D;
            --tke-blue: #00A0F0;
            --tke-navy: #003C7D;
            --tke-magenta: #D7005F;
            --tke-amber: #FFB400;
            --tke-gray: #EEF0F2;
            --tke-ink: #262626;

            /* Applied Colors */
            --primary-color: var(--tke-purple);
            --secondary-color: var(--tke-blue);
            --accent-color: var(--tke-magenta);
            --light-accent: var(--tke-gray);
            --dark-accent: #4a007d;
            --text-color: var(--tke-ink);
            --border-color: rgba(112, 0, 189, 0.2);
            --background-gradient: linear-gradient(135deg, var(--tke-purple) 0%, var(--tke-navy) 55%, var(--tke-blue) 100%);

            --font-body: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --font-mono: 'JetBrains Mono', 'SF Mono', Menlo, monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-body);
            color: var(--text-color);
            line-height: 1.6;
            background: #f8f7fa;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        h1, .section-title, .job-title, .degree, .project-title {
            font-weight: 800;
            letter-spacing: -0.3px;
        }

        /* ===== Ambient background ===== */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #f8f7fa;
            z-index: -2;
            overflow: hidden;
        }

        .gradient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(50px);
            opacity: 0.1;
        }

        .gradient-orb:nth-child(1) {
            width: 320px;
            height: 320px;
            background: var(--tke-purple);
            top: -110px;
            left: -90px;
        }

        .gradient-orb:nth-child(2) {
            width: 260px;
            height: 260px;
            background: var(--tke-blue);
            bottom: -100px;
            right: -60px;
        }

        .gradient-orb:nth-child(3) {
            width: 200px;
            height: 200px;
            background: var(--tke-magenta);
            top: 48%;
            right: 6%;
            opacity: 0.06;
        }

        .cv-container {
            max-width: 1000px;
            margin: 30px auto;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 22px;
            box-shadow:
                0 20px 60px rgba(112, 0, 189, 0.18),
                0 8px 16px rgba(38, 38, 38, 0.08);
            border: 1px solid rgba(112, 0, 189, 0.15);
            overflow: hidden;
            position: relative;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .cv-container:hover {
            box-shadow:
                0 30px 80px rgba(112, 0, 189, 0.24),
                0 12px 24px rgba(38, 38, 38, 0.1);
        }

        /* ===== HERO HEADER — vertical mobility ===== */
        .header {
            background: var(--background-gradient);
            padding: 70px 30px 110px 30px;
            position: relative;
            overflow: hidden;
            min-height: 58vh;
            display: flex;
            align-items: center;
        }

        /* Elevator shaft guide rails — vertical lines pattern */
        .shaft-rails {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                repeating-linear-gradient(90deg,
                    transparent,
                    transparent 118px,
                    rgba(255, 255, 255, 0.05) 118px,
                    rgba(255, 255, 255, 0.05) 120px);
            z-index: 1;
        }

        /* Ascending cabin lights — particles rising like elevators */
        .rising-lights {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 2;
            overflow: hidden;
            pointer-events: none;
        }

        .rising-light {
            position: absolute;
            width: 8px;
            height: 14px;
            border-radius: 3px;
            background: linear-gradient(to top, rgba(255, 180, 0, 0.85), rgba(255, 255, 255, 0.9));
            box-shadow: 0 0 12px rgba(255, 180, 0, 0.6);
            animation: cabinRise 12s linear infinite;
            opacity: 0;
        }

        .rising-light:nth-child(1) { left: 12%; animation-delay: 0s;   animation-duration: 11s; }
        .rising-light:nth-child(2) { left: 27%; animation-delay: 3s;   animation-duration: 14s; }
        .rising-light:nth-child(3) { left: 43%; animation-delay: 6s;   animation-duration: 10.5s; }
        .rising-light:nth-child(4) { left: 61%; animation-delay: 1.6s; animation-duration: 13s; }
        .rising-light:nth-child(5) { left: 76%; animation-delay: 4.8s; animation-duration: 12s; }
        .rising-light:nth-child(6) { left: 89%; animation-delay: 8s;   animation-duration: 15s; }

        @keyframes cabinRise {
            0% {
                bottom: -20px;
                opacity: 0;
                transform: scaleY(1);
            }
            6% { opacity: 1; }
            50% { transform: scaleY(1.35); }
            88% { opacity: 0.9; }
            100% {
                bottom: 106%;
                opacity: 0;
                transform: scaleY(1);
            }
        }

        /* Diagonal light sweep */
        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 55%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.08), transparent);
            animation: lightSweep 10s ease-in-out infinite;
            z-index: 2;
        }

        @keyframes lightSweep {
            0% { left: -60%; }
            55%, 100% { left: 110%; }
        }

        /* City skyline silhouette at the bottom of the hero */
        .skyline {
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 120px;
            z-index: 4;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 120" preserveAspectRatio="none"><path fill="%23ffffff" fill-opacity="0.16" d="M0,120 L0,74 L44,74 L44,38 L58,38 L58,74 L96,74 L96,52 L132,52 L132,120 L170,120 L170,30 L182,30 L182,18 L196,18 L196,30 L210,30 L210,120 L258,120 L258,64 L306,64 L306,86 L342,86 L342,44 L390,44 L390,120 L430,120 L430,56 L444,56 L444,24 L458,24 L458,56 L494,56 L494,120 L540,120 L540,78 L588,78 L588,40 L636,40 L636,120 L684,120 L684,10 L696,10 L696,0 L710,0 L710,10 L724,10 L724,120 L772,120 L772,68 L820,68 L820,90 L858,90 L858,50 L906,50 L906,120 L948,120 L948,34 L962,34 L962,60 L1010,60 L1010,120 L1058,120 L1058,80 L1106,80 L1106,46 L1154,46 L1154,120 L1196,120 L1196,26 L1210,26 L1210,14 L1224,14 L1224,26 L1238,26 L1238,120 L1286,120 L1286,72 L1334,72 L1334,94 L1372,94 L1372,58 L1440,58 L1440,120 Z"/></svg>') repeat-x;
            background-size: 1440px 120px;
            pointer-events: none;
        }

        /* Logo — top right */
        .brand-logo {
            position: absolute;
            top: 34px;
            right: 44px;
            width: 138px;
            z-index: 15;
            animation: logoDescend 1.4s cubic-bezier(0.34, 1.3, 0.64, 1) both;
        }

        .brand-logo img {
            width: 100%;
            height: auto;
            filter: brightness(0) invert(1);
            opacity: 0.96;
            transition: all 0.3s ease;
        }

        .brand-logo:hover img {
            transform: scale(1.04);
        }

        @keyframes logoDescend {
            0% { transform: translateY(-40px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        .header-content {
            position: relative;
            z-index: 10;
            width: 100%;
            padding: 0 50px;
        }

        .header-text {
            max-width: 760px;
        }

        /* Floor-indicator style tagline */
        .company-tagline {
            font-family: var(--font-mono);
            font-size: 13.5px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.92);
            letter-spacing: 3.5px;
            text-transform: lowercase;
            margin-bottom: 26px;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 9px 18px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.18);
            animation: taglineReveal 1s ease-out 0.2s both;
        }

        .company-tagline .floor-arrow {
            color: var(--tke-amber);
            font-size: 15px;
            animation: arrowRise 1.6s ease-in-out infinite;
        }

        @keyframes arrowRise {
            0%, 100% { transform: translateY(2px); opacity: 0.7; }
            50% { transform: translateY(-3px); opacity: 1; }
        }

        @keyframes taglineReveal {
            0% { opacity: 0; transform: translateY(15px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .header h1 {
            font-size: clamp(2.6rem, 5.5vw, 3.9rem);
            font-weight: 900;
            color: white;
            margin-bottom: 20px;
            letter-spacing: -1.5px;
            line-height: 1.08;
            text-transform: uppercase;
            text-shadow: 0 3px 16px rgba(0, 0, 0, 0.3);
            animation: titleRise 1.2s ease-out both;
            position: relative;
        }

        .header h1::after {
            content: '';
            position: absolute;
            bottom: -12px;
            left: 0;
            width: 90px;
            height: 4px;
            background: linear-gradient(90deg, var(--tke-amber), var(--tke-magenta), transparent);
            border-radius: 2px;
            animation: underlineGrow 1s ease-out 0.7s both;
        }

        @keyframes titleRise {
            0% { opacity: 0; transform: translateY(40px) scale(0.97); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes underlineGrow {
            0% { width: 0; opacity: 0; }
            100% { width: 90px; opacity: 1; }
        }

        .role {
            font-size: clamp(1.05rem, 2.6vw, 1.45rem);
            font-weight: 400;
            color: rgba(255, 255, 255, 0.92);
            margin-bottom: 38px;
            margin-top: 20px;
            letter-spacing: 0.6px;
            animation: roleRise 1.2s ease-out 0.35s both;
        }

        @keyframes roleRise {
            0% { opacity: 0; transform: translateY(25px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .contact-info {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            align-items: center;
            animation: contactRise 1.2s ease-out 0.6s both;
        }

        @keyframes contactRise {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .contact-button {
            display: inline-flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.13);
            border-radius: 12px;
            padding: 12px 20px;
            text-decoration: none;
            color: white;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.3px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255, 255, 255, 0.25);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .contact-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 180, 0, 0.3), transparent);
            transition: left 0.6s ease;
        }

        .contact-button:hover {
            background: rgba(215, 0, 95, 0.3);
            border-color: var(--tke-magenta);
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
        }

        .contact-button:hover::before {
            left: 100%;
        }

        .contact-button i {
            margin-right: 9px;
            font-size: 16px;
            color: var(--tke-amber);
        }

        .contact-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .contact-cta {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.68);
            font-weight: 400;
            animation: gentlePulse 3s ease-in-out infinite;
        }

        @keyframes gentlePulse {
            0%, 100% { opacity: 0.68; transform: scale(1); }
            50% { opacity: 0.9; transform: scale(1.02); }
        }

        .location {
            display: flex;
            align-items: center;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.9);
        }

        .location i {
            margin-right: 6px;
            color: var(--tke-amber);
        }

        /* ===== SECTIONS — rising reveal cascade ===== */
        .section {
            padding: 55px 80px;
            position: relative;
            opacity: 0;
            transform: translateY(45px);
            animation: sectionRise 0.8s ease-out forwards;
        }

        .section:nth-of-type(1) { animation-delay: 0.2s; }
        .section:nth-of-type(2) { animation-delay: 0.4s; }
        .section:nth-of-type(3) { animation-delay: 0.6s; }
        .section:nth-of-type(4) { animation-delay: 0.8s; }
        .section:nth-of-type(5) { animation-delay: 1.0s; }

        @keyframes sectionRise {
            0% { opacity: 0; transform: translateY(45px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .section:not(:last-child)::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 80px;
            right: 80px;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--border-color), transparent);
        }

        .section-title {
            background: var(--background-gradient);
            color: white;
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 32px;
            padding: 14px 30px;
            border-radius: 10px;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            box-shadow: 0 8px 24px rgba(112, 0, 189, 0.25);
            display: inline-block;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .section-title::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            animation: titleShimmer 4.5s ease-in-out infinite;
        }

        @keyframes titleShimmer {
            0% { left: -100%; }
            50%, 100% { left: 100%; }
        }

        .section-title:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(112, 0, 189, 0.35);
        }

        .profile-text {
            font-size: 16px;
            line-height: 1.85;
            color: var(--text-color);
            text-align: justify;
        }

        /* ===== SKILLS — engineered panels ===== */
        .skills-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 26px;
        }

        @media (max-width: 1000px) {
            .skills-container { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 600px) {
            .skills-container { grid-template-columns: 1fr; }
        }

        .skills-column {
            background: linear-gradient(160deg, rgba(238, 240, 242, 0.9), rgba(238, 240, 242, 0.35));
            padding: 28px;
            border-radius: 14px;
            border: 1px solid rgba(112, 0, 189, 0.15);
            border-top: 3px solid var(--tke-purple);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 32px rgba(38, 38, 38, 0.06);
            opacity: 0;
            transform: translateY(35px);
            animation: panelRise 0.8s ease forwards;
            position: relative;
        }

        .skills-column:nth-child(1) { animation-delay: 0.3s; border-top-color: var(--tke-purple); }
        .skills-column:nth-child(2) { animation-delay: 0.5s; border-top-color: var(--tke-blue); }
        .skills-column:nth-child(3) { animation-delay: 0.7s; border-top-color: var(--tke-magenta); }

        @keyframes panelRise {
            to { opacity: 1; transform: translateY(0); }
        }

        .skills-column:hover {
            transform: translateY(-5px);
            box-shadow: 0 16px 44px rgba(112, 0, 189, 0.14);
            border-color: rgba(112, 0, 189, 0.3);
        }

        .skill-item {
            display: flex;
            align-items: center;
            margin-bottom: 13px;
            font-size: 15px;
            color: var(--text-color);
            transition: all 0.3s ease;
        }

        .skill-item:hover {
            transform: translateX(8px);
            color: var(--tke-purple);
        }

        .skill-item i {
            color: var(--tke-purple);
            margin-right: 12px;
            font-size: 18px;
            transition: all 0.3s ease;
        }

        .skill-item:hover i {
            color: var(--tke-magenta);
            transform: scale(1.2);
        }

        .tool-item {
            margin-bottom: 18px;
        }

        .tool-name {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 500;
            font-size: 14px;
            margin-bottom: 8px;
            color: var(--text-color);
        }

        .tool-percentage {
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--tke-magenta);
            font-weight: 700;
        }

        .dots-container {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-wrap: nowrap;
        }

        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: rgba(112, 0, 189, 0.15);
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .dot.filled {
            background: linear-gradient(135deg, var(--tke-purple) 0%, var(--tke-blue) 100%);
            box-shadow: 0 1px 4px rgba(112, 0, 189, 0.4);
            animation: dotPulse 2s ease-in-out infinite alternate;
        }

        @keyframes dotPulse {
            0% { transform: scale(1); box-shadow: 0 1px 3px rgba(112, 0, 189, 0.3); }
            100% { transform: scale(1.12); box-shadow: 0 2px 7px rgba(112, 0, 189, 0.5); }
        }

        .tool-item:hover .dot.filled {
            background: linear-gradient(135deg, var(--tke-magenta) 0%, var(--tke-purple) 100%);
            transform: scale(1.2);
        }

        /* ===== Tooltips ===== */
        .tooltip { position: relative; display: inline-block; cursor: help; }

        .tooltip .tooltip-icon {
            color: var(--tke-magenta);
            font-size: 14px;
            margin-left: 5px;
            transition: transform 0.2s, color 0.2s;
        }

        .tooltip:hover .tooltip-icon,
        .tooltip:focus .tooltip-icon,
        .tooltip:active .tooltip-icon {
            color: var(--tke-purple);
            transform: scale(1.2);
        }

        .tooltip .tooltip-text {
            visibility: hidden;
            width: 380px;
            background: linear-gradient(145deg, var(--tke-navy), var(--tke-purple));
            color: white;
            text-align: left;
            border-radius: 12px;
            padding: 0;
            position: absolute;
            z-index: 100;
            bottom: 125%;
            left: 50%;
            margin-left: -190px;
            opacity: 0;
            transition: opacity 0.4s, transform 0.3s;
            transform: translateY(10px);
            font-size: 13px;
            line-height: 1.5;
            box-shadow: 0 10px 40px rgba(112, 0, 189, 0.35);
            overflow: hidden;
            max-height: 85vh;
            overflow-y: auto;
        }

        .tooltip .tooltip-text::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -8px;
            border-width: 8px;
            border-style: solid;
            border-color: var(--tke-purple) transparent transparent transparent;
        }

        .tooltip:hover .tooltip-text,
        .tooltip:focus .tooltip-text,
        .tooltip:active .tooltip-text,
        .tooltip.tooltip-active .tooltip-text {
            visibility: visible;
            opacity: 1;
            transform: translateY(0);
            min-height: 330px;
        }

        .tooltip-active .tooltip-text {
            position: absolute;
            z-index: 9999;
            overflow-y: auto;
        }

        .tooltip-header {
            background-color: rgba(255, 255, 255, 0.06);
            padding: 12px 18px;
            font-weight: 600;
            font-size: 1.05em;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
            color: white;
        }

        .tooltip-content { padding: 18px; }
        .tooltip-section { margin-bottom: 15px; }
        .tooltip-section:last-of-type { margin-bottom: 0; }

        .tooltip-section-title {
            display: flex;
            align-items: center;
            font-weight: 500;
            font-size: 1em;
            color: #ffffff;
            margin-bottom: 10px;
        }

        .tooltip-section-title .fas {
            margin-right: 12px;
            font-size: 1.1em;
            width: 20px;
            text-align: center;
            color: var(--tke-amber);
        }

        .tooltip-list { list-style-position: outside; padding-left: 20px; margin-top: 5px; }
        .tooltip-list li { margin-bottom: 10px; line-height: 1.5; }
        .tooltip-list li::marker { color: rgba(255, 255, 255, 0.7); }

        @media (max-width: 768px) {
            .tooltip .tooltip-text {
                width: 90vw;
                max-width: 320px;
                left: 50%;
                transform: translateX(-50%);
                margin-left: 0;
                font-size: 12px;
                max-height: 75vh;
            }

            .tooltip-active .tooltip-text {
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%) !important;
                width: 90vw;
                max-width: 380px;
                z-index: 10000;
            }
        }

        /* ===== EXPERIENCE — elevator shaft timeline ===== */
        .experience-timeline {
            position: relative;
            margin-left: 40px;
            padding-left: 48px;
        }

        /* Twin guide rails like an elevator shaft */
        .experience-timeline::before {
            content: "";
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 10px;
            border-left: 3px solid var(--tke-purple);
            border-right: 3px solid var(--tke-blue);
            background: repeating-linear-gradient(
                to bottom,
                transparent,
                transparent 26px,
                rgba(112, 0, 189, 0.25) 26px,
                rgba(112, 0, 189, 0.25) 30px);
        }

        .experience-item {
            margin-bottom: 32px;
            position: relative;
            padding: 32px;
            border-radius: 16px;
            background: linear-gradient(150deg, rgba(255, 255, 255, 0.95), rgba(238, 240, 242, 0.7));
            box-shadow: 0 8px 32px rgba(38, 38, 38, 0.06);
            border: 1px solid rgba(112, 0, 189, 0.15);
            border-left: 4px solid var(--tke-purple);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
            transform: translateY(50px);
        }

        .experience-item.animate-in {
            animation: floorArrive 0.8s cubic-bezier(0.22, 0.9, 0.36, 1) forwards;
        }

        @keyframes floorArrive {
            0% { opacity: 0; transform: translateY(50px); }
            80% { transform: translateY(-4px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .experience-item:hover {
            transform: translateY(-4px);
            border-left-color: var(--tke-magenta);
            box-shadow: 0 14px 44px rgba(112, 0, 189, 0.14);
        }

        .experience-item:hover,
        .experience-item:focus-within {
            overflow: visible !important;
        }

        /* Floor indicator dot on the shaft */
        .experience-item::before {
            content: "";
            position: absolute;
            left: -54px;
            top: 38px;
            width: 14px;
            height: 14px;
            border-radius: 3px;
            background: var(--tke-amber);
            border: 3px solid white;
            box-shadow: 0 0 0 3px rgba(255, 180, 0, 0.35), 0 0 12px rgba(255, 180, 0, 0.5);
            z-index: 1;
        }

        .job-title {
            font-weight: 800;
            font-size: 21px;
            color: var(--tke-navy);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* Floor-display style job number */
        .job-number {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 42px;
            height: 38px;
            background: #1a1a1a;
            color: var(--tke-amber);
            font-family: var(--font-mono);
            border-radius: 7px;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 1px;
            box-shadow:
                inset 0 0 8px rgba(255, 180, 0, 0.25),
                0 3px 10px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 180, 0, 0.4);
            text-shadow: 0 0 8px rgba(255, 180, 0, 0.7);
            flex-shrink: 0;
        }

        .company {
            font-weight: 600;
            font-size: 16px;
            color: var(--tke-purple);
            margin-bottom: 5px;
        }

        .period {
            font-family: var(--font-mono);
            font-size: 12.5px;
            color: #6b7280;
            margin-bottom: 16px;
            display: inline-block;
            background: rgba(112, 0, 189, 0.07);
            padding: 5px 14px;
            border-radius: 6px;
            border: 1px solid rgba(112, 0, 189, 0.18);
        }

        .job-description {
            font-size: 15px;
            line-height: 1.65;
            color: var(--text-color);
            margin-bottom: 20px;

        .achievements-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        @media (max-width: 900px) {
            .achievements-container { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 600px) {
            .achievements-container { grid-template-columns: 1fr; }
        }

        .achievement-item {
            background: linear-gradient(135deg, rgba(112, 0, 189, 0.05), rgba(0, 160, 240, 0.04));
            border-radius: 10px;
            padding: 18px;
            border: 1px solid rgba(112, 0, 189, 0.14);
            display: flex;
            align-items: flex-start;
            gap: 12px;
            transition: all 0.3s ease;
        }

        .achievement-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 22px rgba(112, 0, 189, 0.15);
            border-color: var(--tke-purple);
        }

        .achievement-icon {
            font-size: 22px;
            color: var(--tke-purple);
            flex-shrink: 0;
        }

        .achievement-content { flex: 1; }

        .achievement-title {
            font-weight: 600;
            font-size: 15px;
            color: var(--tke-navy);
            margin-bottom: 6px;
        }

        .achievement-description {
            font-size: 14px;
            line-height: 1.5;
            color: var(--text-color);
        }

        /* ===== EDUCATION ===== */
        .education-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;

        @media (max-width: 700px) {
            .education-container { grid-template-columns: 1fr; }
        }

        .education-item {
            background: linear-gradient(160deg, rgba(238, 240, 242, 0.9), rgba(238, 240, 242, 0.35));
            padding: 26px;
            border-radius: 12px;
            border: 1px solid rgba(112, 0, 189, 0.15);
            border-left: 4px solid var(--tke-blue);
            transition: all 0.3s ease;
        }

        .education-item:hover {
            transform: translateY(-3px);
            border-left-color: var(--tke-magenta);
            box-shadow: 0 10px 28px rgba(112, 0, 189, 0.12);
        }

        .degree {
            font-weight: 800;
            font-size: 18px;
            color: var(--tke-navy);
            margin-bottom: 8px;
        }

        .university {
            font-size: 15px;
            color: var(--text-color);
            margin-bottom: 8px;
        }

        .thesis {
            font-size: 14px;
            font-style: italic;
            color: #6b7280;
        }

        /* ===== PROJECTS ===== */
        .projects-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 22px;
        }

        @media (max-width: 900px) {
            .projects-container { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 600px) {
            .projects-container { grid-template-columns: 1fr; }
        }

        .project-item {
            background: linear-gradient(150deg, rgba(255, 255, 255, 0.95), rgba(238, 240, 242, 0.7));
            border-radius: 14px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(38, 38, 38, 0.06);
            border: 1px solid rgba(112, 0, 189, 0.15);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            opacity: 0;
            transform: translateY(40px);
        }

        .project-item.animate-in {
            animation: projectRise 0.7s ease forwards;
        }

        @keyframes projectRise {
            to { opacity: 1; transform: translateY(0); }
        }

        .project-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--tke-purple), var(--tke-blue), var(--tke-magenta));
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.35s ease;
        }

        .project-item:hover::before {
            transform: scaleX(1);
        }

        .project-item:hover {
            transform: translateY(-6px);
            border-color: var(--tke-purple);
            box-shadow: 0 14px 40px rgba(112, 0, 189, 0.16);
        }

        .project-title {
            font-weight: 800;
            font-size: 18px;
            color: var(--tke-navy);
            margin-bottom: 12px;
        }

        .project-description {
            font-size: 14px;
            line-height: 1.6;
            color: var(--text-color);
            margin-bottom: 15px;
        }

        .tech-tag {
            display: inline-block;
            background: rgba(112, 0, 189, 0.07);
            color: var(--tke-purple);
            font-family: var(--font-mono);
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 11.5px;
            font-weight: 600;
            margin-right: 8px;
            margin-bottom: 8px;
            border: 1px solid rgba(112, 0, 189, 0.2);
            transition: all 0.25s ease;
        }

        .tech-tag:hover {
            background: var(--tke-magenta);
            color: white;
            border-color: var(--tke-magenta);
            transform: translateY(-2px);
            box-shadow: 0 3px 12px rgba(215, 0, 95, 0.35);
        }

        /* ===== Fixed controls ===== */
        .print-button {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--background-gradient);
            color: white;
            border: none;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(112, 0, 189, 0.4);
            transition: all 0.3s ease;
            z-index: 100;
        }

        .print-button:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 30px rgba(112, 0, 189, 0.55);
        }

        .print-button i { font-size: 24px; }

        .language-toggle {
            position: fixed;
            top: 30px;
            right: 30px;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 5px;
            display: flex;
            align-items: center;
            box-shadow: 0 4px 20px rgba(38, 38, 38, 0.12);
            transition: all 0.3s ease;
            z-index: 100;
            border: 2px solid rgba(112, 0, 189, 0.25);
        }

        .language-toggle:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(112, 0, 189, 0.3);
            border-color: rgba(112, 0, 189, 0.45);
        }

        .language-option {
            padding: 8px 20px;
            border-radius: 25px;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            color: var(--text-color);
            position: relative;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .language-option i { font-size: 14px; opacity: 0.7; }

        .language-option.active {
            background: var(--background-gradient);
            color: white;
            box-shadow: 0 2px 12px rgba(112, 0, 189, 0.35);
            animation: pulseActive 2s ease-in-out infinite;
        }

        @keyframes pulseActive {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .language-option.active i { opacity: 1; animation: checkRotate 0.5s ease-out; }

        @keyframes checkRotate {
            from { transform: rotate(-180deg); opacity: 0; }
            to { transform: rotate(0deg); opacity: 1; }
        }

        .language-option:not(.active):hover {
            background: rgba(112, 0, 189, 0.06);
            color: var(--tke-purple);
        }

        .language-divider {
            width: 1px;
            height: 20px;
            background: rgba(112, 0, 189, 0.25);
            margin: 0 5px;
        }

        /* ===== Responsive ===== */
        @media (max-width: 768px) {
            .cv-container { margin: 0; border-radius: 0; max-width: 100%; }
            .header { padding: 50px 20px 80px 20px; min-height: auto; }
            .header-content { padding: 0 10px; }
            .header h1 { font-size: clamp(1.6rem, 7vw, 2.2rem); }
            .brand-logo { top: 18px; right: 20px; width: 88px; }
            .company-tagline { font-size: 10.5px; letter-spacing: 2px; padding: 7px 12px; }
            .role { font-size: 14px; }
            .skyline { height: 70px; background-size: 900px 70px; }
            .contact-info { flex-direction: column; gap: 8px; align-items: stretch; }
            .contact-item { width: 100%; }
            .contact-button { padding: 8px 12px; font-size: 12px; min-height: 38px; width: 100%; }
            .contact-cta { font-size: 11px; }
            .section { padding: 26px 16px; }
            .section-title { font-size: 13px; margin-bottom: 18px; padding: 9px 18px; }
            .education-container { grid-template-columns: 1fr; }
            .skills-container { grid-template-columns: 1fr; }
            .experience-timeline { padding-left: 16px; margin-left: 0; }
            .experience-timeline::before { display: none; }
            .experience-item::before { display: none; }
            .projects-container { grid-template-columns: 1fr; }
            .project-item { padding: 18px; }
            .achievements-container { grid-template-columns: 1fr; }
            .section:not(:last-child)::after { left: 16px; right: 16px; }
            .modal-content { width: 95%; margin: 5% auto; padding: 20px; }
            .modal input, .modal textarea { font-size: 16px; padding: 12px; }
            .modal button { min-height: 44px; font-size: 14px; }
            .print-button, .language-toggle {
                position: fixed;
                bottom: 20px;
                top: auto;
                min-height: 40px;
                z-index: 100;
            }
            .print-button { right: 20px; }
            .language-toggle { right: auto; left: 20px; }
        }

        @media (max-width: 480px) {
            .header h1 { font-size: 1.45rem; }
            .section { padding: 18px 12px; }
            .section-title { font-size: 12px; }
        }

        /* Reduced motion accessibility */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
            .section, .skills-column, .experience-item, .project-item {
                opacity: 1 !important;
                transform: none !important;
            }
        }

        /* ===== Print ===== */
        @media print {
            body { background: white; }
            .animated-bg, .gradient-orb, .shaft-rails, .rising-lights, .skyline,
            .print-button, .language-toggle { display: none !important; }
            .cv-container { box-shadow: none; border: none; margin: 0; }

                opacity: 1 !important;
                transform: none !important;
                animation: none !important;

            .section-title {
                background: var(--tke-purple) !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;

            .header {
                background: var(--tke-purple) !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
                page-break-inside: avoid;
                padding: 30px !important;
                min-height: auto;
            }
            .header::after, .header::before { display: none !important; }
        }

                </div>
                <div style="margin-bottom:25px;">
                    <label id="phone-label-message" style="display:block; margin-bottom:8px; font-weight:500; color: var(--text-color);">Message (Optional)</label>
                    <textarea name="message" rows="3" style="width:100%; padding:12px; border:2px solid #e5e7eb; border-radius:8px; font-size: 16px; transition: border-color 0.3s; resize: vertical;"></textarea>
                </div>
                <div style="display:flex; gap:15px;">
                    <button id="phone-button" type="submit" style="background: var(--background-gradient); color:white; border:none; padding:14px 28px; border-radius:8px; cursor:pointer; font-weight:600; font-size: 16px; transition: all 0.3s; box-shadow: 0 4px 15px rgba(112, 0, 189, 0.3);">Request Contact</button>
                    <a href="https://wa.me/55981147758" target="_blank" style="display:inline-flex; align-items:center; background-color:#25D366; color:white; text-decoration:none; border:none; padding:14px 28px; border-radius:8px; cursor:pointer; font-weight:600; font-size: 16px; transition: all 0.3s; box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);">
                        <i class="fab fa-whatsapp" style="margin-right:8px;"></i> <span id="whatsapp-text">WhatsApp</span>
                    </a>
                </div>
            </form>
        </div>
    </div>

    <script>
        function openEmailForm() { document.getElementById('emailModal').style.display = 'flex'; }
        function closeEmailModal() { document.getElementById('emailModal').style.display = 'none'; }
        function openPhoneForm() { document.getElementById('phoneModal').style.display = 'flex'; }
        function closePhoneModal() { document.getElementById('phoneModal').style.display = 'none'; }

        window.onclick = function(event) {
            if (event.target == document.getElementById('emailModal')) closeEmailModal();
            if (event.target == document.getElementById('phoneModal')) closePhoneModal();
        }

        document.addEventListener('DOMContentLoaded', function() {
            initializeBasicContent('en');
            initializeModalTexts('en');

            const inputs = document.querySelectorAll('input, textarea');
            inputs.forEach(input => {
                input.addEventListener('focus', function() { this.style.borderColor = 'var(--tke-purple)'; });
                input.addEventListener('blur', function() { this.style.borderColor = '#e5e7eb'; });
            });

            const tooltips = document.querySelectorAll('.tooltip');
            tooltips.forEach(tooltip => {
                tooltip.addEventListener('click', function(e) {
                    e.stopPropagation();
                    tooltips.forEach(t => { if (t !== this) t.classList.remove('tooltip-active'); });
                    this.classList.toggle('tooltip-active');
                });
            });

            document.addEventListener('click', function() {
                tooltips.forEach(tooltip => tooltip.classList.remove('tooltip-active'));
            });

            // Scroll-triggered reveals — cards "arrive" like elevator floors
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('animate-in');
                        observer.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });

            setTimeout(() => {
                document.querySelectorAll('.experience-item, .project-item').forEach(item => {
                    observer.observe(item);
                });
            }, 100);
        });

        function initializeBasicContent(lang = 'en') {
            const nameEl = document.getElementById('cv-name');
            if (nameEl) nameEl.textContent = getText('name', lang);

            const roleEl = document.getElementById('cv-role');
            if (roleEl) roleEl.textContent = getText('role', lang);

            const emailEl = document.getElementById('cv-email');
            if (emailEl) emailEl.textContent = getText('contact.email', lang);

            const phoneEl = document.getElementById('cv-phone');
            if (phoneEl) phoneEl.textContent = getText('contact.phone', lang);

            const locationEl = document.querySelector('#cv-location span');
            if (locationEl) locationEl.textContent = getText('contact.location', lang);

            const linkedinEl = document.getElementById('cv-linkedin');
            if (linkedinEl) linkedinEl.textContent = getText('contact.linkedin', lang);

            const repositoryEl = document.getElementById('cv-repository');
            if (repositoryEl) repositoryEl.textContent = getText('contact.repository', lang);

            const emailCTAEl = document.getElementById('cv-cta-email');
            if (emailCTAEl) emailCTAEl.textContent = getText('contactCTA.email', lang);

            const phoneCTAEl = document.getElementById('cv-cta-phone');
            if (phoneCTAEl) phoneCTAEl.textContent = getText('contactCTA.phone', lang);

            const linkedinCTAEl = document.getElementById('cv-cta-linkedin');
            if (linkedinCTAEl) linkedinCTAEl.textContent = getText('contactCTA.linkedin', lang);

            const repositoryCTAEl = document.getElementById('cv-cta-repository');
            if (repositoryCTAEl) repositoryCTAEl.textContent = getText('contactCTA.repository', lang);

            const profileTitleEl = document.getElementById('section-profile');
            if (profileTitleEl) profileTitleEl.textContent = getText('sections.profile', lang);

            const skillsTitleEl = document.getElementById('section-skills');
            if (skillsTitleEl) skillsTitleEl.textContent = getText('sections.skills', lang);

            const experienceTitleEl = document.getElementById('section-experience');
            if (experienceTitleEl) experienceTitleEl.textContent = getText('sections.experience', lang);

            const educationTitleEl = document.getElementById('section-education');
            if (educationTitleEl) educationTitleEl.textContent = getText('sections.education', lang);

            const projectsTitleEl = document.getElementById('section-projects');
            if (projectsTitleEl) projectsTitleEl.textContent = getText('sections.projects', lang);

            const profileEl = document.getElementById('cv-profile');
            if (profileEl) profileEl.textContent = getText('professionalProfile', lang);

            renderSkills('skills-strategic', 'strategic', lang);
            renderSkills('skills-tools', 'tools', lang);
            renderSkills('skills-emerging', 'emerging', lang);

            renderExperience(lang);
            renderEducation(lang);
            renderProjects(lang);
        }

        function renderExperience(lang = 'en') {
            const container = document.getElementById('cv-experience');
            if (!container) return;

            const experiences = getText('experience', lang);
            const total = experiences.length;
            let html = '';

            experiences.forEach((exp, index) => {
                const floor = total - index;
                html += `
                    <div class="experience-item">
                        <div class="job-title">
                            <div class="job-number">${String(floor).padStart(2, '0')}</div>
                            ${exp.title}
                            ${renderTooltip(exp.tooltip)}
                        </div>
                        <div class="company">${exp.company}</div>
                        <div class="period">${exp.period}</div>
                        <div class="job-description">${exp.description}</div>
                        <div class="achievements-container">
                            ${renderAchievements(exp.achievements)}
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        function renderEducation(lang = 'en') {
            const container = document.getElementById('cv-education');
            if (!container) return;

            const education = getText('education', lang);
            let html = '';

            education.forEach(edu => {
                html += `
                    <div class="education-item">
                        <div class="degree">${edu.degree}</div>
                        <div class="university">${edu.university}</div>
                        <div class="thesis">${edu.thesis}</div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        function renderProjects(lang = 'en') {
            const container = document.getElementById('cv-projects');
            if (!container) return;

            const projects = getText('projects', lang);
            let html = '';

            projects.forEach(project => {
                html += `
                    <div class="project-item">
                        <div class="project-title">${project.title}</div>
                        <div class="project-description">${project.description}</div>
                        <div style="margin-top: 15px;">
                            ${renderTechTags(project.techs)}
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }
    </script>
    <!-- Dynamic Favicon System -->
    <script src="../../assets/js/dynamic-favicon.js"></script>
</body>
</html>
