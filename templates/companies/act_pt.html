<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedro Marconato - ACT Digital (PT)</title>
    <style>
        @import url('https://api.fontshare.com/v2/css?f[]=satoshi@500,700,900&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap');

        :root {
            /* ACT Digital Official Colors (extracted from actdigital.com production CSS) */
            --act-navy: #090F19;
            --act-navy-2: #0D1626;
            --act-blue: #067FFF;
            --act-blue-deep: #0459B3;
            --act-mint: #42EDBA;
            --act-offwhite: #F1F2F2;
            --act-slate: #566D8F;

            /* Applied Colors */
            --primary-color: var(--act-navy);
            --secondary-color: var(--act-blue);
            --accent-color: var(--act-mint);
            --light-accent: #F1F2F2;
            --dark-accent: #060a11;
            --text-color: #2c3e50;
            --border-color: rgba(6, 127, 255, 0.2);
            --background-gradient: linear-gradient(135deg, var(--act-navy) 0%, var(--act-blue-deep) 60%, var(--act-blue) 100%);

            --font-display: 'Satoshi', 'Inter', -apple-system, sans-serif;
            --font-body: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --font-mono: 'JetBrains Mono', 'SF Mono', Menlo, monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-body);
            color: var(--text-color);
            line-height: 1.6;
            background: #f7f9fc;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        h1, .section-title, .job-title, .degree, .project-title {
            font-family: var(--font-display);
        }

        /* ===== Ambient background: gradient orbs ===== */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #f7f9fc;
            z-index: -2;
            overflow: hidden;
        }

        .gradient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(50px);
            opacity: 0.12;
        }

        .gradient-orb:nth-child(1) {
            width: 340px;
            height: 340px;
            background: var(--act-blue);
            top: -120px;
            left: -100px;
        }

        .gradient-orb:nth-child(2) {
            width: 280px;
            height: 280px;
            background: var(--act-mint);
            bottom: -110px;
            right: -60px;
        }

        .gradient-orb:nth-child(3) {
            width: 220px;
            height: 220px;
            background: var(--act-navy);
            top: 45%;
            right: 8%;
            opacity: 0.06;
        }

        .cv-container {
            max-width: 1000px;
            margin: 30px auto;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 28px;
            box-shadow:
                0 20px 60px rgba(9, 15, 25, 0.22),
                0 8px 16px rgba(9, 15, 25, 0.08);
            border: 1px solid rgba(66, 237, 186, 0.25);
            overflow: hidden;
            position: relative;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .cv-container:hover {
            box-shadow:
                0 30px 80px rgba(9, 15, 25, 0.28),
                0 12px 24px rgba(9, 15, 25, 0.1),
                0 0 60px rgba(66, 237, 186, 0.08);
        }

        /* ===== HERO HEADER — AI-first dark ===== */
        .header {
            background: var(--background-gradient);
            padding: 70px 30px 90px 30px;
            position: relative;
            overflow: hidden;
            min-height: 58vh;
            display: flex;
            align-items: center;
        }

        /* Data grid overlay — circuit board feel */
        .data-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(66, 237, 186, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(66, 237, 186, 0.05) 1px, transparent 1px);
            background-size: 44px 44px;
            z-index: 1;
            animation: gridDrift 30s linear infinite;
        }

        @keyframes gridDrift {
            0% { background-position: 0 0; }
            100% { background-position: 44px 44px; }
        }

        /* Scanline sweep across the header */
        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 60%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(66, 237, 186, 0.07), transparent);
            animation: scanSweep 9s ease-in-out infinite;
            z-index: 2;
        }

        @keyframes scanSweep {
            0% { left: -60%; }
            55%, 100% { left: 110%; }
        }

        /* Radial glow behind the name */
        .header-glow {
            position: absolute;
            top: 50%;
            left: 30%;
            width: 600px;
            height: 600px;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle,
                rgba(6, 127, 255, 0.22) 0%,
                rgba(66, 237, 186, 0.06) 45%,
                transparent 70%);
            z-index: 1;
            pointer-events: none;
            animation: glowBreath 8s ease-in-out infinite;
        }

        @keyframes glowBreath {
            0%, 100% { opacity: 0.7; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.12); }
        }

        /* Data nodes — floating AI particles */
        .data-nodes {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 3;
            overflow: hidden;
            pointer-events: none;
        }

        .data-node {
            position: absolute;
            width: 5px;
            height: 5px;
            background: var(--act-mint);
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(66, 237, 186, 0.9), 0 0 22px rgba(66, 237, 186, 0.4);
            animation: nodeRise 14s linear infinite;
            opacity: 0;
        }

        .data-node:nth-child(1) { left: 8%;  animation-delay: 0s;   animation-duration: 13s; }
        .data-node:nth-child(2) { left: 22%; animation-delay: 2.5s; animation-duration: 16s; }
        .data-node:nth-child(3) { left: 37%; animation-delay: 5s;   animation-duration: 12s; }
        .data-node:nth-child(4) { left: 55%; animation-delay: 1.2s; animation-duration: 15s; }
        .data-node:nth-child(5) { left: 68%; animation-delay: 7s;   animation-duration: 13.5s; }
        .data-node:nth-child(6) { left: 81%; animation-delay: 3.8s; animation-duration: 17s; }
        .data-node:nth-child(7) { left: 92%; animation-delay: 6.2s; animation-duration: 14s; }
        .data-node:nth-child(8) { left: 47%; animation-delay: 9s;   animation-duration: 12.5s; }

        @keyframes nodeRise {
            0% {
                bottom: -10px;
                opacity: 0;
                transform: translateX(0) scale(0.6);
            }
            8% { opacity: 1; }
            85% { opacity: 0.9; }
            100% {
                bottom: 105%;
                opacity: 0;
                transform: translateX(30px) scale(1.1);
            }
        }

        /* Logo — top right, glow entrance */
        .brand-logo {
            position: absolute;
            top: 34px;
            right: 44px;
            width: 116px;
            z-index: 15;
            animation: logoEntrance 1.4s cubic-bezier(0.34, 1.4, 0.64, 1) both;
        }

        .brand-logo img {
            width: 100%;
            height: auto;
            filter: drop-shadow(0 0 18px rgba(66, 237, 186, 0.45));
            transition: all 0.3s ease;
        }

        .brand-logo:hover img {
            filter: drop-shadow(0 0 28px rgba(66, 237, 186, 0.7));
            transform: scale(1.04);
        }

        @keyframes logoEntrance {
            0% { transform: translateY(-30px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        .header-content {
            position: relative;
            z-index: 10;
            width: 100%;
            padding: 0 50px;
        }

        .header-text {
            max-width: 760px;
        }

        /* Terminal-style tagline with blinking cursor */
        .company-tagline {
            font-family: var(--font-mono);
            font-size: 14px;
            font-weight: 600;
            color: var(--act-mint);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 26px;
            display: inline-flex;
            align-items: center;
            animation: taglineReveal 1s ease-out 0.2s both;
        }

        .company-tagline::before {
            content: '>';
            margin-right: 10px;
            opacity: 0.7;
        }

        .company-tagline::after {
            content: '';
            display: inline-block;
            width: 9px;
            height: 18px;
            margin-left: 8px;
            background: var(--act-mint);
            animation: cursorBlink 1.1s step-start infinite;
        }

        @keyframes cursorBlink {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0; }
        }

        @keyframes taglineReveal {
            0% { opacity: 0; transform: translateY(15px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .header h1 {
            font-size: clamp(2.6rem, 5.5vw, 3.9rem);
            font-weight: 900;
            color: white;
            margin-bottom: 20px;
            letter-spacing: -1.5px;
            line-height: 1.08;
            text-transform: uppercase;
            text-shadow: 0 0 34px rgba(6, 127, 255, 0.4);
            animation: titleReveal 1.2s ease-out both;
            position: relative;
        }

        .header h1::after {
            content: '';
            position: absolute;
            bottom: -12px;
            left: 0;
            width: 90px;
            height: 4px;
            background: linear-gradient(90deg, var(--act-mint), var(--act-blue), transparent);
            border-radius: 2px;
            box-shadow: 0 0 14px rgba(66, 237, 186, 0.6);
            animation: underlineGrow 1s ease-out 0.7s both;
        }

        @keyframes titleReveal {
            0% { opacity: 0; transform: translateY(30px) scale(0.97); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes underlineGrow {
            0% { width: 0; opacity: 0; }
            100% { width: 90px; opacity: 1; }
        }

        .role {
            font-size: clamp(1.05rem, 2.6vw, 1.45rem);
            font-weight: 400;
            color: rgba(241, 242, 242, 0.9);
            margin-bottom: 38px;
            margin-top: 20px;
            letter-spacing: 0.6px;
            animation: roleReveal 1.2s ease-out 0.35s both;
        }

        @keyframes roleReveal {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .contact-info {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            align-items: center;
            animation: contactReveal 1.2s ease-out 0.6s both;
        }

        @keyframes contactReveal {
            0% { opacity: 0; transform: translateY(25px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .contact-button {
            display: inline-flex;
            align-items: center;
            background: rgba(241, 242, 242, 0.07);
            border-radius: 14px;
            padding: 12px 20px;
            text-decoration: none;
            color: white;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.3px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(66, 237, 186, 0.28);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .contact-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(66, 237, 186, 0.25), transparent);
            transition: left 0.6s ease;
        }

        .contact-button:hover {
            background: rgba(66, 237, 186, 0.14);
            border-color: var(--act-mint);
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(66, 237, 186, 0.25), 0 0 18px rgba(66, 237, 186, 0.15);
        }

        .contact-button:hover::before {
            left: 100%;
        }

        .contact-button i {
            margin-right: 9px;
            font-size: 16px;
            color: var(--act-mint);
        }

        .contact-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .contact-cta {
            font-size: 11px;
            color: rgba(241, 242, 242, 0.65);
            font-weight: 400;
            animation: gentlePulse 3s ease-in-out infinite;
        }

        @keyframes gentlePulse {
            0%, 100% { opacity: 0.65; transform: scale(1); }
            50% { opacity: 0.9; transform: scale(1.02); }
        }

        .location {
            display: flex;
            align-items: center;
            font-size: 14px;
            color: rgba(241, 242, 242, 0.9);
        }

        .location i {
            margin-right: 6px;
            color: var(--act-mint);
        }

        /* ===== SECTIONS — cascading reveal ===== */
        .section {
            padding: 55px 80px;
            position: relative;
            opacity: 0;
            transform: translateY(40px);
            animation: sectionReveal 0.8s ease-out forwards;
        }

        .section:nth-of-type(1) { animation-delay: 0.2s; }
        .section:nth-of-type(2) { animation-delay: 0.4s; }
        .section:nth-of-type(3) { animation-delay: 0.6s; }
        .section:nth-of-type(4) { animation-delay: 0.8s; }
        .section:nth-of-type(5) { animation-delay: 1.0s; }

        @keyframes sectionReveal {
            0% { opacity: 0; transform: translateY(40px) scale(0.99); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .section:not(:last-child)::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 80px;
            right: 80px;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--border-color), transparent);
        }

        .section-title {
            background: var(--background-gradient);
            color: white;
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 32px;
            padding: 14px 30px;
            border-radius: 50px;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            box-shadow:
                0 8px 24px rgba(9, 15, 25, 0.25),
                0 0 20px rgba(66, 237, 186, 0.12);
            display: inline-block;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .section-title::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(66, 237, 186, 0.3), transparent);
            animation: titleShimmer 4.5s ease-in-out infinite;
        }

        @keyframes titleShimmer {
            0% { left: -100%; }
            50%, 100% { left: 100%; }
        }

        .section-title:hover {
            transform: translateY(-2px);
            box-shadow:
                0 12px 30px rgba(9, 15, 25, 0.3),
                0 0 30px rgba(66, 237, 186, 0.25);
        }

        .profile-text {
            font-size: 16px;
            line-height: 1.85;
            color: var(--text-color);
            text-align: justify;
        }

        /* ===== SKILLS — neon cards with 3D reveal ===== */
        .skills-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 26px;
        }

        @media (max-width: 1000px) {
            .skills-container { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 600px) {
            .skills-container { grid-template-columns: 1fr; }
        }

        .skills-column {
            background: linear-gradient(160deg, rgba(9, 15, 25, 0.035), rgba(6, 127, 255, 0.03));
            padding: 28px;
            border-radius: 18px;
            border: 1px solid rgba(66, 237, 186, 0.22);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 32px rgba(9, 15, 25, 0.07);
            opacity: 0;
            transform: translateY(30px) rotateX(-8deg);
            animation: skillReveal 0.8s ease forwards;
            position: relative;
            overflow: hidden;
        }

        .skills-column::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--act-mint), var(--act-blue));
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.4s ease;
        }

        .skills-column:nth-child(1) { animation-delay: 0.3s; }
        .skills-column:nth-child(2) { animation-delay: 0.5s; }
        .skills-column:nth-child(3) { animation-delay: 0.7s; }

        @keyframes skillReveal {
            to { opacity: 1; transform: translateY(0) rotateX(0); }
        }

        .skills-column:hover {
            transform: translateY(-5px) scale(1.02);
            border-color: var(--act-mint);
            box-shadow:
                0 16px 48px rgba(9, 15, 25, 0.12),
                0 0 30px rgba(66, 237, 186, 0.15);
        }

        .skills-column:hover::before {
            transform: scaleX(1);
        }

        .skill-item {
            display: flex;
            align-items: center;
            margin-bottom: 13px;
            font-size: 15px;
            color: var(--text-color);
            transition: all 0.3s ease;
        }

        .skill-item:hover {
            transform: translateX(8px);
            color: var(--act-blue-deep);
        }

        .skill-item i {
            color: var(--act-blue);
            margin-right: 12px;
            font-size: 18px;
            transition: all 0.3s ease;
        }

        .skill-item:hover i {
            color: var(--act-mint);
            transform: scale(1.2);
        }

        .tool-item {
            margin-bottom: 18px;
        }

        .tool-name {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 500;
            font-size: 14px;
            margin-bottom: 8px;
            color: var(--text-color);
        }

        .tool-percentage {
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--act-blue);
            font-weight: 600;
        }

        .dots-container {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-wrap: nowrap;
        }

        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: rgba(6, 127, 255, 0.15);
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .dot.filled {
            background: linear-gradient(135deg, var(--act-blue) 0%, var(--act-mint) 100%);
            box-shadow: 0 0 6px rgba(66, 237, 186, 0.55);
            animation: dotPulse 2s ease-in-out infinite alternate;
        }

        @keyframes dotPulse {
            0% { transform: scale(1); box-shadow: 0 0 4px rgba(66, 237, 186, 0.4); }
            100% { transform: scale(1.15); box-shadow: 0 0 10px rgba(66, 237, 186, 0.7); }
        }

        .tool-item:hover .dot.filled {
            background: linear-gradient(135deg, var(--act-mint) 0%, var(--act-blue) 100%);
            transform: scale(1.2);
        }

        /* ===== Tooltips ===== */
        .tooltip { position: relative; display: inline-block; cursor: help; }

        .tooltip .tooltip-icon {
            color: var(--act-mint);
            font-size: 14px;
            margin-left: 5px;
            transition: transform 0.2s, color 0.2s;
        }

        .tooltip:hover .tooltip-icon,
        .tooltip:focus .tooltip-icon,
        .tooltip:active .tooltip-icon {
            color: var(--act-blue);
            transform: scale(1.2);
        }

        .tooltip .tooltip-text {
            visibility: hidden;
            width: 380px;
            background: linear-gradient(145deg, var(--act-navy), var(--act-blue-deep));
            color: white;
            text-align: left;
            border-radius: 12px;
            padding: 0;
            position: absolute;
            z-index: 100;
            bottom: 125%;
            left: 50%;
            margin-left: -190px;
            opacity: 0;
            transition: opacity 0.4s, transform 0.3s;
            transform: translateY(10px);
            font-size: 13px;
            line-height: 1.5;
            box-shadow: 0 10px 40px rgba(9, 15, 25, 0.4), 0 0 24px rgba(66, 237, 186, 0.15);
            border: 1px solid rgba(66, 237, 186, 0.25);
            overflow: hidden;
            max-height: 85vh;
            overflow-y: auto;
        }

        .tooltip .tooltip-text::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -8px;
            border-width: 8px;
            border-style: solid;
            border-color: var(--act-blue-deep) transparent transparent transparent;
        }

        .tooltip:hover .tooltip-text,
        .tooltip:focus .tooltip-text,
        .tooltip:active .tooltip-text,
        .tooltip.tooltip-active .tooltip-text {
            visibility: visible;
            opacity: 1;
            transform: translateY(0);
            min-height: 330px;
        }

        .tooltip-active .tooltip-text {
            position: absolute;
            z-index: 9999;
            overflow-y: auto;
        }

        .tooltip-header {
            background-color: rgba(66, 237, 186, 0.08);
            padding: 12px 18px;
            font-weight: 600;
            font-size: 1.05em;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
            color: white;
        }

        .tooltip-content { padding: 18px; }
        .tooltip-section { margin-bottom: 15px; }
        .tooltip-section:last-of-type { margin-bottom: 0; }

        .tooltip-section-title {
            display: flex;
            align-items: center;
            font-weight: 500;
            font-size: 1em;
            color: #ffffff;
            margin-bottom: 10px;
        }

        .tooltip-section-title .fas {
            margin-right: 12px;
            font-size: 1.1em;
            width: 20px;
            text-align: center;
            color: var(--act-mint);
        }

        .tooltip-list { list-style-position: outside; padding-left: 20px; margin-top: 5px; }
        .tooltip-list li { margin-bottom: 10px; line-height: 1.5; }
        .tooltip-list li::marker { color: var(--act-mint); }

        @media (max-width: 768px) {
            .tooltip .tooltip-text {
                width: 90vw;
                max-width: 320px;
                left: 50%;
                transform: translateX(-50%);
                margin-left: 0;
                font-size: 12px;
                max-height: 75vh;
            }

            .tooltip-active .tooltip-text {
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%) !important;
                width: 90vw;
                max-width: 380px;
                z-index: 10000;
            }
        }

        /* ===== EXPERIENCE — scroll-revealed pipeline ===== */
        .experience-timeline {
            position: relative;
            margin-left: 32px;
            padding-left: 42px;
        }

        .experience-timeline::before {
            content: "";
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: linear-gradient(to bottom, var(--act-blue), var(--act-mint));
            border-radius: 3px;
            box-shadow: 0 0 12px rgba(66, 237, 186, 0.3);
        }

        .experience-item {
            margin-bottom: 32px;
            position: relative;
            padding: 32px;
            border-radius: 20px;
            background: linear-gradient(150deg, rgba(255, 255, 255, 0.95), rgba(241, 242, 242, 0.65));
            box-shadow: 0 8px 32px rgba(9, 15, 25, 0.07);
            border: 1px solid rgba(66, 237, 186, 0.2);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
            transform: translateX(-50px);
        }

        .experience-item.animate-in {
            animation: experienceSlide 0.8s ease forwards;
        }

        @keyframes experienceSlide {
            to { opacity: 1; transform: translateX(0); }
        }

        .experience-item::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            border-radius: 20px 20px 0 0;
            background: linear-gradient(90deg, var(--act-blue), var(--act-mint));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .experience-item:hover {
            transform: translateY(-3px) translateX(6px);
            border-color: var(--act-mint);
            box-shadow:
                0 14px 44px rgba(9, 15, 25, 0.12),
                0 0 26px rgba(66, 237, 186, 0.12);
        }

        .experience-item:hover::after {
            opacity: 1;
        }

        .experience-item:hover,
        .experience-item:focus-within {
            overflow: visible !important;
        }

        .experience-item::before {
            content: "";
            position: absolute;
            left: -48px;
            top: 38px;
            width: 13px;
            height: 13px;
            border-radius: 50%;
            background: var(--act-mint);
            border: 3px solid white;
            box-shadow: 0 0 0 3px rgba(66, 237, 186, 0.35), 0 0 14px rgba(66, 237, 186, 0.5);
            z-index: 1;
        }

        .job-title {
            font-weight: 700;
            font-size: 21px;
            color: var(--act-navy);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .job-number {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 38px;
            height: 38px;
            background: var(--background-gradient);
            color: var(--act-mint);
            font-family: var(--font-mono);
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            box-shadow: 0 4px 12px rgba(9, 15, 25, 0.25), inset 0 0 0 1px rgba(66, 237, 186, 0.3);
            flex-shrink: 0;
        }

        .company {
            font-weight: 600;
            font-size: 16px;
            color: var(--act-blue);
            margin-bottom: 5px;
        }

        .period {
            font-family: var(--font-mono);
            font-size: 12.5px;
            color: var(--act-slate);
            margin-bottom: 16px;
            display: inline-block;
            background: rgba(66, 237, 186, 0.1);
            padding: 5px 14px;
            border-radius: 20px;
            border: 1px solid rgba(66, 237, 186, 0.25);
        }

        .job-description {
            font-size: 15px;
            line-height: 1.65;
            color: var(--text-color);
            margin-bottom: 20px;
        }

        .achievements-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        @media (max-width: 900px) {
            .achievements-container { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 600px) {
            .achievements-container { grid-template-columns: 1fr; }
        }

        .achievement-item {
            background: linear-gradient(135deg, rgba(66, 237, 186, 0.07), rgba(6, 127, 255, 0.04));
            border-radius: 12px;
            padding: 18px;
            border: 1px solid rgba(66, 237, 186, 0.2);
            display: flex;
            align-items: flex-start;
            gap: 12px;
            transition: all 0.3s ease;
        }

        .achievement-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 22px rgba(66, 237, 186, 0.2);
            border-color: var(--act-mint);
        }

        .achievement-icon {
            font-size: 22px;
            color: var(--act-blue);
            flex-shrink: 0;
        }

        .achievement-content { flex: 1; }

        .achievement-title {
            font-weight: 600;
            font-size: 15px;
            color: var(--act-navy);
            margin-bottom: 6px;
        }

        .achievement-description {
            font-size: 14px;
            line-height: 1.5;
            color: var(--text-color);
        }

        /* ===== EDUCATION ===== */
        .education-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
        }

        @media (max-width: 700px) {
            .education-container { grid-template-columns: 1fr; }
        }

        .education-item {
            background: linear-gradient(160deg, rgba(9, 15, 25, 0.035), rgba(6, 127, 255, 0.03));
            padding: 26px;
            border-radius: 16px;
            border: 1px solid rgba(66, 237, 186, 0.2);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .education-item::after {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 160%;
            height: 160%;
            background: radial-gradient(circle, rgba(66, 237, 186, 0.08) 0%, transparent 65%);
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .education-item:hover {
            transform: translateY(-3px) scale(1.015);
            border-color: var(--act-mint);
            box-shadow: 0 10px 28px rgba(9, 15, 25, 0.1), 0 0 22px rgba(66, 237, 186, 0.12);
        }

        .education-item:hover::after {
            opacity: 1;
        }

        .degree {
            font-weight: 700;
            font-size: 18px;
            color: var(--act-navy);
            margin-bottom: 8px;
        }

        .university {
            font-size: 15px;
            color: var(--text-color);
            margin-bottom: 8px;
        }

        .thesis {
            font-size: 14px;
            font-style: italic;
            color: var(--act-slate);
        }

        /* ===== PROJECTS ===== */
        .projects-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 22px;
        }

        @media (max-width: 900px) {
            .projects-container { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 600px) {
            .projects-container { grid-template-columns: 1fr; }
        }

        .project-item {
            background: linear-gradient(150deg, rgba(255, 255, 255, 0.95), rgba(241, 242, 242, 0.65));
            border-radius: 18px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(9, 15, 25, 0.07);
            border: 1px solid rgba(66, 237, 186, 0.2);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            opacity: 0;
            transform: translateY(35px);
        }

        .project-item.animate-in {
            animation: projectRise 0.7s ease forwards;
        }

        @keyframes projectRise {
            to { opacity: 1; transform: translateY(0); }
        }

        .project-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--act-mint), var(--act-blue));
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.35s ease;
        }

        .project-item:hover::before {
            transform: scaleX(1);
        }

        .project-item:hover {
            transform: translateY(-6px);
            border-color: var(--act-mint);
            box-shadow:
                0 14px 40px rgba(9, 15, 25, 0.14),
                0 0 28px rgba(66, 237, 186, 0.14);
        }

        .project-title {
            font-weight: 700;
            font-size: 18px;
            color: var(--act-navy);
            margin-bottom: 12px;
        }

        .project-description {
            font-size: 14px;
            line-height: 1.6;
            color: var(--text-color);
            margin-bottom: 15px;
        }

        .tech-tag {
            display: inline-block;
            background: rgba(6, 127, 255, 0.09);
            color: var(--act-blue);
            font-family: var(--font-mono);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11.5px;
            font-weight: 600;
            margin-right: 8px;
            margin-bottom: 8px;
            border: 1px solid rgba(66, 237, 186, 0.3);
            transition: all 0.25s ease;
        }

        .tech-tag:hover {
            background: var(--act-mint);
            color: var(--act-navy);
            transform: translateY(-2px);
            box-shadow: 0 3px 12px rgba(66, 237, 186, 0.4);
        }

        /* ===== Fixed controls ===== */
        .print-button {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--background-gradient);
            color: white;
            border: 1px solid rgba(66, 237, 186, 0.4);
            border-radius: 50%;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(9, 15, 25, 0.4), 0 0 22px rgba(66, 237, 186, 0.25);
            transition: all 0.3s ease;
            z-index: 100;
        }

        .print-button:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 30px rgba(9, 15, 25, 0.5), 0 0 34px rgba(66, 237, 186, 0.45);
        }

        .print-button i { font-size: 24px; color: var(--act-mint); }

        .language-toggle {
            position: fixed;
            top: 30px;
            right: 30px;
            background: rgba(9, 15, 25, 0.92);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 5px;
            display: flex;
            align-items: center;
            box-shadow: 0 4px 20px rgba(9, 15, 25, 0.3);
            transition: all 0.3s ease;
            z-index: 100;
            border: 2px solid rgba(66, 237, 186, 0.35);
        }

        .language-toggle:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(66, 237, 186, 0.3);
            border-color: var(--act-mint);
        }

        .language-option {
            padding: 8px 20px;
            border-radius: 25px;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            color: rgba(241, 242, 242, 0.75);
            position: relative;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .language-option i { font-size: 14px; opacity: 0.7; }

        .language-option.active {
            background: linear-gradient(135deg, var(--act-blue) 0%, var(--act-mint) 100%);
            color: var(--act-navy);
            box-shadow: 0 2px 12px rgba(66, 237, 186, 0.4);
            animation: pulseActive 2s ease-in-out infinite;
        }

        @keyframes pulseActive {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .language-option.active i { opacity: 1; animation: checkRotate 0.5s ease-out; }

        @keyframes checkRotate {
            from { transform: rotate(-180deg); opacity: 0; }
            to { transform: rotate(0deg); opacity: 1; }
        }

        .language-option:not(.active):hover {
            background: rgba(66, 237, 186, 0.12);
            color: var(--act-mint);
        }

        .language-divider {
            width: 1px;
            height: 20px;
            background: rgba(66, 237, 186, 0.3);
            margin: 0 5px;
        }

        /* ===== Responsive ===== */
        @media (max-width: 768px) {
            .cv-container { margin: 0; border-radius: 0; max-width: 100%; }
            .header { padding: 50px 20px 60px 20px; min-height: auto; }
            .header-content { padding: 0 10px; }
            .header h1 { font-size: clamp(1.6rem, 7vw, 2.2rem); text-align: left; }
            .brand-logo { top: 18px; right: 20px; width: 74px; }
            .company-tagline { font-size: 11px; letter-spacing: 2px; }
            .role { font-size: 14px; }
            .contact-info { flex-direction: column; gap: 8px; align-items: stretch; }
            .contact-item { width: 100%; }
            .contact-button { padding: 8px 12px; font-size: 12px; min-height: 38px; width: 100%; }
            .contact-cta { font-size: 11px; }
            .section { padding: 26px 16px; }
            .section-title { font-size: 13px; margin-bottom: 18px; padding: 9px 18px; }
            .education-container { grid-template-columns: 1fr; }
            .skills-container { grid-template-columns: 1fr; }
            .experience-timeline { padding-left: 16px; margin-left: 0; }
            .experience-item::before { display: none; }
            .projects-container { grid-template-columns: 1fr; }
            .project-item { padding: 18px; }
            .achievements-container { grid-template-columns: 1fr; }
            .section:not(:last-child)::after { left: 16px; right: 16px; }
            .modal-content { width: 95%; margin: 5% auto; padding: 20px; }
            .modal input, .modal textarea { font-size: 16px; padding: 12px; }
            .modal button { min-height: 44px; font-size: 14px; }
            .print-button, .language-toggle {
                position: fixed;
                bottom: 20px;
                top: auto;
                min-height: 40px;
                z-index: 100;
            }
            .print-button { right: 20px; }
            .language-toggle { right: auto; left: 20px; }
        }

        @media (max-width: 480px) {
            .header h1 { font-size: 1.45rem; }
            .section { padding: 18px 12px; }
            .section-title { font-size: 12px; }
        }

        /* Reduced motion accessibility */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
            .section, .skills-column, .experience-item, .project-item {
                opacity: 1 !important;
                transform: none !important;
            }
        }

        /* ===== Print ===== */
        @media print {
            body { background: white; }
            .animated-bg, .gradient-orb, .data-grid, .data-nodes, .header-glow,
            .print-button, .language-toggle { display: none !important; }
            .cv-container { box-shadow: none; border: none; margin: 0; }
            .section, .skills-column, .experience-item, .project-item {
                opacity: 1 !important;
                transform: none !important;
                animation: none !important;
            }
            .section-title {
                background: var(--act-navy) !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
            .header {
                background: var(--act-navy) !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
                page-break-inside: avoid;
                padding: 30px !important;
                min-height: auto;
            }
            .header::after, .header::before { display: none !important; }
        }

    <script>
        function openEmailForm() { document.getElementById('emailModal').style.display = 'flex'; }
        function closeEmailModal() { document.getElementById('emailModal').style.display = 'none'; }
        function openPhoneForm() { document.getElementById('phoneModal').style.display = 'flex'; }
        function closePhoneModal() { document.getElementById('phoneModal').style.display = 'none'; }

        window.onclick = function(event) {
            if (event.target == document.getElementById('emailModal')) closeEmailModal();
            if (event.target == document.getElementById('phoneModal')) closePhoneModal();
        }

        document.addEventListener('DOMContentLoaded', function() {
            initializeBasicContent('pt');
            initializeModalTexts('pt');

            const inputs = document.querySelectorAll('input, textarea');
            inputs.forEach(input => {
                input.addEventListener('focus', function() { this.style.borderColor = 'var(--act-blue)'; });
                input.addEventListener('blur', function() { this.style.borderColor = '#e5e7eb'; });
            });

            const tooltips = document.querySelectorAll('.tooltip');
            tooltips.forEach(tooltip => {
                tooltip.addEventListener('click', function(e) {
                    e.stopPropagation();
                    tooltips.forEach(t => { if (t !== this) t.classList.remove('tooltip-active'); });
                    this.classList.toggle('tooltip-active');
                });
            });

            document.addEventListener('click', function() {
                tooltips.forEach(tooltip => tooltip.classList.remove('tooltip-active'));
            });

            // Scroll-triggered reveals for dynamically rendered cards
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('animate-in');
                        observer.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });

            setTimeout(() => {
                document.querySelectorAll('.experience-item, .project-item').forEach(item => {
                    observer.observe(item);
                });
            }, 100);
        });

        function initializeBasicContent(lang = 'en') {
            const nameEl = document.getElementById('cv-name');
            if (nameEl) nameEl.textContent = getText('name', lang);

            const roleEl = document.getElementById('cv-role');
            if (roleEl) roleEl.textContent = getText('role', lang);

            const emailEl = document.getElementById('cv-email');
            if (emailEl) emailEl.textContent = getText('contact.email', lang);

            const phoneEl = document.getElementById('cv-phone');
            if (phoneEl) phoneEl.textContent = getText('contact.phone', lang);

            const locationEl = document.querySelector('#cv-location span');
            if (locationEl) locationEl.textContent = getText('contact.location', lang);

            const linkedinEl = document.getElementById('cv-linkedin');
            if (linkedinEl) linkedinEl.textContent = getText('contact.linkedin', lang);

            const repositoryEl = document.getElementById('cv-repository');
            if (repositoryEl) repositoryEl.textContent = getText('contact.repository', lang);

            const emailCTAEl = document.getElementById('cv-cta-email');
            if (emailCTAEl) emailCTAEl.textContent = getText('contactCTA.email', lang);

            const phoneCTAEl = document.getElementById('cv-cta-phone');
            if (phoneCTAEl) phoneCTAEl.textContent = getText('contactCTA.phone', lang);

            const linkedinCTAEl = document.getElementById('cv-cta-linkedin');
            if (linkedinCTAEl) linkedinCTAEl.textContent = getText('contactCTA.linkedin', lang);

            const repositoryCTAEl = document.getElementById('cv-cta-repository');
            if (repositoryCTAEl) repositoryCTAEl.textContent = getText('contactCTA.repository', lang);

            const profileTitleEl = document.getElementById('section-profile');
            if (profileTitleEl) profileTitleEl.textContent = getText('sections.profile', lang);

            const skillsTitleEl = document.getElementById('section-skills');
            if (skillsTitleEl) skillsTitleEl.textContent = getText('sections.skills', lang);

            const experienceTitleEl = document.getElementById('section-experience');
            if (experienceTitleEl) experienceTitleEl.textContent = getText('sections.experience', lang);

            const educationTitleEl = document.getElementById('section-education');
            if (educationTitleEl) educationTitleEl.textContent = getText('sections.education', lang);

            const projectsTitleEl = document.getElementById('section-projects');
            if (projectsTitleEl) projectsTitleEl.textContent = getText('sections.projects', lang);

            const profileEl = document.getElementById('cv-profile');
            if (profileEl) profileEl.textContent = getText('professionalProfile', lang);

            renderSkills('skills-strategic', 'strategic', lang);
            renderSkills('skills-tools', 'tools', lang);
            renderSkills('skills-emerging', 'emerging', lang);

            renderExperience(lang);
            renderEducation(lang);
            renderProjects(lang);
        }

        function renderExperience(lang = 'en') {
            const container = document.getElementById('cv-experience');
            if (!container) return;

            const experiences = getText('experience', lang);
            let html = '';

            experiences.forEach((exp, index) => {
                html += `
                    <div class="experience-item">
                        <div class="job-title">
                            <div class="job-number">${String(index + 1).padStart(2, '0')}</div>
                            ${exp.title}
                            ${renderTooltip(exp.tooltip)}
                        </div>
                        <div class="company">${exp.company}</div>
                        <div class="period">${exp.period}</div>
                        <div class="job-description">${exp.description}</div>
                        <div class="achievements-container">
                            ${renderAchievements(exp.achievements)}
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        function renderEducation(lang = 'en') {
            const container = document.getElementById('cv-education');
            if (!container) return;

            const education = getText('education', lang);
            let html = '';

            education.forEach(edu => {
                html += `
                    <div class="education-item">
                        <div class="degree">${edu.degree}</div>
                        <div class="university">${edu.university}</div>
                        <div class="thesis">${edu.thesis}</div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        function renderProjects(lang = 'en') {
            const container = document.getElementById('cv-projects');
            if (!container) return;

            const projects = getText('projects', lang);
            let html = '';

            projects.forEach(project => {
                html += `
                    <div class="project-item">
                        <div class="project-title">${project.title}</div>
                        <div class="project-description">${project.description}</div>
                        <div style="margin-top: 15px;">
                            ${renderTechTags(project.techs)}
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }
    </script>
    <!-- Dynamic Favicon System -->
    <script src="../../assets/js/dynamic-favicon.js"></script>
</body>
</html>
