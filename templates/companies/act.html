<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedro Marconato - ACT Digital</title>
    <style>
        @import url('https://api.fontshare.com/v2/css?f[]=satoshi@700,900&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        :root {
            /* ACT Digital Official Colors (extracted from actdigital.com production CSS) */
            --act-navy: #090F19;
            --act-blue: #067FFF;
            --act-mint: #42EDBA;
            --act-offwhite: #F1F2F2;

            /* Applied Colors */
            --primary-color: var(--act-navy);
            --secondary-color: var(--act-blue);
            --accent-color: var(--act-mint);
            --light-accent: #F1F2F2;
            --dark-accent: #060a11;
            --text-color: #2c3e50;
            --border-color: rgba(6, 127, 255, 0.2);
            --background-gradient: linear-gradient(135deg, #090F19 0%, #067FFF 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: var(--text-color);
            line-height: 1.6;
            background: #f7f9fc;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        h1, .section-title, .job-title, .degree, .project-title {
            font-family: 'Satoshi', 'Inter', -apple-system, sans-serif;
        }

        /* Animated background */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #f7f9fc 0%, #eef3fb 50%, #f7f9fc 100%);
            background-size: 400% 400%;
            animation: gradientShift 20s ease infinite;
            z-index: -2;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Floating shapes */
        .shape {
            position: absolute;
            opacity: 0.06;
            animation: float 25s infinite ease-in-out;
        }

        .shape:nth-child(1) {
            width: 200px;
            height: 100px;
            background: linear-gradient(45deg, var(--act-navy), var(--act-blue));
            border-radius: 50%;
            top: 10%;
            left: 5%;
            animation-delay: 0s;
        }

        .shape:nth-child(2) {
            width: 150px;
            height: 150px;
            background: linear-gradient(135deg, var(--act-blue), var(--act-mint));
            transform: rotate(45deg);
            top: 60%;
            right: 10%;
            animation-delay: 8s;
        }

        .shape:nth-child(3) {
            width: 80px;
            height: 80px;
            background: linear-gradient(90deg, var(--act-mint), var(--act-blue));
            border-radius: 50%;
            bottom: 20%;
            left: 25%;
            animation-delay: 15s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            33% { transform: translateY(-30px) rotate(120deg); }
            66% { transform: translateY(30px) rotate(240deg); }
        }

        .cv-container {
            max-width: 1000px;
            margin: 30px auto;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-radius: 28px;
            box-shadow:
                0 20px 50px rgba(9, 15, 25, 0.2),
                0 15px 30px rgba(0, 0, 0, 0.08),
                inset 0 1px 2px rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(66, 237, 186, 0.2);
            overflow: hidden;
            position: relative;
        }

        .header {
            background: var(--background-gradient);
            padding: 60px 60px 80px 60px;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(66, 237, 186, 0.12), transparent);
            animation: shimmer 8s infinite;
        }

        @keyframes shimmer {
            0% { left: -100%; }
            50%, 100% { left: 100%; }
        }

        .header-content {
            position: relative;
            z-index: 1;
        }

        .header-text {
            max-width: 850px;
        }

        .brand-logo {
            position: absolute;
            top: 28px;
            right: 40px;
            width: 110px;
            z-index: 2;
        }

        .brand-logo img {
            width: 100%;
            height: auto;
            filter: drop-shadow(0 0 14px rgba(66, 237, 186, 0.35));
        }

        .header h1 {
            font-size: 36px;
            font-weight: 700;
            color: white;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
            text-shadow: 0 0 24px rgba(66, 237, 186, 0.25);
        }

        .role {
            font-size: 20px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 20px;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.3);
        }

        .contact-info {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
        }

        .contact-button {
            display: inline-flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 10px 16px;
            text-decoration: none;
            color: white;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            border: 1px solid rgba(66, 237, 186, 0.25);
            cursor: pointer;
            position: relative;
            overflow: visible;
        }

        .contact-button:hover {
            background: rgba(66, 237, 186, 0.18);
            border-color: var(--act-mint);
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(66, 237, 186, 0.25);
        }

        .contact-button i {
            margin-right: 8px;
            font-size: 16px;
            color: var(--act-mint);
        }

        .contact-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .contact-cta {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.7);
            font-weight: 400;
            animation: gentlePulse 3s ease-in-out infinite;
        }

        @keyframes gentlePulse {
            0%, 100% { opacity: 0.7; transform: scale(1); }
            50% { opacity: 0.9; transform: scale(1.02); }
        }

        .location {
            display: flex;
            align-items: center;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.9);
        }

        .location i {
            margin-right: 6px;
            color: var(--act-mint);
        }

        .section {
            padding: 35px 80px;
            position: relative;
        }

        .section:not(:last-child)::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 80px;
            right: 80px;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--border-color), transparent);
        }

        .section-title {
            background: var(--background-gradient);
            color: white;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 20px;
            padding: 12px 20px;
            border-radius: 14px;
            letter-spacing: 0.3px;
            box-shadow: 0 4px 16px rgba(66, 237, 186, 0.2);
            display: inline-block;
            position: relative;
            overflow: hidden;
        }

        .section-title::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(66, 237, 186, 0.25), transparent);
            animation: titleShimmer 6s infinite;
        }

        @keyframes titleShimmer {
            0% { left: -100%; }
            50%, 100% { left: 100%; }
        }

        .profile-text {
            font-size: 16px;
            line-height: 1.8;
            color: var(--text-color);
            text-align: justify;
        }

        .skills-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
        }

        @media (max-width: 1000px) {
            .skills-container { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 600px) {
            .skills-container { grid-template-columns: 1fr; }
        }

        .skills-column {
            background: linear-gradient(135deg, rgba(9, 15, 25, 0.04), rgba(6, 127, 255, 0.03));
            padding: 25px;
            border-radius: 16px;
            border: 1px solid rgba(66, 237, 186, 0.2);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .skills-column:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(66, 237, 186, 0.15);
            border-color: var(--act-mint);
        }

        .skill-item {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            font-size: 15px;
            color: var(--text-color);
            transition: transform 0.2s ease;
        }

        .skill-item:hover { transform: translateX(5px); }

        .skill-item i {
            color: var(--act-blue);
            margin-right: 12px;
            font-size: 18px;
        }

        .tool-item { margin-bottom: 18px; }

        .tool-name {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 500;
            font-size: 14px;
            margin-bottom: 8px;
            color: var(--text-color);
        }

        .tool-percentage {
            font-size: 13px;
            color: var(--act-blue);
            font-weight: 700;
        }

        .dots-container {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-wrap: nowrap;
        }

        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: rgba(6, 127, 255, 0.15);
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .dot.filled {
            background: linear-gradient(135deg, var(--act-blue) 0%, var(--act-mint) 100%);
            box-shadow: 0 1px 4px rgba(66, 237, 186, 0.5);
            animation: dotPulse 2s ease-in-out infinite alternate;
        }

        @keyframes dotPulse {
            0% { transform: scale(1); box-shadow: 0 1px 3px rgba(66, 237, 186, 0.35); }
            100% { transform: scale(1.15); box-shadow: 0 2px 8px rgba(66, 237, 186, 0.55); }
        }

        .tool-item:hover .dot.filled {
            background: linear-gradient(135deg, var(--act-mint) 0%, var(--act-blue) 100%);
            transform: scale(1.15);
        }

        /* Tooltip styles */
        .tooltip { position: relative; display: inline-block; cursor: help; }

        .tooltip .tooltip-icon {
            color: var(--act-mint);
            font-size: 14px;
            margin-left: 5px;
            transition: transform 0.2s, color 0.2s;
        }

        .tooltip:hover .tooltip-icon,
        .tooltip:focus .tooltip-icon,
        .tooltip:active .tooltip-icon {
            color: var(--act-blue);
            transform: scale(1.2);
        }

        .tooltip .tooltip-text {
            visibility: hidden;
            width: 380px;
            background: linear-gradient(145deg, var(--act-navy), var(--act-blue));
            color: white;
            text-align: left;
            border-radius: 12px;
            padding: 0;
            position: absolute;
            z-index: 100;
            bottom: 125%;
            left: 50%;
            margin-left: -190px;
            opacity: 0;
            transition: opacity 0.4s, transform 0.3s;
            transform: translateY(10px);
            font-size: 13px;
            line-height: 1.5;
            box-shadow: 0 10px 30px rgba(66, 237, 186, 0.25);
            overflow: hidden;
            max-height: 85vh;
            overflow-y: auto;
        }

        .tooltip .tooltip-text::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -8px;
            border-width: 8px;
            border-style: solid;
            border-color: var(--act-blue) transparent transparent transparent;
        }

        .tooltip:hover .tooltip-text,
        .tooltip:focus .tooltip-text,
        .tooltip:active .tooltip-text,
        .tooltip.tooltip-active .tooltip-text {
            visibility: visible;
            opacity: 1;
            transform: translateY(0);
            min-height: 330px;
        }

        .tooltip-active .tooltip-text {
            position: absolute;
            z-index: 9999;
            overflow-y: auto;
        }

        .tooltip-header {
            background-color: rgba(66, 237, 186, 0.08);
            padding: 12px 18px;
            font-weight: 600;
            font-size: 1.05em;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
            color: white;
        }

        .tooltip-content { padding: 18px; }
        .tooltip-section { margin-bottom: 15px; }
        .tooltip-section:last-of-type { margin-bottom: 0; }

        .tooltip-section-title {
            display: flex;
            align-items: center;
            font-weight: 500;
            font-size: 1em;
            color: #ffffff;
            margin-bottom: 10px;
        }

        .tooltip-section-title .fas {
            margin-right: 12px;
            font-size: 1.1em;
            width: 20px;
            text-align: center;
            color: var(--act-mint);
        }

        .tooltip-list { list-style-position: outside; padding-left: 20px; margin-top: 5px; }
        .tooltip-list li { margin-bottom: 10px; line-height: 1.5; }
        .tooltip-list li::marker { color: var(--act-mint); }

        @media (max-width: 768px) {
            .tooltip .tooltip-text {
                width: 90vw;
                max-width: 320px;
                left: 50%;
                transform: translateX(-50%);
                margin-left: 0;
                font-size: 12px;
                max-height: 75vh;
            }

            .tooltip-active .tooltip-text {
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%) !important;
                width: 90vw;
                max-width: 380px;
                z-index: 10000;
            }
        }

        .experience-timeline {
            position: relative;
            margin-left: 30px;
            padding-left: 40px;
        }

        .experience-timeline::before {
            content: "";
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: linear-gradient(to bottom, var(--act-blue), var(--act-mint));
            border-radius: 3px;
        }

        .experience-item {
            margin-bottom: 25px;
            position: relative;
            padding: 25px;
            border-radius: 16px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.9), rgba(241, 242, 242, 0.6));
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(66, 237, 186, 0.2);
            transition: all 0.3s ease;
        }

        .experience-item:hover {
            transform: translateX(5px);
            box-shadow: 0 4px 20px rgba(66, 237, 186, 0.15);
            border-color: var(--act-mint);
        }

        .experience-item::before {
            content: "";
            position: absolute;
            left: -46px;
            top: 35px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--act-mint);
            border: 3px solid white;
            box-shadow: 0 0 0 3px rgba(66, 237, 186, 0.35);
            z-index: 1;
        }

        .job-title {
            font-weight: 700;
            font-size: 20px;
            color: var(--act-navy);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .job-number {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            background: var(--background-gradient);
            color: white;
            border-radius: 50%;
            font-size: 16px;
            font-weight: 600;
            box-shadow: 0 3px 10px rgba(66, 237, 186, 0.3);
        }

        .company {
            font-weight: 500;
            font-size: 16px;
            color: var(--act-blue);
            margin-bottom: 5px;
        }

        .period {
            font-size: 14px;
            color: #566d8f;
            font-style: italic;
            margin-bottom: 15px;
            display: inline-block;
            background: rgba(66, 237, 186, 0.12);
            padding: 4px 12px;
            border-radius: 20px;
        }

        .job-description {
            font-size: 15px;
            line-height: 1.6;
            color: var(--text-color);
            margin-bottom: 20px;
        }

        .achievements-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        @media (max-width: 900px) {
            .achievements-container { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 600px) {
            .achievements-container { grid-template-columns: 1fr; }
        }

        .achievement-item {
            background: linear-gradient(135deg, rgba(66, 237, 186, 0.08), rgba(6, 127, 255, 0.04));
            border-radius: 12px;
            padding: 18px;
            border: 1px solid rgba(66, 237, 186, 0.2);
            display: flex;
            align-items: flex-start;
            gap: 12px;
            transition: all 0.3s ease;
        }

        .achievement-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(66, 237, 186, 0.25);
            border-color: var(--act-mint);
        }

        .achievement-icon { font-size: 24px; color: var(--act-blue); flex-shrink: 0; }
        .achievement-content { flex: 1; }

        .achievement-title {
            font-weight: 600;
            font-size: 15px;
            color: var(--act-navy);
            margin-bottom: 6px;
        }

        .achievement-description {
            font-size: 14px;
            line-height: 1.5;
            color: var(--text-color);
        }

        .education-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
        }

        @media (max-width: 700px) {
            .education-container { grid-template-columns: 1fr; }
        }

        .education-item {
            background: linear-gradient(135deg, rgba(9, 15, 25, 0.04), rgba(6, 127, 255, 0.03));
            padding: 25px;
            border-radius: 16px;
            border: 1px solid rgba(66, 237, 186, 0.2);
            transition: all 0.3s ease;
        }

        .education-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(66, 237, 186, 0.15);
        }

        .degree { font-weight: 700; font-size: 18px; color: var(--act-navy); margin-bottom: 8px; }
        .university { font-size: 15px; color: var(--text-color); margin-bottom: 8px; }
        .thesis { font-size: 14px; font-style: italic; color: #566d8f; }

        .projects-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        @media (max-width: 900px) {
            .projects-container { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 600px) {
            .projects-container { grid-template-columns: 1fr; }
        }

        .project-item {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.9), rgba(241, 242, 242, 0.6));
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(66, 237, 186, 0.2);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .project-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--background-gradient);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.3s ease;
        }

        .project-item:hover::before { transform: scaleX(1); }

        .project-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 30px rgba(66, 237, 186, 0.2);
            border-color: var(--act-mint);
        }

        .project-title { font-weight: 700; font-size: 18px; color: var(--act-navy); margin-bottom: 12px; }

        .project-description {
            font-size: 14px;
            line-height: 1.6;
            color: var(--text-color);
            margin-bottom: 15px;
        }

        .tech-tag {
            display: inline-block;
            background: rgba(6, 127, 255, 0.1);
            color: var(--act-blue);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            margin-right: 8px;
            margin-bottom: 8px;
            border: 1px solid rgba(66, 237, 186, 0.3);
            transition: all 0.2s ease;
        }

        .tech-tag:hover {
            background: var(--act-mint);
            color: var(--act-navy);
            transform: translateY(-2px);
            box-shadow: 0 2px 8px rgba(66, 237, 186, 0.4);
        }

        /* Print button */
        .print-button {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--background-gradient);
            color: white;
            border: none;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(66, 237, 186, 0.4);
            transition: all 0.3s ease;
            z-index: 100;
        }

        .print-button:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 30px rgba(66, 237, 186, 0.55);
        }

        .print-button i { font-size: 24px; }

        /* Language toggle button */
        .language-toggle {
            position: fixed;
            top: 30px;
            right: 30px;
            background: rgba(9, 15, 25, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 5px;
            display: flex;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            transition: all 0.3s ease;
            z-index: 100;
            border: 2px solid rgba(66, 237, 186, 0.3);
        }

        .language-toggle:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(66, 237, 186, 0.35);
            border-color: var(--act-mint);
        }

        .language-option {
            padding: 8px 20px;
            border-radius: 25px;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            color: rgba(255, 255, 255, 0.75);
            position: relative;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .language-option i { font-size: 14px; opacity: 0.7; }

        .language-option.active {
            background: linear-gradient(135deg, var(--act-blue) 0%, var(--act-mint) 100%);
            color: var(--act-navy);
            box-shadow: 0 2px 10px rgba(66, 237, 186, 0.4);
            animation: pulseActive 2s ease-in-out infinite;
        }

        @keyframes pulseActive {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .language-option.active i { opacity: 1; animation: checkRotate 0.5s ease-out; }

        @keyframes checkRotate {

    <script>
        function openEmailForm() { document.getElementById('emailModal').style.display = 'flex'; }
        function closeEmailModal() { document.getElementById('emailModal').style.display = 'none'; }
        function openPhoneForm() { document.getElementById('phoneModal').style.display = 'flex'; }
        function closePhoneModal() { document.getElementById('phoneModal').style.display = 'none'; }

        window.onclick = function(event) {
            if (event.target == document.getElementById('emailModal')) closeEmailModal();
            if (event.target == document.getElementById('phoneModal')) closePhoneModal();
        }

        document.addEventListener('DOMContentLoaded', function() {
            initializeBasicContent('en');
            initializeModalTexts('en');

            const inputs = document.querySelectorAll('input, textarea');
            inputs.forEach(input => {
                input.addEventListener('focus', function() { this.style.borderColor = 'var(--act-blue)'; });
                input.addEventListener('blur', function() { this.style.borderColor = '#e5e7eb'; });
            });

            const tooltips = document.querySelectorAll('.tooltip');
            tooltips.forEach(tooltip => {
                tooltip.addEventListener('click', function(e) {
                    e.stopPropagation();
                    tooltips.forEach(t => { if (t !== this) t.classList.remove('tooltip-active'); });
                    this.classList.toggle('tooltip-active');
                });
            });

            document.addEventListener('click', function() {
                tooltips.forEach(tooltip => tooltip.classList.remove('tooltip-active'));
            });
        });

        function initializeBasicContent(lang = 'en') {
            const nameEl = document.getElementById('cv-name');
            if (nameEl) nameEl.textContent = getText('name', lang);

            const roleEl = document.getElementById('cv-role');
            if (roleEl) roleEl.textContent = getText('role', lang);

            const emailEl = document.getElementById('cv-email');
            if (emailEl) emailEl.textContent = getText('contact.email', lang);

            const phoneEl = document.getElementById('cv-phone');
            if (phoneEl) phoneEl.textContent = getText('contact.phone', lang);

            const locationEl = document.querySelector('#cv-location span');
            if (locationEl) locationEl.textContent = getText('contact.location', lang);

            const linkedinEl = document.getElementById('cv-linkedin');
            if (linkedinEl) linkedinEl.textContent = getText('contact.linkedin', lang);

            const repositoryEl = document.getElementById('cv-repository');
            if (repositoryEl) repositoryEl.textContent = getText('contact.repository', lang);

            const emailCTAEl = document.getElementById('cv-cta-email');
            if (emailCTAEl) emailCTAEl.textContent = getText('contactCTA.email', lang);

            const phoneCTAEl = document.getElementById('cv-cta-phone');
            if (phoneCTAEl) phoneCTAEl.textContent = getText('contactCTA.phone', lang);

            const linkedinCTAEl = document.getElementById('cv-cta-linkedin');
            if (linkedinCTAEl) linkedinCTAEl.textContent = getText('contactCTA.linkedin', lang);

            const repositoryCTAEl = document.getElementById('cv-cta-repository');
            if (repositoryCTAEl) repositoryCTAEl.textContent = getText('contactCTA.repository', lang);

            const profileTitleEl = document.getElementById('section-profile');
            if (profileTitleEl) profileTitleEl.textContent = getText('sections.profile', lang);

            const skillsTitleEl = document.getElementById('section-skills');
            if (skillsTitleEl) skillsTitleEl.textContent = getText('sections.skills', lang);

            const experienceTitleEl = document.getElementById('section-experience');
            if (experienceTitleEl) experienceTitleEl.textContent = getText('sections.experience', lang);

            const educationTitleEl = document.getElementById('section-education');
            if (educationTitleEl) educationTitleEl.textContent = getText('sections.education', lang);

            const projectsTitleEl = document.getElementById('section-projects');
            if (projectsTitleEl) projectsTitleEl.textContent = getText('sections.projects', lang);

            const profileEl = document.getElementById('cv-profile');
            if (profileEl) profileEl.textContent = getText('professionalProfile', lang);

            renderSkills('skills-strategic', 'strategic', lang);
            renderSkills('skills-tools', 'tools', lang);
            renderSkills('skills-emerging', 'emerging', lang);

            renderExperience(lang);
            renderEducation(lang);
            renderProjects(lang);
        }

        function renderExperience(lang = 'en') {
            const container = document.getElementById('cv-experience');
            if (!container) return;

            const experiences = getText('experience', lang);
            let html = '';

            experiences.forEach((exp, index) => {
                html += `
                    <div class="experience-item">
                        <div class="job-title">
                            <div class="job-number">${index + 1}</div>
                            ${exp.title}
                            ${renderTooltip(exp.tooltip)}
                        </div>
                        <div class="company">${exp.company}</div>
                        <div class="period">${exp.period}</div>
                        <div class="job-description">${exp.description}</div>
                        <div class="achievements-container">
                            ${renderAchievements(exp.achievements)}
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        function renderEducation(lang = 'en') {
            const container = document.getElementById('cv-education');
            if (!container) return;

            const education = getText('education', lang);
            let html = '';

            education.forEach(edu => {
                html += `
                    <div class="education-item">
                        <div class="degree">${edu.degree}</div>
                        <div class="university">${edu.university}</div>
                        <div class="thesis">${edu.thesis}</div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        function renderProjects(lang = 'en') {
            const container = document.getElementById('cv-projects');
            if (!container) return;

            const projects = getText('projects', lang);
            let html = '';

            projects.forEach(project => {
                html += `
                    <div class="project-item">
                        <div class="project-title">${project.title}</div>
                        <div class="project-description">${project.description}</div>
                        <div style="margin-top: 15px;">
                            ${renderTechTags(project.techs)}
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }
    </script>
